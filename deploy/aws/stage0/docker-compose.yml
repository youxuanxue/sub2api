# =============================================================================
# TokenKey AWS Stage0: Caddy-only ingress, private Postgres/Redis, persistent
# data under /var/lib/tokenkey, and a commit-pinned TOKENKEY_IMAGE from GHCR.
# Data-layer modes are documented in docs/deploy/aws-data-layer-migration.md.
# =============================================================================

x-tokenkey-logging: &tokenkey-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "5"

services:
  caddy:
    image: caddy:2-alpine
    container_name: tokenkey-caddy
    restart: unless-stopped
    logging: *tokenkey-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/lib/tokenkey/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /var/lib/tokenkey/caddy/data:/data
      - /var/lib/tokenkey/caddy/config:/config
    depends_on:
      tokenkey:
        condition: service_started
    networks:
      - tokenkey-network

  tokenkey:
    image: ${TOKENKEY_IMAGE:?TOKENKEY_IMAGE is required (e.g. ghcr.io/<owner>/sub2api:<tag>)}
    container_name: tokenkey
    pull_policy: always
    restart: unless-stopped
    logging: *tokenkey-logging
    # 发版优雅停机：deploy 脚本会先发 SIGUSR1 让进程进入 drain，等 /health 翻 503、
    # in_flight=0 后才走 `docker stop`，此时 SIGTERM + 下面 180s 的 grace period 保证
    # 长 SSE 能跑完。app 端 TOKENKEY_SHUTDOWN_TIMEOUT_SECONDS=150 比 grace 少 30s，
    # 给 docker stop 自己留 SIGKILL 缓冲。
    stop_grace_period: 180s
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    expose:
      - "8080"
    volumes:
      - /var/lib/tokenkey/app:/app/data
    environment:
      - AUTO_SETUP=true
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - SERVER_MODE=${SERVER_MODE:-release}
      - SERVER_FRONTEND_URL=${SERVER_FRONTEND_URL:-}
      - RUN_MODE=${RUN_MODE:-standard}
      # 数据层双模式（默认=本机容器；RDS 外部模式经 .env overlay）：docs/deploy/aws-data-layer-migration.md
      - DATABASE_HOST=${DATABASE_HOST:-postgres}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - DATABASE_USER=${POSTGRES_USER:-tokenkey}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - DATABASE_DBNAME=${POSTGRES_DB:-tokenkey}
      - DATABASE_SSLMODE=${DATABASE_SSLMODE:-disable}
      - DATABASE_MAX_OPEN_CONNS=${DATABASE_MAX_OPEN_CONNS:-50}
      - DATABASE_MAX_IDLE_CONNS=${DATABASE_MAX_IDLE_CONNS:-10}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_ENABLE_TLS=${REDIS_ENABLE_TLS:-false}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_POOL_SIZE=${REDIS_POOL_SIZE:-1024}
      - REDIS_MIN_IDLE_CONNS=${REDIS_MIN_IDLE_CONNS:-10}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@tokenkey.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required (openssl rand -hex 32)}
      - JWT_EXPIRE_HOUR=${JWT_EXPIRE_HOUR:-1}
      - TOTP_ENCRYPTION_KEY=${TOTP_ENCRYPTION_KEY:?TOTP_ENCRYPTION_KEY is required (openssl rand -hex 32)}
      - TZ=${TZ:-UTC}
      - TOKENKEY_SHUTDOWN_TIMEOUT_SECONDS=${TOKENKEY_SHUTDOWN_TIMEOUT_SECONDS:-150}
      # TK surface-C: default-on (edge no-ops; override =false). Mirrors edge capacity onto prod cc-* stubs.
      - GATEWAY_SCHEDULING_ANTHROPIC_CONFIG_RECONCILER_CONCURRENCY_MIRROR_ENABLED=${GATEWAY_SCHEDULING_ANTHROPIC_CONFIG_RECONCILER_CONCURRENCY_MIRROR_ENABLED:-true}
      # TK Step E balance floor: default-off (prod billing surface); edge .env sets =true.
      - GATEWAY_SCHEDULING_ANTHROPIC_CONFIG_RECONCILER_BALANCE_FLOOR_ENABLED=${GATEWAY_SCHEDULING_ANTHROPIC_CONFIG_RECONCILER_BALANCE_FLOOR_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - tokenkey-network
    # Docker 探针指向 /health/live（liveness），不被 drain 影响——避免 deploy
    # pre-drain 阶段触发 docker 自动 restart。Caddy 那边也指向 /health/live。
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s

  postgres:
    image: postgres:18-alpine
    container_name: tokenkey-postgres
    restart: unless-stopped
    # localpg profile 不激活则本机 PG 不启动（外部模式 depends_on 由 external-db override !override 重置）
    profiles: ["localpg"]
    logging: *tokenkey-logging
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    volumes:
      - /var/lib/tokenkey/postgres:/var/lib/postgresql/data
      - /var/lib/tokenkey/pgdump:/pgdump
    environment:
      - PGDATA=/var/lib/postgresql/data
      - POSTGRES_USER=${POSTGRES_USER:-tokenkey}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-tokenkey}
      - TZ=${TZ:-UTC}
    networks:
      - tokenkey-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tokenkey} -d ${POSTGRES_DB:-tokenkey}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:8-alpine
    container_name: tokenkey-redis
    restart: unless-stopped
    # localredis profile：prod/edge 当前都保留本机 Redis；出机触发器见迁移 SOP
    profiles: ["localredis"]
    logging: *tokenkey-logging
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    volumes:
      - /var/lib/tokenkey/redis:/data
    command: >
      sh -c '
        redis-server
        --save 60 1
        --appendonly yes
        --appendfsync everysec
        ${REDIS_PASSWORD:+--requirepass "$REDIS_PASSWORD"}'
    environment:
      - TZ=${TZ:-UTC}
      - REDISCLI_AUTH=${REDIS_PASSWORD:-}
    networks:
      - tokenkey-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  tokenkey-network:
    driver: bridge
