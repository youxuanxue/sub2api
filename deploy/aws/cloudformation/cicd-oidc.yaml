AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  GitHub Actions OIDC provider + scoped IAM role for the sub2api repository.
  Lets the Error Clustering Daily workflow (and future ops workflows) call
  ssm:SendCommand against the prod instance without storing long-lived AWS
  credentials in GitHub. Trust policy is locked to a single repo + branch
  pattern; SSM action scope is locked to the prod instance + AWS-RunShellScript
  document. This stack is independent of the stage0 runtime stack so it can be
  changed without risking instance replacement.

Parameters:
  GitHubRepo:
    Type: String
    Default: youxuanxue/sub2api
    AllowedPattern: "^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$"
    Description: GitHub <owner>/<repo> allowed to assume the role.
  AllowedSubjects:
    Type: CommaDelimitedList
    Default: "repo:youxuanxue/sub2api:ref:refs/heads/main,repo:youxuanxue/sub2api:environment:prod,repo:youxuanxue/sub2api:environment:test,repo:youxuanxue/sub2api:environment:edge-uk1"
    Description: >-
      Full OIDC sub claims (StringLike patterns) allowed to assume the role.
      Default allows main (for error-clustering-daily.yml + prod-log-dump.yml),
      environment:prod / environment:test (for deploy-stage0.yml), and
      environment:edge-uk1 (for the first Edge Stage0 sample). The Environment
      binding is what makes reviewer gates load-bearing on the AWS side, not
      just GitHub UI cosmetic. Temporarily add e.g.
      "repo:youxuanxue/sub2api:ref:refs/heads/feature/clustering-oidc-ssm"
      while bootstrapping, then narrow back to the defaults afterwards.
  TargetInstanceId:
    Type: String
    Default: ""
    AllowedPattern: "^(i-[0-9a-f]{8,17})?$"
    Description: >-
      Optional prod EC2 instance the role is allowed to send SSM commands to.
      Empty suppresses the prod SSM statement, which lets a regional OIDC stack
      bootstrap before the target Stage0 instance exists.
  TestTargetInstanceId:
    Type: String
    Default: ""
    AllowedPattern: "^(i-[0-9a-f]{8,17})?$"
    Description: >-
      Optional test EC2 instance the role may also send SSM commands to.
      Empty (default) means "no test instance wired yet" — the IAM
      statement targeting it is suppressed via condition. Set this to
      the test stack's InstanceId (e.g. i-0123456789abcdef0) when wiring
      deploy-stage0.yml for test deploys. The workflow chooses which
      instance to target via inputs.environment; this list of IDs is the
      IAM cap, not the runtime selector.
  EdgeUk1Region:
    Type: String
    Default: eu-west-2
    AllowedPattern: "^[a-z]{2}-[a-z]+-[0-9]+$"
    Description: AWS region for the uk1 Edge Stage0 stack.
  EdgeUk1TargetInstanceId:
    Type: String
    Default: ""
    AllowedPattern: "^(i-[0-9a-f]{8,17})?$"
    Description: >-
      Optional uk1 Edge EC2 instance the role may send SSM commands to after
      tokenkey-edge-uk1-stage0 is provisioned. Empty suppresses the uk1 SSM
      statement; fill this with the stack output InstanceId before running
      deploy-edge-stage0 upgrade/smoke/rollback.

  CreateOIDCProvider:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: >-
      Create the GitHub OIDC provider in this account. Set to "false" ONLY on
      the very first deploy if the provider already exists (e.g. another stack
      in the account already owns it). DO NOT flip this from "true" to "false"
      on a subsequent deploy of the same stack: even with the Retain policy
      below, that drops the provider out of stack management and any future
      flip back to "true" will fail with "EntityAlreadyExists". Pick a value
      at first deploy and keep it.

Conditions:
  ShouldCreateOIDC: !Equals [!Ref CreateOIDCProvider, "true"]
  HasProdInstance: !Not [!Equals [!Ref TargetInstanceId, ""]]
  HasTestInstance: !Not [!Equals [!Ref TestTargetInstanceId, ""]]
  HasEdgeUk1Instance: !Not [!Equals [!Ref EdgeUk1TargetInstanceId, ""]]

Resources:
  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateOIDC
    # Retain on stack delete OR on resource removal from the template (the
    # CreateOIDCProvider=false path), so we never accidentally tear down the
    # account-wide GitHub OIDC trust by deploying this stack with the wrong
    # parameter value. Real teardown must be deliberate (manual aws iam
    # delete-open-id-connect-provider).
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      # Thumbprints are no longer validated by AWS for token.actions.githubusercontent.com,
      # but the API still requires the field. Use the well-known GitHub root.
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1
      Tags:
        - Key: Project
          Value: tokenkey
        - Key: ManagedBy
          Value: cloudformation

  ClusteringRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "tokenkey-gha-${AWS::Region}-error-clustering"
      Description: >-
        Assumed by repo workflows via GitHub OIDC to dispatch SSM Run-Command
        on the prod (and now optionally test) EC2 instance. Originally scoped
        to error-clustering only - name retained for back-compat with
        vars.AWS_OIDC_ROLE_ARN consumers; current consumers include
        error-clustering-daily.yml, prod-log-dump.yml, and deploy-stage0.yml.
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - ShouldCreateOIDC
                - !Ref GitHubOIDCProvider
                - !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
              ForAnyValue:StringLike:
                "token.actions.githubusercontent.com:sub": !Ref AllowedSubjects
      Policies:
        - PolicyName: EdgeUk1CloudFormationExecution
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                Resource: !GetAtt EdgeUk1CloudFormationExecutionRole.Arn
        - PolicyName: SsmSendCommandStage0
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - !If
                - HasProdInstance
                - Sid: SendRunShellScriptProd
                  Effect: Allow
                  Action:
                    - ssm:SendCommand
                  Resource:
                    - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/${TargetInstanceId}"
                    - !Sub "arn:aws:ssm:${AWS::Region}::document/AWS-RunShellScript"
                - !Ref AWS::NoValue
              - !If
                - HasTestInstance
                - Sid: SendRunShellScriptTest
                  Effect: Allow
                  Action:
                    - ssm:SendCommand
                  Resource:
                    - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/${TestTargetInstanceId}"
                    - !Sub "arn:aws:ssm:${AWS::Region}::document/AWS-RunShellScript"
                - !Ref AWS::NoValue
              - !If
                - HasEdgeUk1Instance
                - Sid: SendRunShellScriptEdgeUk1
                  Effect: Allow
                  Action:
                    - ssm:SendCommand
                  Resource:
                    - !Sub "arn:aws:ec2:${EdgeUk1Region}:${AWS::AccountId}:instance/${EdgeUk1TargetInstanceId}"
                    - !Sub "arn:aws:ssm:${AWS::Region}::document/AWS-RunShellScript"
                - !Ref AWS::NoValue
              - Sid: ReadCommandResult
                Effect: Allow
                Action:
                  - ssm:GetCommandInvocation
                  - ssm:ListCommandInvocations
                  - ssm:ListCommands
                Resource: "*"
              - Sid: DescribeStackForInstanceLookup
                Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                Resource:
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/tokenkey-cicd-oidc/*"
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/tokenkey-prod-stage0/*"
                  - !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/tokenkey-test-stage0/*"
                  - !Sub "arn:aws:cloudformation:${EdgeUk1Region}:${AWS::AccountId}:stack/tokenkey-edge-uk1-stage0/*"
              - Sid: DeployEdgeUk1Stack
                Effect: Allow
                Action:
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:GetTemplateSummary
                Resource:
                  - !Sub "arn:aws:cloudformation:${EdgeUk1Region}:${AWS::AccountId}:stack/tokenkey-edge-uk1-stage0/*"
              - Sid: PassEdgeUk1CloudFormationExecutionRole
                Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt EdgeUk1CloudFormationExecutionRole.Arn
      Tags:
        - Key: Project
          Value: tokenkey
        - Key: ManagedBy
          Value: cloudformation

  EdgeUk1CloudFormationExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "tokenkey-cfn-${EdgeUk1Region}-edge-uk1-stage0"
      Description: >-
        CloudFormation execution role for tokenkey-edge-uk1-stage0. GitHub
        Actions may pass this role, but does not receive direct EC2/IAM
        provisioning permissions.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ProvisionEdgeUk1Resources
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:CreateVpc
                  - ec2:DeleteVpc
                  - ec2:ModifyVpcAttribute
                  - ec2:CreateInternetGateway
                  - ec2:DeleteInternetGateway
                  - ec2:AttachInternetGateway
                  - ec2:DetachInternetGateway
                  - ec2:CreateSubnet
                  - ec2:DeleteSubnet
                  - ec2:ModifySubnetAttribute
                  - ec2:CreateRouteTable
                  - ec2:DeleteRouteTable
                  - ec2:CreateRoute
                  - ec2:DeleteRoute
                  - ec2:AssociateRouteTable
                  - ec2:DisassociateRouteTable
                  - ec2:CreateSecurityGroup
                  - ec2:DeleteSecurityGroup
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:AllocateAddress
                  - ec2:ReleaseAddress
                  - ec2:AssociateAddress
                  - ec2:DisassociateAddress
                  - ec2:RunInstances
                  - ec2:TerminateInstances
                  - ec2:StartInstances
                  - ec2:StopInstances
                  - ec2:CreateVolume
                  - ec2:DeleteVolume
                  - ec2:AttachVolume
                  - ec2:DetachVolume
                  - ec2:ModifyInstanceAttribute
                  - ec2:CreateTags
                  - ec2:DeleteTags
                  - ec2:Describe*
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:PassRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:CreateInstanceProfile
                  - iam:DeleteInstanceProfile
                  - iam:TagInstanceProfile
                  - iam:UntagInstanceProfile
                  - iam:AddRoleToInstanceProfile
                  - iam:RemoveRoleFromInstanceProfile
                  - iam:GetInstanceProfile
                  - iam:ListInstanceProfilesForRole
                  - ssm:PutParameter
                  - ssm:DeleteParameter
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - cloudwatch:PutMetricAlarm
                  - cloudwatch:DeleteAlarms
                  - cloudwatch:DescribeAlarms
                Resource: "*"
      Tags:
        - Key: Project
          Value: tokenkey
        - Key: ManagedBy
          Value: cloudformation
        - Key: EdgeId
          Value: uk1

Outputs:
  RoleArn:
    Description: ARN to set as GitHub repo variable AWS_OIDC_ROLE_ARN.
    Value: !GetAtt ClusteringRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-RoleArn"
  EdgeUk1CloudFormationExecutionRoleArn:
    Description: CloudFormation execution role for tokenkey-edge-uk1-stage0.
    Value: !GetAtt EdgeUk1CloudFormationExecutionRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-EdgeUk1CloudFormationExecutionRoleArn"
