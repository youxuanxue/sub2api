AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  tokenkey Stage 0 data layer (PostgreSQL off the app box) — RDS PostgreSQL,
  single-AZ by default (MultiAZ=true is an online upgrade, no re-migration).
  Lifecycle is DECOUPLED from the app stack (tokenkey-prod-stage0): app
  resize/replace must never touch the ledger. Imports VPC/subnets/SG from the
  app stack Exports. DeletionPolicy/UpdateReplacePolicy=Retain everywhere data
  lives. Redis intentionally stays on the app box (currently only MiB-scale
  cache/counters); its extraction trigger is documented in
  docs/deploy/aws-data-layer-migration.md — this template reserves no
  ElastiCache resources until that trigger fires.
  Runtime config (DATABASE_HOST/SSLMODE/password/COMPOSE_PROFILES) is NOT
  carried by CFN parameters — single source of truth is the SSM SecureString
  /<project>/<env>/stage0/data-layer-env (anti split-brain; see the ImageTag
  rollback incident class).

Parameters:
  ProjectName:
    Type: String
    Default: tokenkey
  Environment:
    Type: String
    Default: prod
    AllowedPattern: '^[a-z0-9-]+$'

  PgEngineVersion:
    Type: String
    Default: '18.1'
    Description: >-
      RDS PostgreSQL engine version. Pick the highest available major (18.x
      preferred — matches the postgres:18-alpine container the dump comes
      from; pg_dump client major MUST be >= server major). Verify with:
      aws rds describe-db-engine-versions --engine postgres
      --query 'DBEngineVersions[*].EngineVersion'
  PgInstanceClass:
    Type: String
    Default: db.t4g.large
    Description: >-
      Recommended candidate. Prod PostgreSQL uses about 2.9 GiB excluding page
      cache and reached about 6.3 GiB cgroup memory (2026-07-18 read-only
      measurement); db.t4g.medium has only 4 GiB. Final class still requires the
      approved restore/load rehearsal before production cutover.
  PgAllocatedStorage:
    Type: Number
    Default: 50
    Description: >-
      Initial gp3 GiB. Current prod database is about 23.7 GiB, so 50 GiB leaves
      about half the volume for restore headroom and the approved hot windows.
      RDS storage cannot shrink in place; do not prepay for an idle 100 GiB.
  PgMaxAllocatedStorage:
    Type: Number
    Default: 200
    Description: >-
      Storage autoscaling ceiling (GiB), used as a fuse rather than a retention
      policy. The archive loop and hot-data windows in the approved design must
      be working before production cutover.
  PgMultiAZ:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >-
      Single-AZ is the initial candidate, not a pre-accepted outage decision.
      The approved design must explicitly accept maintenance/AZ downtime or
      set this true. Multi-AZ can be enabled later without re-migration, at
      roughly twice the database compute/storage cost.
  PgBackupRetentionDays:
    Type: Number
    Default: 14
    Description: >-
      Automated backups + PITR window. The hourly precious-class pgdump to S3
      stays as an independent restore path; it is a disaster backup, not an
      archive of usage/ops/QA rows excluded from that dump.
  PgConnectionAlarmThreshold:
    Type: Number
    Default: 120
    MinValue: 0
    Description: >-
      Maximum DatabaseConnections alarm threshold. 120 covers two briefly
      overlapping blue/green app pools at max_open=50 plus 20 maintenance/job
      connections. Zero remains available to disable the alarm during rehearsal.
  PgMasterPasswordSsmName:
    Type: String
    Default: /tokenkey/prod/stage0/rds-master-password
    Description: >-
      SecureString holding the master user password. Create BEFORE deploying
      this stack (aws ssm put-parameter --type SecureString). The same value
      must later appear as POSTGRES_PASSWORD in the data-layer-env overlay.
      Dynamic reference keeps the secret out of template/parameter history.
  AlarmSnsTopicArn:
    Type: String
    Default: ''
    Description: Optional SNS topic for enabled data-layer alarms (reuse the app-stack/Feishu topic).

Conditions:
  AlarmTopicProvided: !Not [!Equals [!Ref AlarmSnsTopicArn, '']]
  PgIsMultiAZ: !Equals [!Ref PgMultiAZ, 'true']
  PgConnectionAlarmEnabled: !Not [!Equals [!Ref PgConnectionAlarmThreshold, 0]]

Resources:
  DataSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub '${ProjectName} ${Environment} data layer — two private subnets (RDS requires >=2 AZs even for single-AZ instances)'
      SubnetIds: !Split
        - ','
        - Fn::ImportValue: !Sub '${ProjectName}-${Environment}-PrivateSubnetIds'
      Tags:
        - {Key: Project, Value: !Ref ProjectName}
        - {Key: Environment, Value: !Ref Environment}

  DataSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${ProjectName} ${Environment} data layer — ingress ONLY from the app SG (no CIDR rules, no public access)'
      VpcId:
        Fn::ImportValue: !Sub '${ProjectName}-${Environment}-VpcId'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId:
            Fn::ImportValue: !Sub '${ProjectName}-${Environment}-AppSecurityGroupId'
          Description: PostgreSQL from app instances only
      Tags:
        - {Key: Name, Value: !Sub '${ProjectName}-${Environment}-data-sg'}

  # 数据库本体。Retain 双保险：栈删除/替换都不带走数据。
  PgInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      DBInstanceIdentifier: !Sub '${ProjectName}-${Environment}-ledger'
      Engine: postgres
      EngineVersion: !Ref PgEngineVersion
      DBInstanceClass: !Ref PgInstanceClass
      DBName: tokenkey
      MasterUsername: tokenkey
      MasterUserPassword: !Sub '{{resolve:ssm-secure:${PgMasterPasswordSsmName}}}'
      AllocatedStorage: !Ref PgAllocatedStorage
      MaxAllocatedStorage: !Ref PgMaxAllocatedStorage
      StorageType: gp3
      StorageEncrypted: true
      MultiAZ: !If [PgIsMultiAZ, true, false]
      PubliclyAccessible: false
      DBSubnetGroupName: !Ref DataSubnetGroup
      VPCSecurityGroups: [!Ref DataSecurityGroup]
      BackupRetentionPeriod: !Ref PgBackupRetentionDays
      # 低峰锚点跟随仓库既有约定（qa-stale-cleanup timer 04:15 UTC "low-traffic window"）。
      PreferredBackupWindow: 04:30-05:00
      PreferredMaintenanceWindow: sun:05:30-sun:06:30
      AutoMinorVersionUpgrade: true
      CopyTagsToSnapshot: true
      DeletionProtection: true
      EnableCloudwatchLogsExports: [postgresql]
      EnablePerformanceInsights: true
      PerformanceInsightsRetentionPeriod: 7
      Tags:
        - {Key: Project, Value: !Ref ProjectName}
        - {Key: Environment, Value: !Ref Environment}

  # --- 数据层告警（没有告警的托管 = 客户先于你发现故障）---------------------
  PgCpuAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-rds-cpu'
      AlarmDescription: RDS CPU >= 80% for 15 min — check slow queries / consider resize.
      Namespace: AWS/RDS
      MetricName: CPUUtilization
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      DatapointsToAlarm: 3
      Threshold: 80
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: breaching
      Dimensions:
        - {Name: DBInstanceIdentifier, Value: !Ref PgInstance}
      AlarmActions: !If [AlarmTopicProvided, [!Ref AlarmSnsTopicArn], !Ref AWS::NoValue]

  PgConnectionsAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: PgConnectionAlarmEnabled
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-rds-connections'
      AlarmDescription: >-
        RDS connections reached the rehearsal-derived threshold. Check pool
        multiplication and selected-class max_connections before resizing.
      Namespace: AWS/RDS
      MetricName: DatabaseConnections
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 2
      DatapointsToAlarm: 2
      Threshold: !Ref PgConnectionAlarmThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - {Name: DBInstanceIdentifier, Value: !Ref PgInstance}
      AlarmActions: !If [AlarmTopicProvided, [!Ref AlarmSnsTopicArn], !Ref AWS::NoValue]

  PgFreeableMemoryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-rds-freeable-memory'
      AlarmDescription: RDS freeable memory < 1 GiB — investigate pressure and resize before latency degrades.
      Namespace: AWS/RDS
      MetricName: FreeableMemory
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      DatapointsToAlarm: 3
      Threshold: 1073741824
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      Dimensions:
        - {Name: DBInstanceIdentifier, Value: !Ref PgInstance}
      AlarmActions: !If [AlarmTopicProvided, [!Ref AlarmSnsTopicArn], !Ref AWS::NoValue]

  PgFreeStorageAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-rds-free-storage'
      AlarmDescription: >-
        RDS free storage < 20 GiB. Autoscaling buys time up to
        PgMaxAllocatedStorage, but the archive/retention loop is the durable
        control; do not just raise the ceiling.
      Namespace: AWS/RDS
      MetricName: FreeStorageSpace
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      DatapointsToAlarm: 2
      Threshold: 21474836480
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      Dimensions:
        - {Name: DBInstanceIdentifier, Value: !Ref PgInstance}
      AlarmActions: !If [AlarmTopicProvided, [!Ref AlarmSnsTopicArn], !Ref AWS::NoValue]

Outputs:
  PgEndpointAddress:
    Description: Write this as DATABASE_HOST into the data-layer-env SSM overlay (cutover script does it)
    Value: !GetAtt PgInstance.Endpoint.Address
  PgEndpointPort:
    Description: DATABASE_PORT for the overlay
    Value: !GetAtt PgInstance.Endpoint.Port
  PgInstanceIdentifier:
    Description: RDS instance identifier (PITR restore target name base)
    Value: !Ref PgInstance
