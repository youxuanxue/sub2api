AWSTemplateFormatVersion: '2010-09-09'
Description: >
  tokenkey (sub2api fork) Stage 0: single EC2 (Graviton) in 1 AZ + EIP, Caddy +
  app + PostgreSQL + Redis via docker-compose. Daily EBS snapshot via DLM
  (optional hourly).   Self-contained: docker-compose.yml, Caddyfile, and the EC2 bootstrap script
  are gzip+base64 in SSM Parameters; UserData is a thin launcher (≤16 KiB) that
  fetches bootstrap from SSM at first boot. QA/GHCR prune scripts also live in SSM.
  The source repo can stay private.
  Application image is pulled from a GitHub Container Registry (GHCR) private
  repo; the PAT is read from SSM Parameter Store at runtime.

# =============================================================================
# Regenerating embedded blocks:
#   After editing  deploy/aws/stage0/docker-compose.yml,  Caddyfile,  or
#   docker-compose.yml, Caddyfile, tokenkey-qa-stale-cleanup.sh,
#   stage0-ec2-bootstrap.sh, stage0-ec2-userdata-launcher.sub.sh,
#   tokenkey-prune-ghcr-app-tags.sh, run bash deploy/aws/stage0/build-cfn.sh to
#   refresh SSM embeds + the thin UserData launcher (USERDATA_LAUNCHER markers).
#
# Fn::Sub escaping inside the UserData bash:
#   The UserData lives inside Fn::Base64: !Sub | ... so CFN scans it for
#   $-brace references. To get a literal "$VAR" at runtime (for bash), write
#   it as the escaped form (open-brace, exclamation, name, close-brace);
#   CFN renders that as the un-escaped form before the EC2 instance sees it.
#   To pass a CFN parameter through, write the un-escaped form directly,
#   e.g. ApiDomain.
# =============================================================================

Parameters:
  ProjectName:
    Type: String
    Default: tokenkey
  Environment:
    Type: String
    Default: prod
    AllowedPattern: '^[a-z0-9-]+$'
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
  PublicSubnetCidr:
    Type: String
    Default: 10.0.1.0/24

  ApiDomain:
    Type: String
    AllowedPattern: '^[a-z0-9.-]+\.[a-z]{2,}$'
    Description: "REQUIRED. Public hostname (DNS A-record must point to the EIP). Caddy will request a Let's Encrypt cert for it. Example: api.tokenkey.dev"
  AcmeEmail:
    Type: String
    AllowedPattern: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
    Description: "REQUIRED. Contact email for Let's Encrypt account (used for cert expiry notices)."
  AdminEmail:
    Type: String
    Default: ''
    Description: Optional admin email; if empty, defaults to admin@<ApiDomain> at runtime.
  Timezone:
    Type: String
    Default: UTC

  InstanceType:
    Type: String
    Default: t4g.small
    AllowedValues:
      - t4g.small
      - t4g.medium
      - t4g.large
    Description: Graviton/ARM only (matches AL2023 ARM AMI parameter below).
  RootVolumeSizeGiB:
    Type: Number
    Default: 30
    MinValue: 20
    MaxValue: 200
  DataVolumeSizeGiB:
    Type: Number
    Default: 50
    MinValue: 20
    MaxValue: 500
    Description: |
      Size of the dedicated data EBS volume that persists PostgreSQL, Redis,
      Caddy state, and bootstrap secrets across instance replacement
      (DeletionPolicy: Retain + UpdateReplacePolicy: Retain). When the EC2
      instance is replaced (e.g. by an ImageTag CFN change — see issue #8 +
      persistent data volume hardening), this volume detaches and re-attaches to the new
      instance with all data intact, instead of being thrown away with the
      old root EBS. Sized for prod organic growth: live PostgreSQL + ~1.5 days
      of QA blobs + 6 hourly pgdump retained copies; 30 GiB proved too tight.
  AmazonLinux2023Arm64Ami:
    Type: AWS::EC2::Image::Id
    Default: ami-0b183bb1259186479
    Description: >-
      Pinned AL2023 ARM64 AMI id (us-east-1). DELIBERATELY pinned, NOT the SSM
      `latest` alias: the SSM-resolved type re-resolves to the newest AMI on
      every stack update, so any unrelated UpdateStack (a param tweak, a volume
      grow) changes ImageId -> RequiresRecreation=Always -> the EC2 instance is
      REPLACED and cloud-init reinstalls whatever `ImageTag` the stack carries
      (prod runs SSM-hot-deployed images, so ImageTag lags) -- turning a
      one-line param change into a version regression + EIP churn. Pinning makes
      the AMI behave like ImageTag: stable across updates, bumped on purpose. To
      bump: read the latest from SSM
      (/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64),
      set it here, and plan a maintenance-window instance replacement that syncs
      ImageTag in the same op.

  AdminCidr:
    Type: String
    Default: 127.0.0.1/32
    Description: CIDR allowed to reach SSH (22). Default 127.0.0.1/32 = raw SSH disabled; operate via SSM Session Manager. Widen only for break-glass.

  GhcrOwner:
    Type: String
    AllowedPattern: '^[A-Za-z0-9](?:[A-Za-z0-9-]{0,38}[A-Za-z0-9])?$'
    Description: REQUIRED. GitHub user / org that owns the GHCR image (image will be ghcr.io/<GhcrOwner>/<GhcrImageName>:<ImageTag>).
  GhcrImageName:
    Type: String
    Default: sub2api
    Description: GHCR image name (matches the upstream package name; do not rename for fork).
  ImageTag:
    Type: String
    Default: latest
    Description: |
      GHCR image tag. GoReleaser publishes `:latest`, `:<MAJOR>`, `:<MAJOR.MINOR>`,
      and `:<MAJOR.MINOR.PATCH>` on every `git tag vX.Y.Z` push.
      Recommended:
        - tokenkey-prod stack: pin to an immutable semver tag in CFN (for reproducible stack state).
      `main` is NOT a valid tag — Release workflow only fires on `tags: v*`, not on main branch pushes.
  GhcrPullUser:
    Type: String
    AllowedPattern: '^[A-Za-z0-9](?:[A-Za-z0-9-]{0,38}[A-Za-z0-9])?$'
    Description: REQUIRED. GitHub username used for `docker login ghcr.io`. Usually the same as GhcrOwner, or a dedicated machine user.
  GhcrPatSsmName:
    Type: String
    Default: /tokenkey/ghcr/pat
    Description: SSM Parameter Store path (SecureString) holding the GHCR PAT (read:packages scope is enough). Create it ONCE before stack create.

  SnapshotSchedule:
    Type: String
    Default: daily
    AllowedValues: [daily, hourly]
    Description: EBS snapshot cadence (daily=1x/day keep 7; hourly=1x/hour keep 168 = 7 days).

  AlarmSnsTopicArn:
    Type: String
    Default: ''
    Description: >-
      Optional SNS topic ARN subscribed to DataVolumeDiskAlarm (email/Slack).
      Leave empty to create the alarm without notifications.

  QaStaleRetentionDays:
    Type: Number
    Default: 1.5
    MinValue: 0
    MaxValue: 90
    Description: >
      Daily QA safety-net: remove qa_records rows and on-disk files under
      /var/lib/tokenkey/app/qa_blobs and qa_dlq older than this many days
      (fractional days allowed, e.g. 1.5). Same surfaces as
      ops/prod/qa-export-and-purge.sh (plus age-filtered qa_records DELETE).
      Set to 0 to disable the timer (script no-ops).

Conditions:
  IsHourlySnapshots: !Equals [!Ref SnapshotSchedule, hourly]
  AlarmTopicProvided: !Not [!Equals [!Ref AlarmSnsTopicArn, '']]

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - {Key: Name, Value: !Sub '${ProjectName}-${Environment}-vpc'}
        - {Key: Project, Value: !Ref ProjectName}
        - {Key: Environment, Value: !Ref Environment}

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - {Key: Name, Value: !Sub '${ProjectName}-${Environment}-igw'}

  IGWAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PublicSubnetCidr
      MapPublicIpOnLaunch: true
      Tags:
        - {Key: Name, Value: !Sub '${ProjectName}-${Environment}-public'}
        - {Key: Tier, Value: public}

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - {Key: Name, Value: !Sub '${ProjectName}-${Environment}-public-rt'}

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttach
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: tokenkey Stage 0 - public 443 only; SSH from AdminCidr (default disabled, SSM only)
      VpcId: !Ref VPC
      SecurityGroupIngress:
        # Public port 80 intentionally NOT opened: certs use TLS-ALPN-01 on 443
        # (Caddyfile disable_http_challenge), so HTTP-01 / the :80 redirect is unneeded.
        - {IpProtocol: tcp, FromPort: 443, ToPort: 443, CidrIp: 0.0.0.0/0, Description: HTTPS (business + ACME TLS-ALPN-01)}
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AdminCidr
          Description: SSH (default 127.0.0.1/32 = disabled; operate via SSM Session Manager)
      Tags:
        - {Key: Name, Value: !Sub '${ProjectName}-${Environment}-sg'}

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: ec2.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: ReadGhcrPat
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GhcrPatSsmName}'
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: '*'
                Condition:
                  StringEquals:
                    'kms:ViaService': !Sub 'ssm.${AWS::Region}.amazonaws.com'
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: '*'
              - Effect: Allow
                Action:
                  - ec2:DescribeVolumes
                Resource: '*'
              - Effect: Allow
                Action:
                  - ec2:AttachVolume
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:volume/*'
                  - !Sub 'arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:instance/*'
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/${Environment}/stage0/*'
              # Off-box the .env SECRETS (POSTGRES_PASSWORD/JWT_SECRET/TOTP_ENCRYPTION_KEY)
              # to an SSM SecureString via ops/stage0/backup-env-secrets-via-ssm.sh. Only
              # PutParameter is new here — GetParameter on this param is already covered by
              # the stage0/* read above. This is the DURABLE home for the grant (survives
              # instance/role replacement). Until the prod stack is next CFN-updated, the
              # identical grant is mirrored as a manual inline policy (EnvSecretsBackup) on
              # this role via the IAM console — see RUNBOOK §4.4 / the ops script header.
              - Effect: Allow
                Action:
                  - ssm:PutParameter
                Resource: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/${Environment}/stage0/env-secrets-backup'
      Tags:
        - {Key: Project, Value: !Ref ProjectName}

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref InstanceRole]

  # Large gzip+base64 payloads live in SSM (Standard ≤4096 each) so EC2 UserData stays ≤16 KiB.
  TokenkeyStage0ComposeGzipB64Parameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${ProjectName}/${Environment}/stage0/docker-compose.gzip.b64'
      Type: String
      Tier: Standard
      Description: !Sub '${ProjectName} Stage0 gzip|base64(docker-compose.yml)'
      # >>> COMPOSE_GZB64_SSM START (regenerated by build-cfn.sh) <<<
      Value: ''
      # >>> COMPOSE_GZB64_SSM END <<<

  TokenkeyStage0CaddyGzipB64Parameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${ProjectName}/${Environment}/stage0/caddyfile.template.gzip.b64'
      Type: String
      Tier: Standard
      Description: !Sub '${ProjectName} Stage0 gzip|base64(Caddyfile)'
      # >>> CADDY_GZB64_SSM START (regenerated by build-cfn.sh) <<<
      Value: ''
      # >>> CADDY_GZB64_SSM END <<<

  TokenkeyQaStaleCleanupScriptB64Parameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${ProjectName}/${Environment}/stage0/qa-stale-cleanup.b64'
      Type: String
      Tier: Standard
      Description: !Sub '${ProjectName} Stage0 tokenkey-qa-stale-cleanup.sh as base64; refresh via build-cfn.sh'
      # >>> QA_CLEANUP_B64_PARAM START (regenerated by build-cfn.sh) <<<
      Value: ''
      # >>> QA_CLEANUP_B64_PARAM END <<<

  TokenkeyPgdumpScriptB64Parameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${ProjectName}/${Environment}/stage0/pgdump.b64'
      Type: String
      Tier: Standard
      Description: !Sub '${ProjectName} Stage0 tokenkey-pgdump.sh as base64; refresh via build-cfn.sh'
      # >>> PGDUMP_B64_PARAM START (regenerated by build-cfn.sh) <<<
      Value: ''
      # >>> PGDUMP_B64_PARAM END <<<

  TokenkeyGhcrPruneScriptB64Parameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${ProjectName}/${Environment}/stage0/ghcr-prune.b64'
      Type: String
      Tier: Standard
      Description: !Sub '${ProjectName} Stage0 tokenkey-prune-ghcr-app-tags.sh as base64; refresh via build-cfn.sh'
      # >>> GHCR_PRUNE_B64_PARAM START (regenerated by build-cfn.sh) <<<
      Value: ''
      # >>> GHCR_PRUNE_B64_PARAM END <<<

  TokenkeyStage0BootstrapGzipB64Part1Parameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${ProjectName}/${Environment}/stage0/bootstrap.sh.gzip.b64.part1'
      Type: String
      Tier: Standard
      Description: !Sub '${ProjectName} Stage0 bootstrap.sh gzip|base64 part 1; refresh via build-cfn.sh'
      # >>> BOOTSTRAP_GZB64_SSM_PART1 START (regenerated by build-cfn.sh) <<<
      Value: ''
      # >>> BOOTSTRAP_GZB64_SSM_PART1 END <<<

  TokenkeyStage0BootstrapGzipB64Part2Parameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${ProjectName}/${Environment}/stage0/bootstrap.sh.gzip.b64.part2'
      Type: String
      Tier: Standard
      Description: !Sub '${ProjectName} Stage0 bootstrap.sh gzip|base64 part 2; refresh via build-cfn.sh'
      # >>> BOOTSTRAP_GZB64_SSM_PART2 START (regenerated by build-cfn.sh) <<<
      Value: ''
      # >>> BOOTSTRAP_GZB64_SSM_PART2 END <<<

  ElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: IGWAttach
    Properties:
      Domain: vpc
      Tags:
        - {Key: Name, Value: !Sub '${ProjectName}-${Environment}-eip'}

  Instance:
    Type: AWS::EC2::Instance
    DependsOn:
      - IGWAttach
      - DataVolume
      - TokenkeyStage0ComposeGzipB64Parameter
      - TokenkeyStage0CaddyGzipB64Parameter
      - TokenkeyQaStaleCleanupScriptB64Parameter
      - TokenkeyPgdumpScriptB64Parameter
      - TokenkeyGhcrPruneScriptB64Parameter
      - TokenkeyStage0BootstrapGzipB64Part1Parameter
      - TokenkeyStage0BootstrapGzipB64Part2Parameter
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AmazonLinux2023Arm64Ami
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds: [!Ref AppSecurityGroup]
      IamInstanceProfile: !Ref InstanceProfile
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeType: gp3
            VolumeSize: !Ref RootVolumeSizeGiB
            DeleteOnTermination: false
            Encrypted: true
      Tags:
        - {Key: Name, Value: !Sub '${ProjectName}-${Environment}-app'}
        - {Key: Project, Value: !Ref ProjectName}
        - {Key: Environment, Value: !Ref Environment}
        - {Key: Backup, Value: stage0}
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # Thin EC2 UserData launcher — embedded in stage0-single-ec2.yaml via build-cfn.sh.
          # Fn::Sub replaces ${ApiDomain} etc; bash uses ${!TK_*} for runtime expansion.
          set -euxo pipefail
          exec > >(tee -a /var/log/tokenkey-bootstrap.log) 2>&1
          
          export TK_API_DOMAIN='${ApiDomain}'
          export TK_ACME_EMAIL='${AcmeEmail}'
          export TK_ADMIN_EMAIL='${AdminEmail}'
          export TK_TZ='${Timezone}'
          export TK_AWS_REGION='${AWS::Region}'
          export TK_GHCR_OWNER='${GhcrOwner}'
          export TK_GHCR_IMAGE_NAME='${GhcrImageName}'
          export TK_IMAGE_TAG='${ImageTag}'
          export TK_GHCR_PULL_USER='${GhcrPullUser}'
          export TK_GHCR_PAT_SSM_NAME='${GhcrPatSsmName}'
          export TK_DATA_VOLUME_ID='${DataVolume}'
          export TK_PROJECT_NAME='${ProjectName}'
          export TK_ENVIRONMENT='${Environment}'
          export TK_QA_STALE_RETENTION_DAYS='${QaStaleRetentionDays}'
          export TK_TOKENKEY_IMAGE="ghcr.io/${GhcrOwner}/${GhcrImageName}:${ImageTag}"
          export TK_STAGE0_PREFIX='/${ProjectName}/${Environment}/stage0'
          
          B64=""
          B64+="$(aws ssm get-parameter --name "${!TK_STAGE0_PREFIX}/bootstrap.sh.gzip.b64.part1" --region "${!TK_AWS_REGION}" --query Parameter.Value --output text)"
          B64+="$(aws ssm get-parameter --name "${!TK_STAGE0_PREFIX}/bootstrap.sh.gzip.b64.part2" --region "${!TK_AWS_REGION}" --query Parameter.Value --output text)"
          TMP="$(mktemp)"
          cleanup() { rm -f "${!TMP}"; }
          trap cleanup EXIT
          printf '%s' "${!B64}" | base64 -d | gunzip > "${!TMP}"
          chmod +x "${!TMP}"
          exec bash "${!TMP}"


  # ---------------------------------------------------------------------------
  # Persistent data volume (persistent data volume hardening / issue #8)
  # ---------------------------------------------------------------------------
  # DeletionPolicy: Retain   — preserved if the stack is deleted (manual cleanup)
  # UpdateReplacePolicy: Retain — preserved if a property change forces volume
  #                              replacement; the old volume is kept and a new
  #                              one is created (operator must reconcile).
  # AvailabilityZone — must equal the instance's AZ; both are pinned to the
  #                    first AZ via !Select [0, !GetAZs ''].
  # The attach + mount is performed by UserData (see "data volume" section).
  # All /var/lib/tokenkey/{postgres,redis,caddy,app,pgdump,.env.secret} state
  # lives here, so that EC2 instance replacement (e.g. ImageTag CFN parameter
  # change → UserData re-substitution → BlockDeviceMappings churn → root EBS
  # thrown away) NO LONGER destroys application data.
  DataVolume:
    Type: AWS::EC2::Volume
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AvailabilityZone: !Select [0, !GetAZs '']
      Size: !Ref DataVolumeSizeGiB
      VolumeType: gp3
      Encrypted: true
      Tags:
        - {Key: Name, Value: !Sub '${ProjectName}-${Environment}-data'}
        - {Key: Project, Value: !Ref ProjectName}
        - {Key: Environment, Value: !Ref Environment}
        - {Key: Backup, Value: stage0}
        - {Key: Purpose, Value: 'tokenkey-state-postgres-redis-caddy'}

  EIPAssoc:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt ElasticIP.AllocationId
      InstanceId: !Ref Instance

  # --- DLM: automated EBS snapshots (daily by default, optional hourly) -------
  DLMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: dlm.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSDataLifecycleManagerServiceRole

  SnapshotPolicy:
    Type: AWS::DLM::LifecyclePolicy
    Properties:
      Description: !Sub '${ProjectName} Stage 0 EBS snapshot policy'
      State: ENABLED
      ExecutionRoleArn: !GetAtt DLMRole.Arn
      PolicyDetails:
        PolicyType: EBS_SNAPSHOT_MANAGEMENT
        ResourceTypes: [INSTANCE]
        TargetTags:
          - {Key: Backup, Value: stage0}
        Schedules:
          - Name: !If [IsHourlySnapshots, hourly-7d, daily-7d]
            CopyTags: true
            TagsToAdd:
              - {Key: snapshot-by, Value: dlm}
              - {Key: snapshot-cadence, Value: !Ref SnapshotSchedule}
            CreateRule:
              Interval: !If [IsHourlySnapshots, 1, 24]
              IntervalUnit: HOURS
              Times: !If [IsHourlySnapshots, !Ref AWS::NoValue, ['03:00']]
            RetainRule:
              Count: !If [IsHourlySnapshots, 168, 7]

  DataVolumeDiskAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-data-volume-used'
      AlarmDescription: >-
        tokenkey DataVolume (/var/lib/tokenkey) critical — act immediately (trim pgdump/logs or expand vol).
      Namespace: tokenkey/EC2
      MetricName: DataVolumeUsedPercent
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      DatapointsToAlarm: 2
      # High threshold = few false positives; pair with 24h pg_dump retention + metrics timer.
      Threshold: 90
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: InstanceId
          Value: !Ref Instance
      AlarmActions: !If [AlarmTopicProvided, [!Ref AlarmSnsTopicArn], !Ref AWS::NoValue]

Outputs:
  PublicIP:
    Description: Elastic IP - set this as the A record for ApiDomain
    Value: !Ref ElasticIP
  InstanceId:
    Description: EC2 instance ID
    Value: !Ref Instance
  DataVolumeId:
    Description: |
      Persistent EBS data volume (DeletionPolicy: Retain). Snapshot this for
      backup, and reference it when migrating an existing root-volume stack to
      the new layout (persistent data volume hardening runbook).
    Value: !Ref DataVolume
  ApiUrl:
    Description: After DNS A-record propagation + LE issuance
    Value: !Sub 'https://${ApiDomain}'
  SsmStartSession:
    Description: Open shell without SSH key
    Value: !Sub 'aws ssm start-session --region ${AWS::Region} --target ${Instance}'
  SnapshotPolicyId:
    Description: DLM lifecycle policy ID
    Value: !Ref SnapshotPolicy
  ResolvedImage:
    Description: Image reference that the EC2 instance will pull from GHCR
    Value: !Sub 'ghcr.io/${GhcrOwner}/${GhcrImageName}:${ImageTag}'
  DataVolumeDiskAlarmName:
    Description: CloudWatch alarm for DataVolume utilization (tokenkey/EC2 DataVolumeUsedPercent)
    Value: !Ref DataVolumeDiskAlarm
