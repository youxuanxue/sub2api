AWSTemplateFormatVersion: '2010-09-09'
Description: >
  tokenkey (sub2api fork) Stage 0: single EC2 (Graviton) in 1 AZ + EIP, Caddy +
  app + PostgreSQL + Redis via docker-compose. Daily EBS snapshot via DLM
  (optional hourly). Self-contained: docker-compose.yml and Caddyfile are
  embedded in UserData (gzip+base64); QA cleanup script is shipped as base64 in
  an SSM Parameter (bootstrapping reads it) so UserData stays under EC2 limits.
  The source repo can stay private.
  Application image is pulled from a GitHub Container Registry (GHCR) private
  repo; the PAT is read from SSM Parameter Store at runtime.

# =============================================================================
# Regenerating embedded blocks:
#   After editing  deploy/aws/stage0/docker-compose.yml,  Caddyfile,  or
#   docker-compose.yml, Caddyfile, tokenkey-qa-stale-cleanup.sh,
#   tokenkey-prune-ghcr-app-tags.sh, run
#   bash deploy/aws/stage0/build-cfn.sh to refresh SSM Parameter Value markers
#   (COMPOSE_GZB64_SSM / CADDY_GZB64_SSM / QA_CLEANUP_B64_PARAM / GHCR_PRUNE_B64_PARAM).
#
# Fn::Sub escaping inside the UserData bash:
#   The UserData lives inside Fn::Base64: !Sub | ... so CFN scans it for
#   $-brace references. To get a literal "$VAR" at runtime (for bash), write
#   it as the escaped form (open-brace, exclamation, name, close-brace);
#   CFN renders that as the un-escaped form before the EC2 instance sees it.
#   To pass a CFN parameter through, write the un-escaped form directly,
#   e.g. ApiDomain.
# =============================================================================

Parameters:
  ProjectName:
    Type: String
    Default: tokenkey
  Environment:
    Type: String
    Default: prod
    AllowedPattern: '^[a-z0-9-]+$'
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
  PublicSubnetCidr:
    Type: String
    Default: 10.0.1.0/24

  ApiDomain:
    Type: String
    AllowedPattern: '^[a-z0-9.-]+\.[a-z]{2,}$'
    Description: "REQUIRED. Public hostname (DNS A-record must point to the EIP). Caddy will request a Let's Encrypt cert for it. Example: api.tokenkey.dev"
  AcmeEmail:
    Type: String
    AllowedPattern: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
    Description: "REQUIRED. Contact email for Let's Encrypt account (used for cert expiry notices)."
  AdminEmail:
    Type: String
    Default: ''
    Description: Optional admin email; if empty, defaults to admin@<ApiDomain> at runtime.
  Timezone:
    Type: String
    Default: UTC

  InstanceType:
    Type: String
    Default: t4g.small
    AllowedValues:
      - t4g.small
      - t4g.medium
      - t4g.large
    Description: Graviton/ARM only (matches AL2023 ARM AMI parameter below).
  RootVolumeSizeGiB:
    Type: Number
    Default: 30
    MinValue: 20
    MaxValue: 200
  DataVolumeSizeGiB:
    Type: Number
    Default: 30
    MinValue: 20
    MaxValue: 500
    Description: |
      Size of the dedicated data EBS volume that persists PostgreSQL, Redis,
      Caddy state, and bootstrap secrets across instance replacement
      (DeletionPolicy: Retain + UpdateReplacePolicy: Retain). When the EC2
      instance is replaced (e.g. by an ImageTag CFN change — see issue #8 +
      persistent data volume hardening), this volume detaches and re-attaches to the new
      instance with all data intact, instead of being thrown away with the
      old root EBS. Default 30 GiB matches the prior root-EBS data layout.
  AmazonLinux2023Arm64Ami:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64
    Description: SSM parameter that always resolves to the latest AL2023 ARM64 AMI in the current region.

  AdminCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR allowed to reach SSH (22). Prefer SSM Session Manager. To fully disable raw SSH, set to 127.0.0.1/32.

  GhcrOwner:
    Type: String
    AllowedPattern: '^[A-Za-z0-9](?:[A-Za-z0-9-]{0,38}[A-Za-z0-9])?$'
    Description: REQUIRED. GitHub user / org that owns the GHCR image (image will be ghcr.io/<GhcrOwner>/<GhcrImageName>:<ImageTag>).
  GhcrImageName:
    Type: String
    Default: sub2api
    Description: GHCR image name (matches the upstream package name; do not rename for fork).
  ImageTag:
    Type: String
    Default: latest
    Description: |
      GHCR image tag. GoReleaser publishes `:latest`, `:<MAJOR>`, `:<MAJOR.MINOR>`,
      and `:<MAJOR.MINOR.PATCH>` on every `git tag vX.Y.Z` push.
      Recommended:
        - tokenkey-prod stack: pin to an immutable semver tag in CFN (for reproducible stack state).
      `main` is NOT a valid tag — Release workflow only fires on `tags: v*`, not on main branch pushes.
  GhcrPullUser:
    Type: String
    AllowedPattern: '^[A-Za-z0-9](?:[A-Za-z0-9-]{0,38}[A-Za-z0-9])?$'
    Description: REQUIRED. GitHub username used for `docker login ghcr.io`. Usually the same as GhcrOwner, or a dedicated machine user.
  GhcrPatSsmName:
    Type: String
    Default: /tokenkey/ghcr/pat
    Description: SSM Parameter Store path (SecureString) holding the GHCR PAT (read:packages scope is enough). Create it ONCE before stack create.

  SnapshotSchedule:
    Type: String
    Default: daily
    AllowedValues: [daily, hourly]
    Description: EBS snapshot cadence (daily=1x/day keep 7; hourly=1x/hour keep 168 = 7 days).

  AlarmSnsTopicArn:
    Type: String
    Default: ''
    Description: >-
      Optional SNS topic ARN subscribed to DataVolumeDiskAlarm (email/Slack).
      Leave empty to create the alarm without notifications.

  QaStaleRetentionDays:
    Type: Number
    Default: 1.5
    MinValue: 0
    MaxValue: 90
    Description: >
      Daily QA safety-net: remove qa_records rows and on-disk files under
      /var/lib/tokenkey/app/qa_blobs and qa_dlq older than this many days
      (fractional days allowed, e.g. 1.5). Same surfaces as
      ops/prod/qa-export-and-purge.sh (plus age-filtered qa_records DELETE).
      Set to 0 to disable the timer (script no-ops).

Conditions:
  IsHourlySnapshots: !Equals [!Ref SnapshotSchedule, hourly]
  AlarmTopicProvided: !Not [!Equals [!Ref AlarmSnsTopicArn, '']]

Resources:
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - {Key: Name, Value: !Sub '${ProjectName}-${Environment}-vpc'}
        - {Key: Project, Value: !Ref ProjectName}
        - {Key: Environment, Value: !Ref Environment}

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - {Key: Name, Value: !Sub '${ProjectName}-${Environment}-igw'}

  IGWAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      AvailabilityZone: !Select [0, !GetAZs '']
      CidrBlock: !Ref PublicSubnetCidr
      MapPublicIpOnLaunch: true
      Tags:
        - {Key: Name, Value: !Sub '${ProjectName}-${Environment}-public'}
        - {Key: Tier, Value: public}

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - {Key: Name, Value: !Sub '${ProjectName}-${Environment}-public-rt'}

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttach
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: tokenkey Stage 0 - public 80/443; SSH from AdminCidr only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - {IpProtocol: tcp, FromPort: 80,  ToPort: 80,  CidrIp: 0.0.0.0/0, Description: HTTP (LE HTTP-01 + redirect)}
        - {IpProtocol: tcp, FromPort: 443, ToPort: 443, CidrIp: 0.0.0.0/0, Description: HTTPS}
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AdminCidr
          Description: SSH (prefer SSM Session Manager)
      Tags:
        - {Key: Name, Value: !Sub '${ProjectName}-${Environment}-sg'}

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: ec2.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: ReadGhcrPat
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${GhcrPatSsmName}'
              - Effect: Allow
                Action:
                  - kms:Decrypt
                Resource: '*'
                Condition:
                  StringEquals:
                    'kms:ViaService': !Sub 'ssm.${AWS::Region}.amazonaws.com'
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: '*'
              - Effect: Allow
                Action:
                  - ec2:DescribeVolumes
                Resource: '*'
              - Effect: Allow
                Action:
                  - ec2:AttachVolume
                Resource:
                  - !Sub 'arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:volume/*'
                  - !Sub 'arn:${AWS::Partition}:ec2:${AWS::Region}:${AWS::AccountId}:instance/*'
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                Resource: !Sub 'arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${ProjectName}/${Environment}/stage0/*'
      Tags:
        - {Key: Project, Value: !Ref ProjectName}

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref InstanceRole]

  # Large gzip+base64 payloads live in SSM (Standard ≤4096 each) so EC2 UserData stays ≤16 KiB.
  TokenkeyStage0ComposeGzipB64Parameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${ProjectName}/${Environment}/stage0/docker-compose.gzip.b64'
      Type: String
      Tier: Standard
      Description: !Sub '${ProjectName} Stage0 gzip|base64(docker-compose.yml)'
      # >>> COMPOSE_GZB64_SSM START (regenerated by build-cfn.sh) <<<
      Value: ''
      # >>> COMPOSE_GZB64_SSM END <<<

  TokenkeyStage0CaddyGzipB64Parameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${ProjectName}/${Environment}/stage0/caddyfile.template.gzip.b64'
      Type: String
      Tier: Standard
      Description: !Sub '${ProjectName} Stage0 gzip|base64(Caddyfile)'
      # >>> CADDY_GZB64_SSM START (regenerated by build-cfn.sh) <<<
      Value: ''
      # >>> CADDY_GZB64_SSM END <<<

  TokenkeyQaStaleCleanupScriptB64Parameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${ProjectName}/${Environment}/stage0/qa-stale-cleanup.b64'
      Type: String
      Tier: Standard
      Description: !Sub '${ProjectName} Stage0 tokenkey-qa-stale-cleanup.sh as base64; refresh via build-cfn.sh'
      # >>> QA_CLEANUP_B64_PARAM START (regenerated by build-cfn.sh) <<<
      Value: ''
      # >>> QA_CLEANUP_B64_PARAM END <<<

  TokenkeyGhcrPruneScriptB64Parameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub '/${ProjectName}/${Environment}/stage0/ghcr-prune.b64'
      Type: String
      Tier: Standard
      Description: !Sub '${ProjectName} Stage0 tokenkey-prune-ghcr-app-tags.sh as base64; refresh via build-cfn.sh'
      # >>> GHCR_PRUNE_B64_PARAM START (regenerated by build-cfn.sh) <<<
      Value: ''
      # >>> GHCR_PRUNE_B64_PARAM END <<<

  ElasticIP:
    Type: AWS::EC2::EIP
    DependsOn: IGWAttach
    Properties:
      Domain: vpc
      Tags:
        - {Key: Name, Value: !Sub '${ProjectName}-${Environment}-eip'}

  Instance:
    Type: AWS::EC2::Instance
    DependsOn:
      - IGWAttach
      - DataVolume
      - TokenkeyStage0ComposeGzipB64Parameter
      - TokenkeyStage0CaddyGzipB64Parameter
      - TokenkeyQaStaleCleanupScriptB64Parameter
      - TokenkeyGhcrPruneScriptB64Parameter
    Properties:
      InstanceType: !Ref InstanceType
      ImageId: !Ref AmazonLinux2023Arm64Ami
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds: [!Ref AppSecurityGroup]
      IamInstanceProfile: !Ref InstanceProfile
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeType: gp3
            VolumeSize: !Ref RootVolumeSizeGiB
            DeleteOnTermination: false
            Encrypted: true
      Tags:
        - {Key: Name, Value: !Sub '${ProjectName}-${Environment}-app'}
        - {Key: Project, Value: !Ref ProjectName}
        - {Key: Environment, Value: !Ref Environment}
        - {Key: Backup, Value: stage0}
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # tokenkey Stage 0 bootstrap (inlined; no external repo fetch).
          # See the Fn::Sub escaping notes at the top of this CFN template.
          set -euxo pipefail
          exec > >(tee -a /var/log/tokenkey-bootstrap.log) 2>&1

          API_DOMAIN='${ApiDomain}'
          ACME_EMAIL='${AcmeEmail}'
          ADMIN_EMAIL='${AdminEmail}'
          [ -z "${!ADMIN_EMAIL}" ] && ADMIN_EMAIL="admin@${!API_DOMAIN}"
          TZ_VALUE='${Timezone}'
          REGION='${AWS::Region}'
          GHCR_OWNER='${GhcrOwner}'
          GHCR_IMAGE_NAME='${GhcrImageName}'
          IMAGE_TAG='${ImageTag}'
          GHCR_PULL_USER='${GhcrPullUser}'
          GHCR_PAT_SSM_NAME='${GhcrPatSsmName}'
          TOKENKEY_IMAGE="ghcr.io/${!GHCR_OWNER}/${!GHCR_IMAGE_NAME}:${!IMAGE_TAG}"

          # --- 1. system packages -------------------------------------------------
          dnf -y update
          dnf -y install docker git jq gettext openssl
          ARCH="$(uname -m)"
          case "${!ARCH}" in
            aarch64) CWA_ARCH="arm64" ;;
            x86_64)  CWA_ARCH="amd64" ;;
            *) echo "unsupported arch ${!ARCH}" >&2; exit 1 ;;
          esac
          dnf -y install "https://s3.amazonaws.com/amazoncloudwatch-agent/amazon_linux/${!CWA_ARCH}/latest/amazon-cloudwatch-agent.rpm" || true
          systemctl enable --now docker

          # Compose v2 plugin (AL2023 dnf has no docker-compose-plugin)
          DOCKER_COMPOSE_VERSION="v2.29.7"
          mkdir -p /usr/local/lib/docker/cli-plugins
          curl -fsSL "https://github.com/docker/compose/releases/download/${!DOCKER_COMPOSE_VERSION}/docker-compose-linux-$(uname -m)" \
            -o /usr/local/lib/docker/cli-plugins/docker-compose
          chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
          usermod -aG docker ec2-user

          # --- 2a. attach + mount persistent data volume (persistent data volume hardening) -
          # Attach is done here instead of AWS::EC2::VolumeAttachment. During
          # instance replacement CloudFormation creates the new instance before
          # deleting the old attachment; a separate VolumeAttachment resource
          # therefore races with the still-attached EBS volume and fails with
          # AlreadyExists. UserData can wait until the old instance releases it.
          DATA_VOLUME_ID='${DataVolume}'
          DATA_DEVICE='/dev/sdf'
          IMDS_TOKEN="$(curl -fsS -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")"
          INSTANCE_ID="$(curl -fsS -H "X-aws-ec2-metadata-token: ${!IMDS_TOKEN}" http://169.254.169.254/latest/meta-data/instance-id)"
          ATTACHED_TO=""
          ATTACH_STATE=""
          for attempt in $(seq 1 90); do
            read -r ATTACHED_TO ATTACH_STATE < <(aws ec2 describe-volumes \
              --region "${!REGION}" \
              --volume-ids "${!DATA_VOLUME_ID}" \
              --query 'Volumes[0].Attachments[0].[InstanceId,State]' \
              --output text 2>/dev/null || echo "None None")
            if [ "${!ATTACHED_TO}" = "${!INSTANCE_ID}" ]; then
              echo "tokenkey data volume ${!DATA_VOLUME_ID} already attached to this instance (${!ATTACH_STATE})"
              break
            fi
            if [ -z "${!ATTACHED_TO}" ] || [ "${!ATTACHED_TO}" = "None" ]; then
              echo "attaching tokenkey data volume ${!DATA_VOLUME_ID} to ${!INSTANCE_ID}"
              aws ec2 attach-volume \
                --region "${!REGION}" \
                --volume-id "${!DATA_VOLUME_ID}" \
                --instance-id "${!INSTANCE_ID}" \
                --device "${!DATA_DEVICE}"
              break
            fi
            echo "waiting for tokenkey data volume ${!DATA_VOLUME_ID}; currently ${!ATTACH_STATE} on ${!ATTACHED_TO}"
            sleep 10
          done
          if [ "${!ATTACHED_TO}" != "${!INSTANCE_ID}" ]; then
            for attempt in $(seq 1 60); do
              read -r ATTACHED_TO ATTACH_STATE < <(aws ec2 describe-volumes \
                --region "${!REGION}" \
                --volume-ids "${!DATA_VOLUME_ID}" \
                --query 'Volumes[0].Attachments[0].[InstanceId,State]' \
                --output text 2>/dev/null || echo "None None")
              [ "${!ATTACHED_TO}" = "${!INSTANCE_ID}" ] && break
              sleep 5
            done
          fi
          if [ "${!ATTACHED_TO}" != "${!INSTANCE_ID}" ]; then
            echo "FATAL: tokenkey data volume ${!DATA_VOLUME_ID} did not attach to ${!INSTANCE_ID}" >&2
            exit 1
          fi

          # On AL2023 NVMe, /dev/sdf surfaces as /dev/nvme1n1 (or another
          # non-root nvme device). Wait for the kernel to enumerate it.
          DATA_DEV=""
          for attempt in 1 2 3 4 5 6 7 8 9; do
            for cand in /dev/nvme1n1 /dev/nvme2n1 /dev/nvme3n1 /dev/xvdf /dev/sdf; do
              if [ -b "${!cand}" ]; then
                # Skip if this is the root device (e.g. nvme0n1 is always root)
                ROOT_DEV="$(findmnt -no SOURCE / | sed 's/p[0-9]*$//')"
                if [ "${!cand}" != "${!ROOT_DEV}" ]; then
                  DATA_DEV="${!cand}"
                  break
                fi
              fi
            done
            [ -n "${!DATA_DEV}" ] && break
            sleep 10
          done
          if [ -z "${!DATA_DEV}" ]; then
            echo "FATAL: tokenkey data volume not attached within 90s" >&2
            exit 1
          fi
          echo "tokenkey data volume detected at ${!DATA_DEV}"

          # Format the volume only if it has no filesystem (first boot).
          # blkid exits 2 when the device has no recognised superblock.
          if ! blkid "${!DATA_DEV}" >/dev/null 2>&1; then
            echo "Formatting ${!DATA_DEV} as ext4 (first-time provisioning)"
            mkfs.ext4 -L tokenkey-data "${!DATA_DEV}"
          else
            echo "Reusing existing filesystem on ${!DATA_DEV} (preserved across instance replacement)"
          fi
          DATA_UUID="$(blkid -o value -s UUID "${!DATA_DEV}" || true)"
          if [ -z "${!DATA_UUID}" ]; then
            echo "FATAL: unable to read UUID from ${!DATA_DEV}" >&2
            exit 1
          fi

          install -d -m 0755 -o root -g root /var/lib/tokenkey
          mount "${!DATA_DEV}" /var/lib/tokenkey
          # Persist via fstab using UUID. This avoids both NVMe renumbering
          # and accidental mis-mounts if multiple volumes share the same label.
          if ! grep -q '/var/lib/tokenkey' /etc/fstab; then
            echo "UUID=${!DATA_UUID} /var/lib/tokenkey ext4 defaults,nofail,x-systemd.device-timeout=90 0 2" >> /etc/fstab
          fi

          # --- 2b. data directory layout (idempotent: pre-existing dirs survive) -
          install -d -m 0755 /var/lib/tokenkey/app
          install -d -m 0700 /var/lib/tokenkey/postgres
          install -d -m 0755 /var/lib/tokenkey/redis
          install -d -m 0755 /var/lib/tokenkey/pgdump
          install -d -m 0755 /var/lib/tokenkey/caddy
          install -d -m 0755 /var/lib/tokenkey/caddy/data
          install -d -m 0755 /var/lib/tokenkey/caddy/config
          install -d -m 0755 /var/lib/tokenkey/logs
          cd /var/lib/tokenkey

          # --- 3. docker-compose + Caddy from SSM (gzip base64); keeps UserData small ---
          COMPOSE_PARAM='/${ProjectName}/${Environment}/stage0/docker-compose.gzip.b64'
          CADDY_PARAM='/${ProjectName}/${Environment}/stage0/caddyfile.template.gzip.b64'
          COMPOSE_B64="$(aws ssm get-parameter --name "${!COMPOSE_PARAM}" --region "${!REGION}" --query Parameter.Value --output text)"
          CADDY_B64="$(aws ssm get-parameter --name "${!CADDY_PARAM}" --region "${!REGION}" --query Parameter.Value --output text)"
          printf '%s' "${!COMPOSE_B64}" | base64 -d | gunzip > docker-compose.yml
          printf '%s' "${!CADDY_B64}" | base64 -d | gunzip > caddy/Caddyfile.template
          API_DOMAIN="${!API_DOMAIN}" ACME_EMAIL="${!ACME_EMAIL}" \
            envsubst '${!API_DOMAIN} ${!ACME_EMAIL}' \
            < caddy/Caddyfile.template > caddy/Caddyfile

          install -d -m 0755 /etc/tokenkey
          printf 'TOKENKEY_QA_STALE_RETENTION_DAYS=%s\n' '${QaStaleRetentionDays}' > /etc/tokenkey/qa-stale-retention.env
          QA_B64_PARAM_NAME='/${ProjectName}/${Environment}/stage0/qa-stale-cleanup.b64'
          RAW="$(aws ssm get-parameter --name "${!QA_B64_PARAM_NAME}" --region "${!REGION}" --query Parameter.Value --output text)"
          printf '%s' "${!RAW}" | base64 -d > /usr/local/bin/tokenkey-qa-stale-cleanup.sh
          chmod +x /usr/local/bin/tokenkey-qa-stale-cleanup.sh

          printf '%s\n' '/${ProjectName}/${Environment}/stage0/ghcr-prune.b64' > /etc/tokenkey/ghcr-prune-ssm.path
          cat > /usr/local/bin/tokenkey-prune-ghcr-app-tags.sh <<'LOADEREOF'
          #!/bin/bash
          set -euo pipefail
          PATHFILE=/etc/tokenkey/ghcr-prune-ssm.path
          if [ ! -f "$PATHFILE" ]; then
            echo "tokenkey-prune-ghcr-app-tags: missing path file" >&2
            exit 0
          fi
          IMDS_TOKEN="$(curl -fsS -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")"
          REGION="$(curl -fsS -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" http://169.254.169.254/latest/meta-data/placement/region)"
          PNAME="$(tr -d '\n' <"$PATHFILE")"
          RAW="$(aws ssm get-parameter --name "$PNAME" --region "$REGION" --query Parameter.Value --output text)"
          TMP="$(mktemp)"
          cleanup() { rm -f "$TMP"; }
          trap cleanup EXIT
          printf '%s' "$RAW" | base64 -d >"$TMP"
          chmod +x "$TMP"
          exec bash "$TMP"
          LOADEREOF
          chmod +x /usr/local/bin/tokenkey-prune-ghcr-app-tags.sh

          # --- 4. secrets + .env (split: persistent vs per-boot) ----------------
          # Two-file strategy (persistent data volume hardening / issue #8):
          #
          #   /var/lib/tokenkey/.env.secret  → POSTGRES_PASSWORD, JWT_SECRET,
          #                                    TOTP_ENCRYPTION_KEY. Generated
          #                                    EXACTLY ONCE on first boot of a
          #                                    fresh data volume; on subsequent
          #                                    boots (including instance
          #                                    replacement triggered by ImageTag
          #                                    change) we re-source these so
          #                                    PostgreSQL data + JWT-issued
          #                                    sessions + TOTP records survive.
          #   /var/lib/tokenkey/.env         → CFN-parameter-driven config
          #                                    (TOKENKEY_IMAGE, API_DOMAIN, …).
          #                                    Regenerated every boot to pick
          #                                    up parameter changes.
          #
          # NEVER include secrets in /var/lib/tokenkey/.env — that file is
          # rewritten by every cfn-init and would clobber persisted creds if
          # we ever got the order wrong.
          SECRET_FILE=/var/lib/tokenkey/.env.secret
          if [ ! -f "${!SECRET_FILE}" ]; then
            umask 077
            if [ -f /var/lib/tokenkey/.env ] \
              && grep -q '^POSTGRES_PASSWORD=' /var/lib/tokenkey/.env \
              && grep -q '^JWT_SECRET=' /var/lib/tokenkey/.env \
              && grep -q '^TOTP_ENCRYPTION_KEY=' /var/lib/tokenkey/.env; then
              echo "Seeding ${!SECRET_FILE} from legacy /var/lib/tokenkey/.env"
              {
                grep -m1 '^POSTGRES_PASSWORD=' /var/lib/tokenkey/.env
                grep -m1 '^JWT_SECRET=' /var/lib/tokenkey/.env
                grep -m1 '^TOTP_ENCRYPTION_KEY=' /var/lib/tokenkey/.env
              } > "${!SECRET_FILE}"
            else
              echo "Generating new persistent secrets at ${!SECRET_FILE} (first boot of data volume)"
              gen_secret() { openssl rand -hex 32; }
              gen_pwd()    { openssl rand -hex 24; }
              cat > "${!SECRET_FILE}" <<SECEOF
          POSTGRES_PASSWORD=$(gen_pwd)
          JWT_SECRET=$(gen_secret)
          TOTP_ENCRYPTION_KEY=$(gen_secret)
          SECEOF
            fi
            chmod 0600 "${!SECRET_FILE}"
            chown root:root "${!SECRET_FILE}"
          else
            echo "Reusing existing persistent secrets from ${!SECRET_FILE} (data volume preserved across instance replacement)"
          fi
          # shellcheck disable=SC1090
          set -a; . "${!SECRET_FILE}"; set +a

          cat > /var/lib/tokenkey/.env <<ENVEOF
          API_DOMAIN=${!API_DOMAIN}
          SERVER_FRONTEND_URL=https://${!API_DOMAIN}
          ACME_EMAIL=${!ACME_EMAIL}
          TZ=${!TZ_VALUE}
          SERVER_MODE=release
          RUN_MODE=standard
          TOKENKEY_IMAGE=${!TOKENKEY_IMAGE}
          POSTGRES_USER=tokenkey
          POSTGRES_PASSWORD=${!POSTGRES_PASSWORD}
          POSTGRES_DB=tokenkey
          DATABASE_MAX_OPEN_CONNS=50
          DATABASE_MAX_IDLE_CONNS=10
          REDIS_PASSWORD=
          REDIS_DB=0
          REDIS_POOL_SIZE=1024
          REDIS_MIN_IDLE_CONNS=10
          ADMIN_EMAIL=${!ADMIN_EMAIL}
          ADMIN_PASSWORD=
          JWT_SECRET=${!JWT_SECRET}
          JWT_EXPIRE_HOUR=1
          TOTP_ENCRYPTION_KEY=${!TOTP_ENCRYPTION_KEY}
          ENVEOF
          chmod 0600 /var/lib/tokenkey/.env

          # --- 5. GHCR private-image login -------------------------------------
          # Read PAT from SSM SecureString; never echo it. EC2 IAM role has minimal access.
          GHCR_PAT="$(aws --region "${!REGION}" ssm get-parameter \
            --name "${!GHCR_PAT_SSM_NAME}" --with-decryption \
            --query Parameter.Value --output text)"
          echo "${!GHCR_PAT}" | docker login ghcr.io -u "${!GHCR_PULL_USER}" --password-stdin
          unset GHCR_PAT

          # --- 6. systemd units ------------------------------------------------
          cat > /etc/systemd/system/tokenkey.service <<'UNITEOF'
          [Unit]
          Description=tokenkey stack (docker compose)
          Requires=docker.service
          After=docker.service network-online.target
          Wants=network-online.target

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          WorkingDirectory=/var/lib/tokenkey
          EnvironmentFile=/var/lib/tokenkey/.env
          ExecStartPre=/usr/bin/docker compose --env-file /var/lib/tokenkey/.env pull
          ExecStart=/usr/bin/docker compose --env-file /var/lib/tokenkey/.env up -d --remove-orphans
          ExecStartPost=-/usr/local/bin/tokenkey-prune-ghcr-app-tags.sh
          ExecStop=/usr/bin/docker compose --env-file /var/lib/tokenkey/.env down
          TimeoutStartSec=10min

          [Install]
          WantedBy=multi-user.target
          UNITEOF

          # pg_dump every 2h (application-consistent backup); keep rolling 24h + max 12 files.
          cat > /usr/local/bin/tokenkey-pgdump.sh <<'PGEOF'
          #!/bin/bash
          set -euo pipefail
          DUMP_DIR=/var/lib/tokenkey/pgdump
          TS=$(date -u +%Y%m%dT%H%M%SZ)
          OUT="${!DUMP_DIR}/tokenkey-${!TS}.sql.gz"
          PART="${!OUT}.part"
          rm -f "${!PART}"

          # Remove bogus sub-kib dumps from failed runs (e.g. disk full).
          find "${!DUMP_DIR}" -maxdepth 1 -type f -name 'tokenkey-*.sql.gz' -size -2k -delete 2>/dev/null || true
          # Remove legacy pre-*.dump files left by older manual pre-migration snapshots.
          find "${!DUMP_DIR}" -maxdepth 1 -type f -name 'pre-*.dump' -delete 2>/dev/null || true

          set -o pipefail
          if ! docker exec tokenkey-postgres pg_dump -U tokenkey -d tokenkey --format=plain --no-owner \
              | gzip -9 > "${!PART}"; then
            rm -f "${!PART}"
            exit 1
          fi

          SZ=$(wc -c < "${!PART}")
          if [ "${!SZ}" -lt 2048 ]; then
            rm -f "${!PART}"
            exit 1
          fi

          mv -f "${!PART}" "${!OUT}"

          # Past 24h by mtime, and at most 12 rolling tokenkey-*.sql.gz (2h cadence).
          find "${!DUMP_DIR}" -maxdepth 1 -type f -name 'tokenkey-*.sql.gz' -mmin +1440 -delete 2>/dev/null || true
          while IFS= read -r _oldf; do
            [ -z "${!_oldf}" ] && continue
            rm -f "${!_oldf}"
          done < <(find "${!DUMP_DIR}" -maxdepth 1 -type f -name 'tokenkey-*.sql.gz' -printf '%T@\t%p\n' 2>/dev/null \
            | sort -nr | tail -n +13 | cut -f2-)
          PGEOF
          chmod +x /usr/local/bin/tokenkey-pgdump.sh

          cat > /usr/local/bin/tokenkey-disk-metrics.sh <<'DISKEOF'
          #!/bin/bash
          set -euo pipefail
          IMDS_TOKEN="$(curl -fsS -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")"
          REGION="$(curl -fsS -H "X-aws-ec2-metadata-token: ${!IMDS_TOKEN}" http://169.254.169.254/latest/meta-data/placement/region)"
          IID="$(curl -fsS -H "X-aws-ec2-metadata-token: ${!IMDS_TOKEN}" http://169.254.169.254/latest/meta-data/instance-id)"
          USED="$(df -P /var/lib/tokenkey 2>/dev/null | awk 'NR==2 {gsub(/%/,"",$5); print $5}')"
          [ -z "${!USED}" ] && exit 0
          aws cloudwatch put-metric-data --region "${!REGION}" \
            --namespace tokenkey/EC2 \
            --metric-data "MetricName=DataVolumeUsedPercent,Value=${!USED},Unit=Percent,Dimensions=[{Name=InstanceId,Value=${!IID}}]"
          DISKEOF
          chmod +x /usr/local/bin/tokenkey-disk-metrics.sh

          cat > /etc/systemd/system/tokenkey-disk-metrics.service <<'DMSEOF'
          [Unit]
          Description=Publish tokenkey DataVolume used_percent to CloudWatch
          After=network-online.target tokenkey.service
          Wants=network-online.target

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/tokenkey-disk-metrics.sh
          DMSEOF

          cat > /etc/systemd/system/tokenkey-disk-metrics.timer <<'DMTEOF'
          [Unit]
          Description=Publish DataVolume disk metric every 5 minutes

          [Timer]
          OnBootSec=3min
          OnUnitActiveSec=5min
          RandomizedDelaySec=30
          Persistent=true

          [Install]
          WantedBy=timers.target
          DMTEOF

          cat > /etc/systemd/system/tokenkey-pgdump.service <<'PSEOF'
          [Unit]
          Description=tokenkey pg_dump (every 2 hours)
          After=tokenkey.service
          Requires=tokenkey.service

          [Service]
          Type=oneshot
          ExecStart=/usr/local/bin/tokenkey-pgdump.sh
          PSEOF

          cat > /etc/systemd/system/tokenkey-pgdump.timer <<'PTEOF'
          [Unit]
          Description=Run tokenkey-pgdump every 2 hours

          [Timer]
          OnCalendar=*-*-* 00,02,04,06,08,10,12,14,16,18,20,22:00:00
          Persistent=true
          RandomizedDelaySec=2min

          [Install]
          WantedBy=timers.target
          PTEOF

          # Daily QA stale cleanup script is decoded in section 3 from QA_CLEANUP_GZB64 (build-cfn.sh).
          # GHCR app image prune inner script is in SSM .../ghcr-prune.b64; loader in /usr/local/bin/tokenkey-prune-ghcr-app-tags.sh (build-cfn.sh).

          cat > /etc/systemd/system/tokenkey-qa-stale-cleanup.service <<'QASVEOF'
          [Unit]
          Description=Prune QA records and blob trees older than retention
          After=network-online.target tokenkey.service
          Wants=network-online.target
          Requires=tokenkey.service

          [Service]
          Type=oneshot
          EnvironmentFile=-/etc/tokenkey/qa-stale-retention.env
          ExecStart=/usr/local/bin/tokenkey-qa-stale-cleanup.sh
          QASVEOF

          cat > /etc/systemd/system/tokenkey-qa-stale-cleanup.timer <<'QATIMEOF'
          [Unit]
          Description=Daily QA stale cleanup (low-traffic window)

          [Timer]
          OnCalendar=*-*-* 04:15:00
          RandomizedDelaySec=30min
          Persistent=true

          [Install]
          WantedBy=timers.target
          QATIMEOF

          # --- 7. CloudWatch Agent ---------------------------------------------
          cat > /opt/aws/amazon-cloudwatch-agent/etc/tokenkey.json <<'CWEOF'
          {
            "logs": {
              "logs_collected": {
                "files": {
                  "collect_list": [
                    {"file_path": "/var/log/tokenkey-bootstrap.log", "log_group_name": "/tokenkey/bootstrap", "log_stream_name": "{instance_id}"},
                    {"file_path": "/var/log/cloud-init-output.log", "log_group_name": "/tokenkey/cloud-init", "log_stream_name": "{instance_id}"}
                  ]
                }
              }
            },
            "metrics": {
              "namespace": "tokenkey/EC2",
              "append_dimensions": {"InstanceId": "${!aws:InstanceId}"},
              "metrics_collected": {
                "mem":  {"measurement": ["mem_used_percent"]},
                "disk": {"measurement": ["used_percent"], "resources": ["/", "/var/lib/tokenkey"]}
              }
            }
          }
          CWEOF

          systemctl daemon-reload
          systemctl enable --now tokenkey.service
          systemctl enable --now tokenkey-pgdump.timer
          systemctl enable --now tokenkey-disk-metrics.timer
          systemctl enable --now tokenkey-qa-stale-cleanup.timer
          if [ -x /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl ]; then
            /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
              -a fetch-config -m ec2 -c file:/opt/aws/amazon-cloudwatch-agent/etc/tokenkey.json -s || true
          fi

          sleep 30
          ( docker compose -f /var/lib/tokenkey/docker-compose.yml --env-file /var/lib/tokenkey/.env ps || true ) \
            >> /var/log/tokenkey-bootstrap.log 2>&1
          echo "BOOTSTRAP_DONE $(date -u +%FT%TZ)" >> /var/log/tokenkey-bootstrap.log

  # ---------------------------------------------------------------------------
  # Persistent data volume (persistent data volume hardening / issue #8)
  # ---------------------------------------------------------------------------
  # DeletionPolicy: Retain   — preserved if the stack is deleted (manual cleanup)
  # UpdateReplacePolicy: Retain — preserved if a property change forces volume
  #                              replacement; the old volume is kept and a new
  #                              one is created (operator must reconcile).
  # AvailabilityZone — must equal the instance's AZ; both are pinned to the
  #                    first AZ via !Select [0, !GetAZs ''].
  # The attach + mount is performed by UserData (see "data volume" section).
  # All /var/lib/tokenkey/{postgres,redis,caddy,app,pgdump,.env.secret} state
  # lives here, so that EC2 instance replacement (e.g. ImageTag CFN parameter
  # change → UserData re-substitution → BlockDeviceMappings churn → root EBS
  # thrown away) NO LONGER destroys application data.
  DataVolume:
    Type: AWS::EC2::Volume
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AvailabilityZone: !Select [0, !GetAZs '']
      Size: !Ref DataVolumeSizeGiB
      VolumeType: gp3
      Encrypted: true
      Tags:
        - {Key: Name, Value: !Sub '${ProjectName}-${Environment}-data'}
        - {Key: Project, Value: !Ref ProjectName}
        - {Key: Environment, Value: !Ref Environment}
        - {Key: Backup, Value: stage0}
        - {Key: Purpose, Value: 'tokenkey-state-postgres-redis-caddy'}

  EIPAssoc:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt ElasticIP.AllocationId
      InstanceId: !Ref Instance

  # --- DLM: automated EBS snapshots (daily by default, optional hourly) -------
  DLMRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: dlm.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSDataLifecycleManagerServiceRole

  SnapshotPolicy:
    Type: AWS::DLM::LifecyclePolicy
    Properties:
      Description: !Sub '${ProjectName} Stage 0 EBS snapshot policy'
      State: ENABLED
      ExecutionRoleArn: !GetAtt DLMRole.Arn
      PolicyDetails:
        PolicyType: EBS_SNAPSHOT_MANAGEMENT
        ResourceTypes: [INSTANCE]
        TargetTags:
          - {Key: Backup, Value: stage0}
        Schedules:
          - Name: !If [IsHourlySnapshots, hourly-7d, daily-7d]
            CopyTags: true
            TagsToAdd:
              - {Key: snapshot-by, Value: dlm}
              - {Key: snapshot-cadence, Value: !Ref SnapshotSchedule}
            CreateRule:
              Interval: !If [IsHourlySnapshots, 1, 24]
              IntervalUnit: HOURS
              Times: !If [IsHourlySnapshots, !Ref AWS::NoValue, ['03:00']]
            RetainRule:
              Count: !If [IsHourlySnapshots, 168, 7]

  DataVolumeDiskAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-${Environment}-data-volume-used'
      AlarmDescription: >-
        tokenkey DataVolume (/var/lib/tokenkey) critical — act immediately (trim pgdump/logs or expand vol).
      Namespace: tokenkey/EC2
      MetricName: DataVolumeUsedPercent
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      DatapointsToAlarm: 2
      # High threshold = few false positives; pair with 24h pg_dump retention + metrics timer.
      Threshold: 90
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: InstanceId
          Value: !Ref Instance
      AlarmActions: !If [AlarmTopicProvided, [!Ref AlarmSnsTopicArn], !Ref AWS::NoValue]

Outputs:
  PublicIP:
    Description: Elastic IP - set this as the A record for ApiDomain
    Value: !Ref ElasticIP
  InstanceId:
    Description: EC2 instance ID
    Value: !Ref Instance
  DataVolumeId:
    Description: |
      Persistent EBS data volume (DeletionPolicy: Retain). Snapshot this for
      backup, and reference it when migrating an existing root-volume stack to
      the new layout (persistent data volume hardening runbook).
    Value: !Ref DataVolume
  ApiUrl:
    Description: After DNS A-record propagation + LE issuance
    Value: !Sub 'https://${ApiDomain}'
  SsmStartSession:
    Description: Open shell without SSH key
    Value: !Sub 'aws ssm start-session --region ${AWS::Region} --target ${Instance}'
  SnapshotPolicyId:
    Description: DLM lifecycle policy ID
    Value: !Ref SnapshotPolicy
  ResolvedImage:
    Description: Image reference that the EC2 instance will pull from GHCR
    Value: !Sub 'ghcr.io/${GhcrOwner}/${GhcrImageName}:${ImageTag}'
  DataVolumeDiskAlarmName:
    Description: CloudWatch alarm for DataVolume utilization (tokenkey/EC2 DataVolumeUsedPercent)
    Value: !Ref DataVolumeDiskAlarm
