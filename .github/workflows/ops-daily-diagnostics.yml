name: Ops Daily Diagnostics

# Canonical production and Edge diagnostics entry point.
# Read-only diagnostics may reach prod/Edge through GHA → AWS STS (OIDC) → SSM.
# Issue creation is isolated from AWS credentials; this workflow never deploys,
# rolls back, edits secrets, writes code, pushes branches, or creates PRs.

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      operation:
        description: Which prod operation to run
        required: true
        default: diagnostics
        type: choice
        options:
          - diagnostics
          - error_clustering
          - log_dump
      target_selector:
        description: "Diagnostics target selector: all, prod, edge:*, or edge:<id>. log_dump supports prod only."
        required: false
        default: all
      since_hours:
        description: Error clustering lookback window in hours
        required: false
        default: "24"
      diagnostics_log_since:
        description: Diagnostics runtime log lookback (docker logs --since), e.g. 20m, 2h, 1d
        required: false
        default: "24h"
      diagnostics_include_error_clustering:
        description: Include error clustering in diagnostics (false = lightweight runtime/health only)
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      since:
        description: Log dump lookback window passed to docker logs --since (e.g. 30m, 2h, 1d)
        required: false
        default: "10m"
      container:
        description: Log dump container
        required: false
        default: tokenkey
        type: choice
        options:
          - tokenkey
          - tokenkey-postgres
          - tokenkey-caddy
          - tokenkey-redis
      grep_pattern:
        description: Optional log dump ERE pattern. Empty = no filter.
        required: false
        default: ""
      tail_lines:
        description: Log dump cap on returned lines (positive integer, max 10000)
        required: false
        default: "1000"

permissions:
  contents: read

jobs:
  discover-targets:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.operation != 'log_dump')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      excluded: ${{ steps.matrix.outputs.excluded }}
      has_targets: ${{ steps.matrix.outputs.has_targets }}
    env:
      TARGET_SELECTOR: ${{ inputs.target_selector || 'all' }}
      PROD_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      PROD_STACK: ${{ vars.PROD_STACK_NAME || 'tokenkey-prod-stage0' }}
    steps:
      - uses: actions/checkout@v6

      - name: Build diagnostics target matrix
        id: matrix
        run: |
          set -euo pipefail
          python3 deploy/aws/stage0/resolve-edge-target.py \
            --prod-ops-matrix \
            --target-selector "$TARGET_SELECTOR" \
            --prod-region "$PROD_REGION" \
            --prod-stack "$PROD_STACK" \
            --github-output "$GITHUB_OUTPUT"

      - name: Target summary
        run: |
          {
            echo "## Prod Ops targets"
            echo
            echo '- selector: `${{ env.TARGET_SELECTOR }}`'
            echo '- matrix: `${{ steps.matrix.outputs.matrix }}`'
            echo '- excluded: `${{ steps.matrix.outputs.excluded }}`'
          } >> "$GITHUB_STEP_SUMMARY"

  diagnose-targets:
    needs: discover-targets
    if: needs.discover-targets.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover-targets.outputs.matrix) }}
    env:
      OIDC_ROLE_ARN: ${{ vars.AWS_OIDC_ROLE_ARN }}
      SINCE_HOURS: ${{ inputs.since_hours || '24' }}
      DIAGNOSTICS_LOG_SINCE: ${{ inputs.diagnostics_log_since || '24h' }}
      INCLUDE_ERROR_CLUSTERING: ${{ inputs.diagnostics_include_error_clustering || 'true' }}
      TARGET_ID: ${{ matrix.target_id }}
      TARGET_KIND: ${{ matrix.target_kind }}
      EDGE_ID: ${{ matrix.edge_id }}
      TARGET_REGION: ${{ matrix.region }}
      STACK_NAME: ${{ matrix.stack }}
      TARGET_DOMAIN: ${{ matrix.domain }}
      SSM_PREFIX: ${{ matrix.ssm_prefix }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare target report directory
        run: |
          set -euo pipefail
          mkdir -p "prod-ops-targets/$TARGET_ID"
          jq -n \
            --arg target_id "$TARGET_ID" \
            --arg target_kind "$TARGET_KIND" \
            --arg edge_id "$EDGE_ID" \
            --arg region "$TARGET_REGION" \
            --arg stack "$STACK_NAME" \
            --arg domain "$TARGET_DOMAIN" \
            --arg ssm_prefix "$SSM_PREFIX" \
            '{target_id:$target_id,target_kind:$target_kind,edge_id:$edge_id,region:$region,stack:$stack,domain:$domain,ssm_prefix:$ssm_prefix}' \
            > "prod-ops-targets/$TARGET_ID/target.json"
          : > "prod-ops-targets/$TARGET_ID/findings.jsonl"
          : > "prod-ops-targets/$TARGET_ID/stdout.txt"
          : > "prod-ops-targets/$TARGET_ID/stderr.txt"

      - name: Precheck OIDC role
        id: precheck
        run: |
          set -euo pipefail
          if [ -z "${OIDC_ROLE_ARN:-}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            jq -cn \
              --arg target_id "$TARGET_ID" \
              --arg kind "missing_oidc_role" \
              --arg status "skip" \
              --arg severity "info" \
              --arg title "AWS_OIDC_ROLE_ARN is not configured" \
              --arg summary "Skipping diagnostics because AWS_OIDC_ROLE_ARN repo variable is empty." \
              '{target_id:$target_id,kind:$kind,status:$status,severity:$severity,title:$title,summary:$summary,signature:$kind}' \
              >> "prod-ops-targets/$TARGET_ID/findings.jsonl"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials via OIDC
        if: steps.precheck.outputs.skip == 'false'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.OIDC_ROLE_ARN }}
          aws-region: ${{ env.TARGET_REGION }}

      - name: Run target diagnostics
        if: steps.precheck.outputs.skip == 'false'
        env:
          AWS_REGION: ${{ matrix.region }}
        run: |
          set -euo pipefail
          OUT="prod-ops-targets/$TARGET_ID"
          FINDINGS="$OUT/findings.jsonl"
          STDOUT="$OUT/stdout.txt"
          STDERR="$OUT/stderr.txt"

          add_finding() {
            local kind="$1" status="$2" severity="$3" title="$4" summary="$5" signature="${6:-$1}"
            jq -cn \
              --arg target_id "$TARGET_ID" \
              --arg kind "$kind" \
              --arg status "$status" \
              --arg severity "$severity" \
              --arg title "$title" \
              --arg summary "$summary" \
              --arg signature "$signature" \
              '{target_id:$target_id,kind:$kind,status:$status,severity:$severity,title:$title,summary:$summary,signature:$signature}' \
              >> "$FINDINGS"
          }

          run_aws_text() {
            local query="$1"
            aws cloudformation describe-stacks --region "$TARGET_REGION" --stack-name "$STACK_NAME" \
              --query "$query" --output text 2>>"$STDERR"
          }

          API_URL=""
          INSTANCE_ID=""
          if ! INSTANCE_ID="$(run_aws_text 'Stacks[0].Outputs[?OutputKey==`InstanceId`].OutputValue')"; then
            add_finding "cloudformation_describe" "manual_ops" "error" "Could not describe stack $STACK_NAME" "CloudFormation describe-stacks failed in $TARGET_REGION for $STACK_NAME." "cloudformation|$STACK_NAME"
          elif [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            add_finding "cloudformation_outputs" "manual_ops" "error" "Stack $STACK_NAME has no InstanceId output" "CloudFormation stack is present but InstanceId output is empty." "cloudformation-output|$STACK_NAME|InstanceId"
          else
            jq --arg instance_id "$INSTANCE_ID" '. + {instance_id:$instance_id}' "$OUT/target.json" > "$OUT/target.tmp" && mv "$OUT/target.tmp" "$OUT/target.json"
            if API_URL="$(run_aws_text 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue')" && [ -n "$API_URL" ] && [ "$API_URL" != "None" ]; then
              jq --arg api_url "$API_URL" '. + {api_url:$api_url}' "$OUT/target.json" > "$OUT/target.tmp" && mv "$OUT/target.tmp" "$OUT/target.json"
            else
              API_URL="https://$TARGET_DOMAIN"
              jq --arg api_url "$API_URL" '. + {api_url:$api_url, api_url_source:"domain_fallback"}' "$OUT/target.json" > "$OUT/target.tmp" && mv "$OUT/target.tmp" "$OUT/target.json"
              add_finding "cloudformation_api_url" "warning" "warning" "Stack $STACK_NAME has no ApiUrl output" "Falling back to https://$TARGET_DOMAIN for external health." "cloudformation-output|$STACK_NAME|ApiUrl"
            fi
          fi

          if [ -n "$API_URL" ]; then
            if bash ops/stage0/external_health.sh "$API_URL" >>"$STDOUT" 2>>"$STDERR"; then
              add_finding "external_health" "ok" "info" "External health passed for $TARGET_ID" "$API_URL/health returned 200 under 5s." "external-health|$TARGET_ID"
            else
              add_finding "external_health" "issue_candidate" "error" "External health failed for $TARGET_ID" "$API_URL/health did not pass the Stage0 external health check." "external-health|$TARGET_ID"
            fi
          fi

          if [ "$TARGET_KIND" = "edge" ] && [ -n "$API_URL" ]; then
            BLOCKED_CODE="$(curl -sS -o "$OUT/edge-blocked.json" -w '%{http_code}' -H 'Authorization: Bearer tk_edge_smoke_should_not_work' "$API_URL/v1/models" 2>>"$STDERR" || echo 000)"
            if [ "$BLOCKED_CODE" = "403" ]; then
              add_finding "edge_public_api_block" "ok" "info" "Edge public API block passed for $TARGET_ID" "Public runner /v1/models probe returned HTTP 403." "edge-public-block|$TARGET_ID"
            else
              add_finding "edge_public_api_block" "issue_candidate" "error" "Edge public API block failed for $TARGET_ID" "Public runner /v1/models probe returned HTTP $BLOCKED_CODE instead of 403." "edge-public-block|$TARGET_ID|$BLOCKED_CODE"
            fi
          fi

          if [ -n "$INSTANCE_ID" ] && [ "$INSTANCE_ID" != "None" ]; then
            if ! printf '%s' "$DIAGNOSTICS_LOG_SINCE" | grep -Eq '^[0-9]+[smhd]$'; then
              add_finding "diagnostics_log_since_input" "manual_ops" "error" "Invalid diagnostics_log_since input" "diagnostics_log_since must match ^[0-9]+[smhd]$ (e.g. 20m, 2h, 1d), got: $DIAGNOSTICS_LOG_SINCE" "diagnostics-log-since-input|$DIAGNOSTICS_LOG_SINCE"
            fi

            python3 - <<'PY' > "$OUT/runtime-params.json"
          import json
          import os
          import shlex
          log_since = os.environ["DIAGNOSTICS_LOG_SINCE"]
          quoted_since = shlex.quote(log_since)
          commands = [
              "set -euo pipefail",
              "echo ===DOCKER_PS===",
              "sudo docker compose -f /var/lib/tokenkey/docker-compose.yml --env-file /var/lib/tokenkey/.env ps || true",
              "echo ===CONTAINER_HEALTH===",
              "sudo docker inspect tokenkey --format 'tokenkey_status={{.State.Status}} tokenkey_health={{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' 2>/dev/null || true",
              "sudo docker inspect tokenkey-postgres --format 'postgres_status={{.State.Status}}' 2>/dev/null || true",
              "sudo docker inspect tokenkey-redis --format 'redis_status={{.State.Status}}' 2>/dev/null || true",
              "sudo docker compose -f /var/lib/tokenkey/docker-compose.yml --env-file /var/lib/tokenkey/.env exec -T tokenkey wget -qO- http://localhost:8080/health",
              "SIG_OUT=/tmp/prod-ops-runtime-signals",
              "sudo rm -rf \"$SIG_OUT\" && sudo mkdir -p \"$SIG_OUT\" && sudo chmod 0777 \"$SIG_OUT\"",
              "sudo docker logs tokenkey --since " + quoted_since + " > \"$SIG_OUT/tokenkey.log\" 2>&1 || true",
              "sudo docker logs tokenkey-caddy --since " + quoted_since + " > \"$SIG_OUT/caddy.log\" 2>&1 || true",
              "count_fixed_file() { local file=\"$1\" pattern=\"$2\"; awk -v p=\"$pattern\" 'index($0,p)>0{c++} END{print c+0}' \"$file\"; }",
              "count_both_file() { local file=\"$1\" p1=\"$2\" p2=\"$3\"; awk -v p1=\"$p1\" -v p2=\"$p2\" 'index($0,p1)>0 && index($0,p2)>0{c++} END{print c+0}' \"$file\"; }",
              "gemini_drive_scope_403=$(count_fixed_file \"$SIG_OUT/tokenkey.log\" '[GeminiOAuth] Drive API scope not available (403)')",
              "openai_previous_response_fallback=$(count_fixed_file \"$SIG_OUT/tokenkey.log\" 'previous_response_id unavailable, retrying without continuation')",
              "rate_limit_429_no_reset=$(count_fixed_file \"$SIG_OUT/tokenkey.log\" 'rate_limit_429_no_reset_time_skipped')",
              "caddy_incomplete_response=$(count_fixed_file \"$SIG_OUT/caddy.log\" 'aborting with incomplete response')",
              "caddy_access_error=$(count_both_file \"$SIG_OUT/caddy.log\" '\"level\":\"error\"' 'http.log.access')",
              "echo ===LOG_SIGNAL_COUNTS===",
              "printf '{\"gemini_drive_scope_403\":%s,\"openai_previous_response_fallback\":%s,\"rate_limit_429_no_reset\":%s,\"caddy_incomplete_response\":%s,\"caddy_access_error\":%s}\\n' \"$gemini_drive_scope_403\" \"$openai_previous_response_fallback\" \"$rate_limit_429_no_reset\" \"$caddy_incomplete_response\" \"$caddy_access_error\"",
              "echo ===END_LOG_SIGNAL_COUNTS===",
              "echo ===RECENT_ERRORS===",
              "grep -Ei 'panic|fatal|error|traceback|failed|timeout|refused|denied| 5[0-9][0-9] | 429 ' \"$SIG_OUT/tokenkey.log\" | tail -60 || true",
              "sudo rm -rf \"$SIG_OUT\" || true",
          ]
          print(json.dumps({"commands": commands}))
          PY
            if CMD_ID="$(aws ssm send-command --region "$TARGET_REGION" --instance-ids "$INSTANCE_ID" --document-name AWS-RunShellScript --comment "prod-ops runtime diagnostics target=$TARGET_ID" --parameters "file://$OUT/runtime-params.json" --query 'Command.CommandId' --output text 2>>"$STDERR")"; then
              echo "runtime ssm command-id=$CMD_ID" >> "$STDOUT"
              DEADLINE=$(( $(date +%s) + 180 ))
              STATUS="InProgress"
              while true; do
                STATUS="$(aws ssm get-command-invocation --region "$TARGET_REGION" --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'Status' --output text 2>/dev/null || echo InProgress)"
                case "$STATUS" in Success|Failed|TimedOut|Cancelled) break ;; esac
                [ $(date +%s) -lt $DEADLINE ] || { STATUS=TimedOut; break; }
                sleep 5
              done
              aws ssm get-command-invocation --region "$TARGET_REGION" --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'StandardOutputContent' --output text > "$OUT/runtime-stdout.txt" 2>>"$STDERR" || true
              aws ssm get-command-invocation --region "$TARGET_REGION" --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'StandardErrorContent' --output text > "$OUT/runtime-stderr.txt" 2>>"$STDERR" || true
              tail -c 8192 "$OUT/runtime-stdout.txt" >> "$STDOUT" || true
              tail -c 4096 "$OUT/runtime-stderr.txt" >> "$STDERR" || true
              if grep -q '^===END_LOG_SIGNAL_COUNTS===$' "$OUT/runtime-stdout.txt"; then
                awk '/^===LOG_SIGNAL_COUNTS===$/{f=1;next} /^===END_LOG_SIGNAL_COUNTS===$/{f=0} f' "$OUT/runtime-stdout.txt" > "$OUT/log-signal-counts.json" || true
                python3 - <<'PY' "$OUT/log-signal-counts.json" "$FINDINGS" "$TARGET_ID" "$DIAGNOSTICS_LOG_SINCE"
          import json
          import pathlib
          import sys

          counts_path = pathlib.Path(sys.argv[1])
          findings_path = pathlib.Path(sys.argv[2])
          target_id = sys.argv[3]
          window = sys.argv[4]
          try:
              counts = json.loads(counts_path.read_text(encoding="utf-8"))
          except Exception:
              counts = {}

          def as_int(key):
              return int(counts.get(key) or 0)

          findings = []
          rules = [
              ("gemini_drive_scope_403", 10, "error", "Gemini OAuth Drive API scope missing on {target_id}", "Gemini OAuth Drive API scope 403 appeared {count} times in tokenkey logs over {window}.", "log-signal|{target_id}|gemini-drive-scope-403"),
              ("openai_previous_response_fallback", 50, "warning", "OpenAI-compatible previous_response fallback is frequent on {target_id}", "previous_response_id fallback appeared {count} times in tokenkey logs over {window}.", "log-signal|{target_id}|openai-previous-response-fallback"),
              ("rate_limit_429_no_reset", 1, "warning", "429 cooldown skipped because reset time is missing on {target_id}", "rate_limit_429_no_reset_time_skipped appeared {count} times in tokenkey logs over {window}.", "log-signal|{target_id}|rate-limit-429-no-reset"),
          ]
          for kind, threshold, severity, title_template, summary_template, signature_template in rules:
              count = as_int(kind)
              if count < threshold:
                  continue
              findings.append({
                  "target_id": target_id,
                  "kind": kind,
                  "status": "issue_candidate",
                  "severity": severity,
                  "title": title_template.format(target_id=target_id),
                  "summary": summary_template.format(count=count, window=window),
                  "signature": signature_template.format(target_id=target_id),
              })

          caddy_incomplete = as_int("caddy_incomplete_response")
          caddy_access_error = as_int("caddy_access_error")
          if caddy_incomplete >= 20 or caddy_access_error >= 1:
              findings.append({
                  "target_id": target_id,
                  "kind": "caddy_incomplete_response",
                  "status": "issue_candidate",
                  "severity": "warning",
                  "title": f"Caddy reverse proxy anomalies on {target_id}",
                  "summary": f"Caddy logged {caddy_incomplete} incomplete responses and {caddy_access_error} error-level access entries over {window}.",
                  "signature": f"log-signal|{target_id}|caddy-incomplete-response",
              })

          with findings_path.open("a", encoding="utf-8") as fh:
              for finding in findings:
                  fh.write(json.dumps(finding, separators=(",", ":")) + "\n")
          PY
              else
                add_finding "log_signal_counts" "warning" "warning" "Runtime log signal counts missing for $TARGET_ID" "SSM runtime diagnostics did not emit complete log signal count markers." "log-signal-counts|$TARGET_ID"
              fi
              if [ "$STATUS" = "Success" ]; then
                add_finding "ssm_runtime" "ok" "info" "SSM runtime diagnostics passed for $TARGET_ID" "Docker runtime diagnostics completed on $INSTANCE_ID." "ssm-runtime|$TARGET_ID"
              else
                add_finding "ssm_runtime" "manual_ops" "error" "SSM runtime diagnostics failed for $TARGET_ID" "SSM runtime diagnostics finished with status=$STATUS on $INSTANCE_ID." "ssm-runtime|$TARGET_ID|$STATUS"
              fi
            else
              add_finding "ssm_send_command" "manual_ops" "error" "Could not send SSM command for $TARGET_ID" "SSM SendCommand failed for $INSTANCE_ID in $TARGET_REGION." "ssm-send|$TARGET_ID"
            fi

            if [ "$INCLUDE_ERROR_CLUSTERING" != "true" ]; then
              add_finding "error_clustering" "skip" "info" "Error clustering skipped for $TARGET_ID" "diagnostics_include_error_clustering=false; runtime/health-only lightweight diagnostics." "error-clustering|$TARGET_ID|lightweight-skip"
            elif ! printf '%s' "$SINCE_HOURS" | grep -Eq '^[0-9]+$'; then
              add_finding "error_clustering_input" "manual_ops" "error" "Invalid since_hours input" "since_hours must be a positive integer, got: $SINCE_HOURS" "error-clustering-input|$SINCE_HOURS"
            else
              if ! CMD_ID="$(aws ssm send-command --region "$TARGET_REGION" --instance-ids "$INSTANCE_ID" --document-name AWS-RunShellScript --comment "check error_clustering binary target=$TARGET_ID" --parameters '{"commands":["test -x /usr/local/bin/error_clustering"]}' --query 'Command.CommandId' --output text 2>>"$STDERR")"; then
                add_finding "error_clustering_binary_check" "manual_ops" "error" "Could not check error_clustering binary for $TARGET_ID" "SSM SendCommand failed while checking /usr/local/bin/error_clustering." "error-clustering-binary-check|$TARGET_ID"
              else
                DEADLINE=$(( $(date +%s) + 60 ))
                BIN_STATUS="InProgress"
                while true; do
                  BIN_STATUS="$(aws ssm get-command-invocation --region "$TARGET_REGION" --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'Status' --output text 2>/dev/null || echo InProgress)"
                  case "$BIN_STATUS" in Success|Failed|TimedOut|Cancelled) break ;; esac
                  [ $(date +%s) -lt $DEADLINE ] || { BIN_STATUS=TimedOut; break; }
                  sleep 3
                done
                if [ "$BIN_STATUS" != "Success" ]; then
                  echo "error_clustering binary missing or not executable on $TARGET_ID (status=$BIN_STATUS); installing" >> "$STDOUT"
                  if STACK="$STACK_NAME" AWS_REGION="$TARGET_REGION" AWS_SSM_WAIT_MAX=600 bash ops/stage0/deploy-error-clustering-binary.sh >>"$STDOUT" 2>>"$STDERR"; then
                    add_finding "error_clustering_binary" "ok" "info" "Installed error_clustering binary for $TARGET_ID" "Diagnostic binary was missing and was installed successfully." "error-clustering-binary|$TARGET_ID"
                  else
                    add_finding "error_clustering_binary" "manual_ops" "error" "Could not install error_clustering binary for $TARGET_ID" "ops/stage0/deploy-error-clustering-binary.sh failed for $STACK_NAME in $TARGET_REGION." "error-clustering-binary|$TARGET_ID|install-failed"
                  fi
                fi
              fi

              python3 - <<'PY' > "$OUT/error-clustering-params.json"
          import json
          import os
          since_hours = os.environ["SINCE_HOURS"]
          commands = [
              "set -euo pipefail",
              "[ -x /usr/local/bin/error_clustering ] || { echo binary_missing >&2; exit 3; }",
              "echo binary_sha256=$(sha256sum /usr/local/bin/error_clustering | awk '{print $1}')",
              "PGPASS=$(sudo grep '^POSTGRES_PASSWORD=' /var/lib/tokenkey/.env | cut -d= -f2-)",
              "[ -n \"$PGPASS\" ] || { echo no_pg_password >&2; exit 2; }",
              "OUT=/tmp/clustering",
              "sudo rm -rf \"$OUT\" && sudo mkdir -p \"$OUT\" && sudo chmod 0777 \"$OUT\"",
              "NET=$(sudo docker inspect tokenkey-postgres --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}')",
              "sudo docker run --rm --network \"$NET\" -v /usr/local/bin/error_clustering:/binary:ro -v \"$OUT\":/out -e PG_DSN=\"postgres://tokenkey:$PGPASS@tokenkey-postgres:5432/tokenkey?sslmode=disable\" alpine:3.21 /binary --since-hours " + since_hours + " --output /out/report.json --markdown /out/report.md",
              "echo ===BEGIN_REPORT_JSON===",
              "base64 -w0 \"$OUT/report.json\" 2>/dev/null || base64 \"$OUT/report.json\" | tr -d '\\n'",
              "echo",
              "echo ===END_REPORT_JSON===",
              "echo ===BEGIN_REPORT_MD===",
              "base64 -w0 \"$OUT/report.md\" 2>/dev/null || base64 \"$OUT/report.md\" | tr -d '\\n'",
              "echo",
              "echo ===END_REPORT_MD===",
          ]
          print(json.dumps({"commands": commands}))
          PY
              if CMD_ID="$(aws ssm send-command --region "$TARGET_REGION" --instance-ids "$INSTANCE_ID" --document-name AWS-RunShellScript --comment "error-clustering target=$TARGET_ID ${SINCE_HOURS}h" --parameters "file://$OUT/error-clustering-params.json" --query 'Command.CommandId' --output text 2>>"$STDERR")"; then
                echo "error_clustering ssm command-id=$CMD_ID" >> "$STDOUT"
                DEADLINE=$(( $(date +%s) + 240 ))
                CLUSTER_STATUS="InProgress"
                while true; do
                  CLUSTER_STATUS="$(aws ssm get-command-invocation --region "$TARGET_REGION" --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'Status' --output text 2>/dev/null || echo InProgress)"
                  case "$CLUSTER_STATUS" in Success|Failed|TimedOut|Cancelled) break ;; esac
                  [ $(date +%s) -lt $DEADLINE ] || { CLUSTER_STATUS=TimedOut; break; }
                  sleep 6
                done
                aws ssm get-command-invocation --region "$TARGET_REGION" --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'StandardOutputContent' --output text > "$OUT/error-clustering-stdout.txt" 2>>"$STDERR" || true
                aws ssm get-command-invocation --region "$TARGET_REGION" --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" --query 'StandardErrorContent' --output text > "$OUT/error-clustering-stderr.txt" 2>>"$STDERR" || true
                tail -c 4096 "$OUT/error-clustering-stderr.txt" >> "$STDERR" || true
                if [ "$CLUSTER_STATUS" != "Success" ]; then
                  add_finding "error_clustering_run" "manual_ops" "error" "Error clustering failed for $TARGET_ID" "SSM error clustering finished with status=$CLUSTER_STATUS." "error-clustering|$TARGET_ID|$CLUSTER_STATUS"
                elif ! grep -q '^===END_REPORT_JSON===$' "$OUT/error-clustering-stdout.txt" || ! grep -q '^===END_REPORT_MD===$' "$OUT/error-clustering-stdout.txt"; then
                  BYTES="$(wc -c < "$OUT/error-clustering-stdout.txt")"
                  add_finding "error_clustering_markers" "issue_candidate" "error" "Error clustering output was truncated for $TARGET_ID" "SSM stdout did not contain complete report markers (${BYTES} bytes)." "error-clustering-markers|$TARGET_ID"
                else
                  DECODE_OK=true
                  if ! awk '/^===BEGIN_REPORT_JSON===$/{f=1;next} /^===END_REPORT_JSON===$/{f=0} f' "$OUT/error-clustering-stdout.txt" | tr -d '\n' | base64 -d > "$OUT/error-report.json"; then
                    add_finding "error_clustering_decode" "issue_candidate" "error" "Error clustering JSON decode failed for $TARGET_ID" "Decoded report.json base64 payload is invalid." "error-clustering-decode-json|$TARGET_ID"
                    DECODE_OK=false
                  fi
                  if [ "$DECODE_OK" = "true" ] && ! awk '/^===BEGIN_REPORT_MD===$/{f=1;next} /^===END_REPORT_MD===$/{f=0} f' "$OUT/error-clustering-stdout.txt" | tr -d '\n' | base64 -d > "$OUT/error-report.md"; then
                    add_finding "error_clustering_decode" "issue_candidate" "error" "Error clustering markdown decode failed for $TARGET_ID" "Decoded report.md base64 payload is invalid." "error-clustering-decode-md|$TARGET_ID"
                    DECODE_OK=false
                  fi
                  if [ "$DECODE_OK" = "true" ]; then
                    if ! jq empty "$OUT/error-report.json" 2>/dev/null; then
                      add_finding "error_clustering_json" "issue_candidate" "error" "Error clustering returned invalid JSON for $TARGET_ID" "Decoded report.json is not valid JSON." "error-clustering-json|$TARGET_ID"
                    else
                      SUMMARY="$(jq -r '.summary // ""' "$OUT/error-report.json")"
                      PERSISTENT="$(jq '.persistent_clusters | length' "$OUT/error-report.json")"
                      if printf '%s' "$SUMMARY" | grep -q '^skip:'; then
                        add_finding "error_clustering" "skip" "info" "Error clustering skipped for $TARGET_ID" "$SUMMARY" "error-clustering|$TARGET_ID|skip"
                      elif [ "${PERSISTENT:-0}" -gt 0 ]; then
                        SIG="$(jq -r '.persistent_clusters[0].signature // .clusters[0].signature // "no-sig"' "$OUT/error-report.json")"
                        add_finding "error_cluster" "issue_candidate" "error" "Persistent error cluster detected for $TARGET_ID" "$SUMMARY" "error-cluster|$TARGET_ID|$SIG"
                      else
                        add_finding "error_clustering" "ok" "info" "No persistent error cluster for $TARGET_ID" "$SUMMARY" "error-clustering|$TARGET_ID|ok"
                      fi
                    fi
                  fi
                fi
              else
                add_finding "error_clustering_send" "manual_ops" "error" "Could not start error clustering for $TARGET_ID" "SSM SendCommand failed for error clustering on $INSTANCE_ID." "error-clustering-send|$TARGET_ID"
              fi
            fi
          fi

      - name: Finalize target report
        if: always()
        run: |
          set -euo pipefail
          OUT="prod-ops-targets/$TARGET_ID"
          python3 - <<'PY'
          import json
          import pathlib
          import os

          target_id = os.environ["TARGET_ID"]
          out = pathlib.Path("prod-ops-targets") / target_id
          target = json.loads((out / "target.json").read_text(encoding="utf-8"))
          findings = []
          findings_path = out / "findings.jsonl"
          if findings_path.exists():
              for line in findings_path.read_text(encoding="utf-8").splitlines():
                  line = line.strip()
                  if line:
                      findings.append(json.loads(line))
          if not findings:
              findings.append({
                  "target_id": target_id,
                  "kind": "diagnostics_empty",
                  "status": "warning",
                  "severity": "warning",
                  "title": f"No diagnostics findings were produced for {target_id}",
                  "summary": "The target diagnostics job did not emit any finding.",
                  "signature": f"diagnostics-empty|{target_id}",
              })
          priority = {"manual_ops": 4, "issue_candidate": 3, "warning": 2, "skip": 1, "ok": 0}
          overall = max(findings, key=lambda item: priority.get(item.get("status", "warning"), 2)).get("status", "warning")
          report = {
              "schema_version": 1,
              "target": target,
              "status": overall,
              "findings": findings,
          }
          (out / "target-report.json").write_text(json.dumps(report, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          lines = [f"# Prod Ops Target Report: {target_id}", "", f"- status: `{overall}`", f"- stack: `{target.get('stack', '')}`", f"- region: `{target.get('region', '')}`", "", "## Findings", ""]
          for finding in findings:
              lines.append(f"- **{finding.get('status')}** `{finding.get('kind')}` — {finding.get('title')}")
              summary = finding.get("summary") or ""
              if summary:
                  lines.append(f"  - {summary}")
          (out / "target-report.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
          cat "$OUT/target-report.md" >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prod-ops-target-${{ matrix.target_id }}-${{ github.run_id }}
          path: prod-ops-targets/${{ matrix.target_id }}/

  aggregate-report:
    needs:
      - discover-targets
      - diagnose-targets
    if: always() && needs.discover-targets.result != 'skipped'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      needs_issue: ${{ steps.aggregate.outputs.needs_issue }}
      issue_count: ${{ steps.aggregate.outputs.issue_count }}
    env:
      EXCLUDED_TARGETS: ${{ needs.discover-targets.outputs.excluded || '[]' }}
    steps:
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: prod-ops-target-*-${{ github.run_id }}
          path: target-artifacts

      - name: Aggregate target reports
        id: aggregate
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import pathlib

          root = pathlib.Path("target-artifacts")
          reports = []
          for path in sorted(root.glob("*/target-report.json")):
              reports.append(json.loads(path.read_text(encoding="utf-8")))
          excluded = json.loads(os.environ.get("EXCLUDED_TARGETS") or "[]")
          findings = []
          for report in reports:
              findings.extend(report.get("findings") or [])
          if not reports:
              findings.append({
                  "target_id": "prod-ops",
                  "kind": "missing_target_reports",
                  "status": "manual_ops",
                  "severity": "error",
                  "title": "Prod Ops did not produce target reports",
                  "summary": "No target-report.json artifacts were found for this run.",
                  "signature": "missing-target-reports",
              })
          issue_findings = [f for f in findings if f.get("status") in ("issue_candidate", "manual_ops")]
          skips = [f for f in findings if f.get("status") == "skip"]
          report = {
              "schema_version": 1,
              "run_id": os.environ["GITHUB_RUN_ID"],
              "run_url": f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              "targets": [r.get("target") for r in reports],
              "excluded_targets": excluded,
              "findings": findings,
              "manual_ops": [f for f in findings if f.get("status") == "manual_ops"],
              "skips": skips,
              "issue_candidates": issue_findings,
              "summary": f"{len(reports)} targets, {len(issue_findings)} issue-worthy findings, {len(skips)} skips",
          }
          pathlib.Path("ops-report.json").write_text(json.dumps(report, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          lines = ["# Prod Ops Report", "", f"- Run: {report['run_url']}", f"- Summary: {report['summary']}", ""]
          if excluded:
              lines += ["## Excluded targets", ""]
              for item in excluded:
                  lines.append(f"- `{item.get('target_id')}` — {item.get('reason')}")
              lines.append("")
          lines += ["## Findings", ""]
          for finding in findings:
              lines.append(f"- **{finding.get('status')}** `{finding.get('target_id')}` `{finding.get('kind')}` — {finding.get('title')}")
              summary = finding.get("summary") or ""
              if summary:
                  lines.append(f"  - {summary}")
          pathlib.Path("ops-report.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"needs_issue={'true' if issue_findings else 'false'}\n")
              fh.write(f"issue_count={len(issue_findings)}\n")
          PY
          cat ops-report.md >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: prod-ops-report-${{ github.run_id }}
          path: |
            ops-report.json
            ops-report.md

  claude-issue-diagnosis:
    needs: aggregate-report
    if: needs.aggregate-report.outputs.needs_issue == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: prod-ops-report-${{ github.run_id }}
          path: .

      - name: Check Claude token
        id: claude_token
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
        run: |
          if [ -n "${ANTHROPIC_AUTH_TOKEN:-}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            cat > issue-diagnosis.md <<'EOF'
          # Claude Issue Diagnosis

          skipped: ANTHROPIC_AUTH_TOKEN is not configured; using deterministic issue bodies.
          EOF
            jq -n '{status:"skipped", reason:"ANTHROPIC_AUTH_TOKEN missing", findings:[]}' > issue-diagnosis.json
            : > claude-issue-diagnosis.jsonl
          fi

      - name: Install Claude Code CLI
        if: steps.claude_token.outputs.present == 'true'
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
        run: bash scripts/setup-claude-code.sh

      - name: Build read-only diagnosis prompt
        if: steps.claude_token.outputs.present == 'true'
        run: |
          cat > /tmp/claude-issue-prompt.txt <<'EOF'
          你是 TokenKey Prod Ops 只读诊断助手。基于下面的 Prod Ops 结构化报告和当前仓库文件，生成更准确的 GitHub issue 诊断建议。

          硬约束：
          - 只做诊断和归因，不修改文件，不创建 PR，不运行命令，不访问 AWS，不 dispatch workflow。
          - 不要求历史兼容；只基于当前已合并机制和当前仓库事实。
          - 对每个 issue-worthy finding 输出：root_cause_hypothesis、evidence、suggested_owner_action、confidence、issue_title、issue_body。
          - 如果证据不足，明确写 confidence=low 和需要人工确认的点。
          - 输出 Markdown，便于直接放进 GitHub Issue。
          EOF
          printf '\n## ops-report.md\n\n' >> /tmp/claude-issue-prompt.txt
          cat ops-report.md >> /tmp/claude-issue-prompt.txt
          printf '\n\n## ops-report.json\n\n```json\n' >> /tmp/claude-issue-prompt.txt
          cat ops-report.json >> /tmp/claude-issue-prompt.txt
          printf '\n```\n' >> /tmp/claude-issue-prompt.txt

      - name: Run Claude read-only diagnosis
        if: steps.claude_token.outputs.present == 'true'
        id: claude_run
        continue-on-error: true
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: https://api.tokenkey.dev
          CLAUDE_CODE_DISABLE_ADAPTIVE_THINKING: "1"
          MAX_THINKING_TOKENS: "16000"
          CLAUDE_CODE_ATTRIBUTION_HEADER: "0"
          ANTHROPIC_MODEL: opus[1m]
        run: |
          set -o pipefail
          claude -p "$(cat /tmp/claude-issue-prompt.txt)" \
            --model "opus[1m]" \
            --max-budget-usd "1.00" \
            --output-format stream-json --verbose \
            --exclude-dynamic-system-prompt-sections \
            --allowedTools "Read Grep Glob" \
            2>&1 \
            | python3 scripts/redact-agent-stream.py \
            | tee claude-issue-diagnosis.jsonl

      - name: Extract Claude diagnosis
        if: steps.claude_token.outputs.present == 'true'
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import pathlib

          stream = pathlib.Path('claude-issue-diagnosis.jsonl')
          texts = []
          if stream.exists():
              for line in stream.read_text(encoding='utf-8', errors='replace').splitlines():
                  try:
                      item = json.loads(line)
                  except json.JSONDecodeError:
                      continue
                  if isinstance(item.get('result'), str):
                      texts.append(item['result'])
                  message = item.get('message')
                  if isinstance(message, dict):
                      for block in message.get('content') or []:
                          if isinstance(block, dict) and block.get('type') == 'text':
                              texts.append(block.get('text') or '')
          body = '\n\n'.join(text for text in texts if text.strip()).strip()
          if not body:
              body = 'Claude diagnosis did not produce parseable final text; use deterministic issue bodies.'
          pathlib.Path('issue-diagnosis.md').write_text('# Claude Issue Diagnosis\n\n' + body + '\n', encoding='utf-8')
          pathlib.Path('issue-diagnosis.json').write_text(json.dumps({'status':'ok' if body else 'empty', 'markdown': body}, indent=2) + '\n', encoding='utf-8')
          PY

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prod-ops-claude-diagnosis-${{ github.run_id }}
          path: |
            issue-diagnosis.json
            issue-diagnosis.md
            claude-issue-diagnosis.jsonl

  decision-and-issue:
    needs:
      - aggregate-report
      - claude-issue-diagnosis
    if: always() && needs.aggregate-report.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: prod-ops-report-${{ github.run_id }}
          path: .

      - uses: actions/download-artifact@v4
        if: needs.claude-issue-diagnosis.result == 'success'
        with:
          name: prod-ops-claude-diagnosis-${{ github.run_id }}
          path: claude-diagnosis

      - name: Open or update issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import json
          import pathlib
          import re
          import subprocess

          report = json.loads(pathlib.Path('ops-report.json').read_text(encoding='utf-8'))
          diagnosis_path = pathlib.Path('claude-diagnosis/issue-diagnosis.md')
          diagnosis = diagnosis_path.read_text(encoding='utf-8') if diagnosis_path.exists() else ''
          findings = report.get('issue_candidates') or []
          if not findings:
              print('No issue-worthy findings.')
              raise SystemExit(0)

          def sh(args, **kwargs):
              return subprocess.run(args, text=True, check=True, capture_output=True, **kwargs)

          def label_safe(value: str) -> str:
              value = re.sub(r'[^A-Za-z0-9_.:-]+', '-', value)[:50]
              return value or 'unknown'

          def ensure_label(name: str, color: str, description: str) -> None:
              subprocess.run(['gh', 'label', 'create', name, '--color', color, '--description', description[:100]], text=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)

          ensure_label('automated', 'C5DEF5', 'Automated signal')
          ensure_label('needs-triage', 'FBCA04', 'Needs human triage')
          ensure_label('prod-ops', 'BFD4F2', 'Prod Ops signal')

          for index, finding in enumerate(findings, 1):
              target_id = finding.get('target_id') or 'unknown'
              kind = finding.get('kind') or 'unknown'
              signature = finding.get('signature') or f'{target_id}|{kind}|{finding.get("title", "")}'
              sig_short = hashlib.sha256(signature.encode()).hexdigest()[:12]
              ops_label = f'ops-sig:{sig_short}'
              target_label = f'target:{label_safe(target_id)}'
              finding_label = f'finding:{label_safe(kind)}'
              ensure_label(ops_label, 'BFD4F2', 'Prod Ops finding signature')
              ensure_label(target_label, 'D4C5F9', 'Prod Ops target')
              ensure_label(finding_label, 'F9D0C4', 'Prod Ops finding kind')
              legacy_cluster_label = ''
              if kind == 'error_cluster':
                  cluster_short = hashlib.sha256(signature.encode()).hexdigest()[:12]
                  legacy_cluster_label = f'cluster-sig:{cluster_short}'
                  ensure_label(legacy_cluster_label, 'BFD4F2', 'cluster signature for cooldown')
              labels = ['prod-ops', 'automated', 'needs-triage', ops_label, target_label, finding_label]
              if legacy_cluster_label:
                  labels.append(legacy_cluster_label)

              title = f"[prod-ops] {target_id} {kind}: {finding.get('title', 'finding')}"[:250]
              body_lines = [
                  '## Prod Ops finding',
                  '',
                  f"- Run: {report.get('run_url')}",
                  f"- Target: `{target_id}`",
                  f"- Kind: `{kind}`",
                  f"- Status: `{finding.get('status')}`",
                  f"- Severity: `{finding.get('severity')}`",
                  f"- Signature: `{signature}`",
                  '',
                  '## Summary',
                  '',
                  finding.get('summary') or finding.get('title') or 'No summary.',
                  '',
                  '## Evidence',
                  '',
                  f"See artifact `prod-ops-report-{report.get('run_id')}` for `ops-report.json` and per-target reports.",
              ]
              if diagnosis:
                  body_lines += ['', '## Claude read-only diagnosis', '', diagnosis]
              body = '\n'.join(body_lines) + '\n'
              body_file = pathlib.Path(f'issue-{index}.md')
              body_file.write_text(body, encoding='utf-8')

              existing = sh(['gh', 'issue', 'list', '--label', ops_label, '--state', 'open', '--json', 'number', '--limit', '1', '--jq', '.[0].number // empty']).stdout.strip()
              if existing:
                  sh(['gh', 'issue', 'comment', existing, '--body-file', str(body_file)])
                  print(f'updated issue #{existing} for {ops_label}')
              else:
                  sh(['gh', 'issue', 'create', '--title', title, '--body-file', str(body_file), '--label', ','.join(labels)])
                  print(f'created issue for {ops_label}')
          PY

  log-dump:
    if: github.event_name == 'workflow_dispatch' && inputs.operation == 'log_dump'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      OIDC_ROLE_ARN: ${{ vars.AWS_OIDC_ROLE_ARN }}
      STACK_NAME: ${{ vars.PROD_STACK_NAME || 'tokenkey-prod-stage0' }}
      INPUT_TARGET_SELECTOR: ${{ inputs.target_selector || 'prod' }}
      INPUT_SINCE: ${{ inputs.since }}
      INPUT_CONTAINER: ${{ inputs.container }}
      INPUT_GREP: ${{ inputs.grep_pattern }}
      INPUT_TAIL: ${{ inputs.tail_lines }}
    concurrency:
      group: prod-ops-log-dump
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Validate inputs
        run: |
          set -euo pipefail
          case "$INPUT_TARGET_SELECTOR" in prod|all) ;;
            *) echo "::error::log_dump currently supports prod only; got target_selector=$INPUT_TARGET_SELECTOR"; exit 1 ;;
          esac
          if ! printf '%s' "$INPUT_SINCE" | grep -Eq '^[0-9]+[smhd]$'; then
            echo "::error::since must match ^[0-9]+[smhd]$ (e.g. 30m, 2h, 1d), got: $INPUT_SINCE"
            exit 1
          fi
          case "$INPUT_CONTAINER" in
            tokenkey|tokenkey-postgres|tokenkey-caddy|tokenkey-redis) ;;
            *) echo "::error::container must be one of tokenkey|tokenkey-postgres|tokenkey-caddy|tokenkey-redis, got: $INPUT_CONTAINER"; exit 1 ;;
          esac
          if ! printf '%s' "$INPUT_TAIL" | grep -Eq '^[1-9][0-9]*$'; then
            echo "::error::tail_lines must be a positive integer, got: $INPUT_TAIL"
            exit 1
          fi
          if [ "$INPUT_TAIL" -gt 10000 ]; then
            echo "::error::tail_lines capped at 10000 to keep artifact size sane, got: $INPUT_TAIL"
            exit 1
          fi
          if [ ${#INPUT_GREP} -gt 512 ]; then
            echo "::error::grep_pattern too long (>512 chars)"
            exit 1
          fi

      - name: Precheck OIDC role
        run: |
          if [ -z "${OIDC_ROLE_ARN:-}" ]; then
            echo "::error::AWS_OIDC_ROLE_ARN repo variable not set; configure per deploy/aws/README.md § 'CI 通过 OIDC 调度 SSM'"
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve prod instance ID
        id: instance
        run: |
          ID=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`InstanceId`].OutputValue' --output text)
          if [ -z "$ID" ] || [ "$ID" = "None" ]; then
            echo "::error::could not resolve InstanceId from stack $STACK_NAME"
            exit 1
          fi
          echo "id=$ID" >> "$GITHUB_OUTPUT"

      - name: Run docker logs on prod EC2 via SSM
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.id }}
        run: |
          set -euo pipefail
          export GREP_B64="$(printf '%s' "$INPUT_GREP" | base64 -w0 2>/dev/null \
            || printf '%s' "$INPUT_GREP" | base64 | tr -d '\n')"

          python3 - <<'PY' > ssm-params.json
          import json
          import os
          import shlex

          container = os.environ["INPUT_CONTAINER"]
          since = os.environ["INPUT_SINCE"]
          tail = os.environ["INPUT_TAIL"]
          grep_b64 = os.environ["GREP_B64"]
          commands = [
              "set -euo pipefail",
              "OUT=/tmp/prod-log-dump",
              "sudo rm -rf \"$OUT\" && sudo mkdir -p \"$OUT\" && sudo chmod 0777 \"$OUT\"",
              "trap 'sudo rm -rf /tmp/prod-log-dump' EXIT",
              "printf %s " + shlex.quote(grep_b64) + " | base64 -d > \"$OUT/pattern\"",
              "sudo docker logs " + shlex.quote(container) + " --since " + shlex.quote(since) + " --timestamps > \"$OUT/raw\" 2>&1 || true",
              "if [ -s \"$OUT/pattern\" ]; then grep -E --no-messages -f \"$OUT/pattern\" \"$OUT/raw\" | tail -n " + tail + " > \"$OUT/logs.txt\" || true; else tail -n " + tail + " \"$OUT/raw\" > \"$OUT/logs.txt\"; fi",
              "echo ===BEGIN_LOGS===",
              "gzip -c \"$OUT/logs.txt\" | (base64 -w0 2>/dev/null || base64 | tr -d '\\n')",
              "echo",
              "echo ===END_LOGS===",
          ]
          print(json.dumps({"commands": commands}))
          PY

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "prod-log-dump $INPUT_CONTAINER since=$INPUT_SINCE" \
            --parameters file://ssm-params.json \
            --query 'Command.CommandId' --output text)
          echo "ssm command-id=$CMD_ID"

          DEADLINE=$(( $(date +%s) + 180 ))
          while true; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo InProgress)
            case "$STATUS" in Success|Failed|TimedOut|Cancelled) break ;; esac
            [ $(date +%s) -lt $DEADLINE ] || { echo "::error::ssm timeout"; STATUS=TimedOut; break; }
            sleep 4
          done

          aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text > stdout.txt
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardErrorContent' --output text > stderr.txt

          if [ "$STATUS" != "Success" ]; then
            echo "::error::ssm command status=$STATUS"
            echo '--- stderr ---'; cat stderr.txt
            echo '--- stdout ---'; cat stdout.txt
            exit 1
          fi

          if ! grep -q '^===END_LOGS===$' stdout.txt; then
            BYTES=$(wc -c < stdout.txt)
            echo "::error::SSM stdout truncated at ${BYTES}B (24KB cap). Tighten GREP_PATTERN, lower TAIL_LINES, or shorten SINCE."
            exit 1
          fi

          awk '/^===BEGIN_LOGS===$/{f=1;next} /^===END_LOGS===$/{f=0} f' stdout.txt | tr -d '\n' | base64 -d | gunzip > logs.txt
          if [ ! -s logs.txt ]; then
            printf '(no log entries for container=%s since=%s grep=%q)\n' "$INPUT_CONTAINER" "$INPUT_SINCE" "$INPUT_GREP" > logs.txt
          fi

          BYTES=$(wc -c < logs.txt)
          LINES=$(wc -l < logs.txt)
          {
            echo "## prod-log-dump"
            echo "- container: \`$INPUT_CONTAINER\`"
            echo "- since:     \`$INPUT_SINCE\`"
            echo "- grep:      \`${INPUT_GREP:-(none)}\`"
            echo "- tail:      \`$INPUT_TAIL\`"
            echo "- result:    \`$LINES lines, $BYTES bytes\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "captured $LINES lines / $BYTES bytes"

      - uses: actions/upload-artifact@v4
        with:
          name: prod-logs-${{ github.run_id }}
          path: logs.txt
