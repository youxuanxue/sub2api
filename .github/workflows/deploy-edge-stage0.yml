name: Edge Stage0 Deploy

# Edge-specific orchestration only. Image manifest checks and SSM upgrade logic
# are shared with deploy-stage0.yml via ops/stage0/*.sh so prod and
# Edge cannot drift into separate deployment semantics.

on:
  workflow_dispatch:
    inputs:
      edge_id:
        description: "Edge target id from deploy/aws/stage0/edge-targets.json (deployable=true only)."
        required: true
        type: choice
        options:
          # Keep in sync with cicd-oidc AllowedSubjects (environment:edge-*) + CFN execution role mapping below.
          # Planned edges remain in edge-targets.json until bootstrap widens IAM + adds GitHub Environments.
          - uk1
          - fra1
          - us1
      operation:
        description: "Operation to run. provision creates/updates CFN; upgrade only changes image tag via SSM; smoke verifies; rotate_egress_ip swaps the EIP via CFN-native UpdateStack with auto-revert on pollution; decommission permanently deletes the stack (gated by deployable=false + explicit confirm) — used for EC2→Lightsail migration."
        required: true
        type: choice
        options:
          - provision
          - upgrade
          - smoke
          - rollback
          - rotate_egress_ip
          - decommission
      tag:
        description: "Released image tag without leading v. Required for provision/upgrade/rollback."
        required: false
        type: string
      confirm_stack:
        description: "Must exactly match the target stack name from the matrix (e.g. tokenkey-edge-uk1-stage0)."
        required: true
        type: string
      simple_release_override:
        description: "⚠️ Allow deploy of a single-arch manifest. Default false; Edge hosts are Graviton arm64."
        required: false
        type: boolean
        default: false
      rotation_reason:
        description: "Required for operation=rotate_egress_ip. Short string written to the EIP tag and to edge-polluted-ips.json notes when the old EIP is retired (e.g. 'upstream-api-risk-block-2026-05-23')."
        required: false
        type: string
      candidate_allocation_id:
        description: "Optional for operation=rotate_egress_ip. If set, skip allocation and swap directly to this pre-vetted allocation-id. Must match ^eipalloc-[0-9a-f]+$ and be in the edge's region."
        required: false
        type: string
      i_understand_destroys_data:
        description: "Required for operation=decommission. MUST be 'true' to acknowledge permanent deletion of EC2 instance + EBS volume + VPC. EBS is snapshotted before delete (30-day retention tag); EIP is preserved unless release_eip=true."
        required: false
        type: boolean
        default: false
      release_eip:
        description: "Optional for operation=decommission. If true, also release the externally-allocated EIP after CFN delete. Default false (keeps EIP for re-use on another edge or for ip-history audit)."
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write
  packages: read

concurrency:
  group: deploy-edge-stage0-${{ inputs.edge_id }}
  cancel-in-progress: false

jobs:
  edge:
    runs-on: ubuntu-latest
    environment: edge-${{ inputs.edge_id }}
    env:
      OIDC_ROLE_ARN: ${{ vars.AWS_OIDC_ROLE_ARN }}
      INPUT_EDGE_ID: ${{ inputs.edge_id }}
      INPUT_OPERATION: ${{ inputs.operation }}
      INPUT_TAG: ${{ inputs.tag }}
      INPUT_CONFIRM_STACK: ${{ inputs.confirm_stack }}
      INPUT_OVERRIDE: ${{ inputs.simple_release_override }}
      INPUT_ROTATION_REASON: ${{ inputs.rotation_reason }}
      INPUT_CANDIDATE_ALLOC: ${{ inputs.candidate_allocation_id }}
      INPUT_UNDERSTAND_DESTROY: ${{ inputs.i_understand_destroys_data }}
      INPUT_RELEASE_EIP: ${{ inputs.release_eip }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Resolve edge target
        id: edge
        run: |
          set -euo pipefail
          if [ -z "${OIDC_ROLE_ARN:-}" ]; then
            echo "::error::AWS_OIDC_ROLE_ARN repo variable not set"
            exit 1
          fi
          # decommission targets edges that are deployable=false (matrix gate
          # for "this edge is shut down or being shut down"). Pass --allow-planned
          # so the resolver doesn't reject it; the decommission step asserts
          # deployable==false explicitly to keep the gate meaningful.
          ALLOW_PLANNED=""
          if [ "$INPUT_OPERATION" = "decommission" ]; then
            ALLOW_PLANNED="--allow-planned"
          fi
          python3 deploy/aws/stage0/resolve-edge-target.py \
            --edge-id "$INPUT_EDGE_ID" \
            --confirm-stack "$INPUT_CONFIRM_STACK" \
            $ALLOW_PLANNED \
            --github-output "$GITHUB_OUTPUT"

      - name: Validate operation inputs
        run: |
          set -euo pipefail
          case "$INPUT_OPERATION" in
            provision|upgrade|rollback)
              if [ -z "${INPUT_TAG:-}" ]; then
                echo "::error::tag is required for operation=$INPUT_OPERATION"
                exit 1
              fi
              if ! printf '%s' "$INPUT_TAG" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+|-beta\.[0-9]+)?$'; then
                echo "::error::tag must match X.Y.Z (optionally -rc.N / -beta.N), got: $INPUT_TAG"
                exit 1
              fi
              ;;
            smoke)
              ;;
            rotate_egress_ip)
              if [ -z "${INPUT_ROTATION_REASON:-}" ]; then
                echo "::error::rotation_reason is required for operation=rotate_egress_ip"
                exit 1
              fi
              if [ -n "${INPUT_CANDIDATE_ALLOC:-}" ] && ! printf '%s' "$INPUT_CANDIDATE_ALLOC" | grep -Eq '^eipalloc-[0-9a-f]{8,17}$'; then
                echo "::error::candidate_allocation_id must match ^eipalloc-[0-9a-f]+$, got: $INPUT_CANDIDATE_ALLOC"
                exit 1
              fi
              ;;
            decommission)
              if [ "${INPUT_UNDERSTAND_DESTROY}" != "true" ]; then
                echo "::error::operation=decommission requires i_understand_destroys_data=true"
                echo "::error::This will permanently DELETE the CloudFormation stack, EC2 instance, and EBS volume."
                echo "::error::EBS root volume is snapshotted before delete (30-day retention tag). EIP is preserved unless release_eip=true."
                exit 1
              fi
              if [ "${{ steps.edge.outputs.deployable }}" != "false" ]; then
                echo "::error::operation=decommission requires the edge to be deployable=false in deploy/aws/stage0/edge-targets.json"
                echo "::error::Currently: $INPUT_EDGE_ID deployable=${{ steps.edge.outputs.deployable }}"
                echo "::error::Flip deployable=false (separate PR) before decommissioning. This prevents accidental destroy of an active edge."
                exit 1
              fi
              ;;
            *)
              echo "::error::unsupported operation=$INPUT_OPERATION"
              exit 1
              ;;
          esac

      - name: Verify GHCR multi-arch manifest
        if: inputs.operation == 'provision' || inputs.operation == 'upgrade' || inputs.operation == 'rollback'
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash ops/stage0/verify_ghcr_manifest.sh "$INPUT_TAG" "$INPUT_OVERRIDE"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.OIDC_ROLE_ARN }}
          aws-region: ${{ steps.edge.outputs.region }}

      - name: Provision or update Edge stack
        if: inputs.operation == 'provision'
        env:
          STACK_NAME: ${{ steps.edge.outputs.stack }}
          EDGE_ID: ${{ steps.edge.outputs.edge_id }}
          SSM_PREFIX: ${{ steps.edge.outputs.ssm_prefix }}
          PROFILE: ${{ steps.edge.outputs.profile }}
          API_DOMAIN: ${{ steps.edge.outputs.domain }}
          INSTANCE_TYPE: ${{ steps.edge.outputs.instance_type }}
          ROOT_VOLUME_GIB: ${{ steps.edge.outputs.root_volume_gib }}
          SWAP_GIB: ${{ steps.edge.outputs.swap_gib }}
          MONTHLY_BUDGET_USD: ${{ steps.edge.outputs.monthly_budget_usd }}
          GHCR_OWNER: ${{ github.repository_owner }}
          GHCR_PULL_USER: ${{ github.repository_owner }}
          ACME_EMAIL: ${{ vars.EDGE_ACME_EMAIL }}
          MAIN_GATEWAY_ALLOWED_CIDR: ${{ vars.EDGE_MAIN_GATEWAY_ALLOWED_CIDR }}
          GHCR_PAT_SSM_NAME_OVERRIDE: ${{ vars.EDGE_GHCR_PAT_SSM_NAME }}
          AWS_OIDC_STACK_NAME: ${{ vars.AWS_OIDC_STACK_NAME }}
          AWS_OIDC_STACK_REGION: ${{ vars.AWS_OIDC_STACK_REGION || vars.AWS_REGION || 'us-east-1' }}
        run: |
          set -euo pipefail
          if [ -z "${ACME_EMAIL:-}" ]; then
            echo "::error::EDGE_ACME_EMAIL repo/environment variable is required for provision"
            exit 1
          fi
          MAIN_GATEWAY_ALLOWED_CIDR="${MAIN_GATEWAY_ALLOWED_CIDR:-34.194.234.88/32}"
          if [ -n "${GHCR_PAT_SSM_NAME_OVERRIDE:-}" ]; then
            GHCR_PAT_SSM_NAME="$GHCR_PAT_SSM_NAME_OVERRIDE"
          else
            GHCR_PAT_SSM_NAME="${SSM_PREFIX}/ghcr/pat"
          fi
          AWS_OIDC_STACK_NAME="${AWS_OIDC_STACK_NAME:-tokenkey-cicd-oidc}"
          case "${EDGE_ID}" in
            uk1) CFN_ROLE_OUTPUT_KEY=EdgeUk1CloudFormationExecutionRoleArn ;;
            fra1) CFN_ROLE_OUTPUT_KEY=EdgeFra1CloudFormationExecutionRoleArn ;;
            us1) CFN_ROLE_OUTPUT_KEY=EdgeUs1CloudFormationExecutionRoleArn ;;
            *)
              echo "::error::edge_id ${EDGE_ID} has no CloudFormation execution role mapping in deploy-edge-stage0.yml"
              exit 1
              ;;
          esac
          CFN_EXECUTION_ROLE_ARN=$(aws cloudformation describe-stacks --region "${AWS_OIDC_STACK_REGION}" \
            --stack-name "$AWS_OIDC_STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey==\`${CFN_ROLE_OUTPUT_KEY}\`].OutputValue" --output text)
          if [ -z "${CFN_EXECUTION_ROLE_ARN:-}" ] || [ "$CFN_EXECUTION_ROLE_ARN" = "None" ]; then
            echo "::error::could not resolve ${CFN_ROLE_OUTPUT_KEY} from cicd OIDC stack ${AWS_OIDC_STACK_NAME} (region ${AWS_OIDC_STACK_REGION})"
            exit 1
          fi

          # EipAllocationId is a required CFN parameter in the new template
          # (the EIP is owned outside the stack). For an EXISTING stack we omit
          # the override so the current value is preserved. For a NEW stack
          # we allocate first and pass the fresh allocation-id.
          EIP_PARAM=()
          if aws cloudformation describe-stacks --stack-name "$STACK_NAME" \
               --query 'Stacks[0].StackStatus' --output text >/dev/null 2>&1; then
            echo "stack $STACK_NAME already exists — preserving current EipAllocationId across update"
          else
            echo "stack $STACK_NAME does not exist — allocating fresh EIP for initial provision"
            ALLOC_JSON=$(python3 deploy/aws/stage0/allocate-clean-egress-eip.py \
              --region "$AWS_DEFAULT_REGION" \
              --edge-id "$EDGE_ID" \
              --profile "$PROFILE" \
              --monthly-budget-usd "$MONTHLY_BUDGET_USD" \
              --reason "initial provision via deploy-edge-stage0")
            echo "$ALLOC_JSON"
            NEW_ALLOC=$(printf '%s' "$ALLOC_JSON" | python3 -c 'import json,sys;print(json.loads(sys.stdin.read())["allocation_id"])')
            EIP_PARAM=("EipAllocationId=$NEW_ALLOC")
          fi

          aws cloudformation deploy \
            --stack-name "$STACK_NAME" \
            --template-file deploy/aws/cloudformation/stage0-edge-ec2.yaml \
            --role-arn "$CFN_EXECUTION_ROLE_ARN" \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              EdgeId="$EDGE_ID" \
              Profile="$PROFILE" \
              ApiDomain="$API_DOMAIN" \
              AcmeEmail="$ACME_EMAIL" \
              MainGatewayAllowedCidr="$MAIN_GATEWAY_ALLOWED_CIDR" \
              InstanceType="$INSTANCE_TYPE" \
              RootVolumeSizeGiB="$ROOT_VOLUME_GIB" \
              SwapSizeGiB="$SWAP_GIB" \
              MonthlyBudgetUsd="$MONTHLY_BUDGET_USD" \
              GhcrOwner="$GHCR_OWNER" \
              GhcrPullUser="$GHCR_PULL_USER" \
              GhcrPatSsmName="$GHCR_PAT_SSM_NAME" \
              ImageTag="$INPUT_TAG" \
              "${EIP_PARAM[@]}"

      - name: Resolve Edge instance + API URL
        id: instance
        if: inputs.operation != 'provision' || success()
        env:
          STACK_NAME: ${{ steps.edge.outputs.stack }}
        run: |
          set -euo pipefail
          ID=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`InstanceId`].OutputValue' --output text)
          if [ -z "$ID" ] || [ "$ID" = "None" ]; then
            echo "::error::could not resolve InstanceId from stack $STACK_NAME"
            exit 1
          fi
          API_URL=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' --output text)
          if [ -z "$API_URL" ] || [ "$API_URL" = "None" ]; then
            echo "::error::could not resolve ApiUrl from stack $STACK_NAME"
            exit 1
          fi
          echo "id=$ID" >> "$GITHUB_OUTPUT"
          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

      - name: Upgrade or rollback Edge via shared SSM deploy primitive
        id: ssm
        if: inputs.operation == 'upgrade' || inputs.operation == 'rollback'
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.id }}
          STAGE0_SSM_OUTPUT_DIR: .
        run: bash ops/stage0/deploy_via_ssm.sh "$INPUT_TAG" "$INSTANCE_ID" "deploy-edge-stage0 edge=$INPUT_EDGE_ID op=$INPUT_OPERATION"

      - name: Resolve CFN execution role (rotate_egress_ip)
        id: rotate_role
        if: inputs.operation == 'rotate_egress_ip'
        env:
          EDGE_ID: ${{ steps.edge.outputs.edge_id }}
          AWS_OIDC_STACK_NAME: ${{ vars.AWS_OIDC_STACK_NAME }}
          AWS_OIDC_STACK_REGION: ${{ vars.AWS_OIDC_STACK_REGION || vars.AWS_REGION || 'us-east-1' }}
        run: |
          set -euo pipefail
          AWS_OIDC_STACK_NAME="${AWS_OIDC_STACK_NAME:-tokenkey-cicd-oidc}"
          case "${EDGE_ID}" in
            uk1) CFN_ROLE_OUTPUT_KEY=EdgeUk1CloudFormationExecutionRoleArn ;;
            fra1) CFN_ROLE_OUTPUT_KEY=EdgeFra1CloudFormationExecutionRoleArn ;;
            us1) CFN_ROLE_OUTPUT_KEY=EdgeUs1CloudFormationExecutionRoleArn ;;
            *)
              echo "::error::edge_id ${EDGE_ID} has no CloudFormation execution role mapping in deploy-edge-stage0.yml"
              exit 1
              ;;
          esac
          ARN=$(aws cloudformation describe-stacks --region "${AWS_OIDC_STACK_REGION}" \
            --stack-name "$AWS_OIDC_STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey==\`${CFN_ROLE_OUTPUT_KEY}\`].OutputValue" --output text)
          if [ -z "${ARN:-}" ] || [ "$ARN" = "None" ]; then
            echo "::error::could not resolve ${CFN_ROLE_OUTPUT_KEY} from cicd OIDC stack ${AWS_OIDC_STACK_NAME} (region ${AWS_OIDC_STACK_REGION})"
            exit 1
          fi
          echo "arn=$ARN" >> "$GITHUB_OUTPUT"

      - name: Read current EipAllocationId from stack (rotate_egress_ip)
        id: current_eip
        if: inputs.operation == 'rotate_egress_ip'
        env:
          STACK_NAME: ${{ steps.edge.outputs.stack }}
        run: |
          set -euo pipefail
          OLD_ALLOC=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" \
            --query "Stacks[0].Parameters[?ParameterKey=='EipAllocationId'].ParameterValue | [0]" --output text)
          if [ -z "$OLD_ALLOC" ] || [ "$OLD_ALLOC" = "None" ]; then
            echo "::error::stack $STACK_NAME has no EipAllocationId parameter — pre-OPC EIP-as-resource shape. Run deploy/aws/stage0/migrate-edge-eip-to-parameter.sh first."
            exit 1
          fi
          OLD_IP=$(aws ec2 describe-addresses --allocation-ids "$OLD_ALLOC" \
            --query 'Addresses[0].PublicIp' --output text)
          if [ -z "$OLD_IP" ] || [ "$OLD_IP" = "None" ]; then
            echo "::error::could not resolve PublicIp for current allocation $OLD_ALLOC"
            exit 1
          fi
          echo "alloc=$OLD_ALLOC" >> "$GITHUB_OUTPUT"
          echo "ip=$OLD_IP" >> "$GITHUB_OUTPUT"

      - name: Allocate clean candidate EIP (rotate_egress_ip; auto path)
        id: candidate
        if: inputs.operation == 'rotate_egress_ip' && inputs.candidate_allocation_id == ''
        env:
          EDGE_ID: ${{ steps.edge.outputs.edge_id }}
          REGION: ${{ steps.edge.outputs.region }}
          PROFILE: ${{ steps.edge.outputs.profile }}
          MONTHLY_BUDGET_USD: ${{ steps.edge.outputs.monthly_budget_usd }}
        run: |
          set -euo pipefail
          out=$(python3 deploy/aws/stage0/allocate-clean-egress-eip.py \
            --region "$REGION" --edge-id "$EDGE_ID" \
            --profile "$PROFILE" --monthly-budget-usd "$MONTHLY_BUDGET_USD" \
            --reason "$INPUT_ROTATION_REASON")
          echo "$out"
          alloc=$(printf '%s' "$out" | python3 -c 'import json,sys;print(json.loads(sys.stdin.read())["allocation_id"])')
          ip=$(printf '%s' "$out" | python3 -c 'import json,sys;print(json.loads(sys.stdin.read())["public_ip"])')
          echo "alloc=$alloc" >> "$GITHUB_OUTPUT"
          echo "ip=$ip" >> "$GITHUB_OUTPUT"

      - name: Resolve effective candidate (rotate_egress_ip)
        id: new_eip
        if: inputs.operation == 'rotate_egress_ip'
        env:
          OVERRIDE_ALLOC: ${{ inputs.candidate_allocation_id }}
          AUTO_ALLOC: ${{ steps.candidate.outputs.alloc }}
          AUTO_IP: ${{ steps.candidate.outputs.ip }}
          REGION: ${{ steps.edge.outputs.region }}
        run: |
          set -euo pipefail
          if [ -n "$OVERRIDE_ALLOC" ]; then
            NEW_ALLOC="$OVERRIDE_ALLOC"
            NEW_IP=$(aws ec2 describe-addresses --region "$REGION" --allocation-ids "$NEW_ALLOC" \
              --query 'Addresses[0].PublicIp' --output text)
            if [ -z "$NEW_IP" ] || [ "$NEW_IP" = "None" ]; then
              echo "::error::could not resolve PublicIp for operator-supplied candidate $NEW_ALLOC in $REGION"
              exit 1
            fi
            SOURCE=operator
          else
            NEW_ALLOC="$AUTO_ALLOC"
            NEW_IP="$AUTO_IP"
            SOURCE=auto
          fi
          echo "alloc=$NEW_ALLOC" >> "$GITHUB_OUTPUT"
          echo "ip=$NEW_IP" >> "$GITHUB_OUTPUT"
          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"

      - name: Swap EIP via CloudFormation update-stack (rotate_egress_ip)
        if: inputs.operation == 'rotate_egress_ip'
        env:
          STACK_NAME: ${{ steps.edge.outputs.stack }}
          CFN_ROLE: ${{ steps.rotate_role.outputs.arn }}
          NEW_ALLOC: ${{ steps.new_eip.outputs.alloc }}
        run: |
          set -euo pipefail
          aws cloudformation deploy \
            --stack-name "$STACK_NAME" \
            --template-file deploy/aws/cloudformation/stage0-edge-ec2.yaml \
            --role-arn "$CFN_ROLE" \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides EipAllocationId="$NEW_ALLOC"

      - name: Verify SSM Online post-swap (rotate_egress_ip)
        if: inputs.operation == 'rotate_egress_ip'
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.id }}
          REGION: ${{ steps.edge.outputs.region }}
        run: bash deploy/aws/stage0/verify-ssm-online.sh "$INSTANCE_ID" "$REGION"

      - name: Probe egress for upstream-API pollution (rotate_egress_ip)
        id: egress_probe
        if: inputs.operation == 'rotate_egress_ip'
        continue-on-error: true
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.id }}
          REGION: ${{ steps.edge.outputs.region }}
          NEW_IP: ${{ steps.new_eip.outputs.ip }}
        run: bash deploy/aws/stage0/verify-egress-clean.sh "$INSTANCE_ID" "$REGION" "$NEW_IP"

      - name: Revert EIP on probe failure (rotate_egress_ip)
        if: inputs.operation == 'rotate_egress_ip' && steps.egress_probe.outcome == 'failure'
        env:
          STACK_NAME: ${{ steps.edge.outputs.stack }}
          CFN_ROLE: ${{ steps.rotate_role.outputs.arn }}
          OLD_ALLOC: ${{ steps.current_eip.outputs.alloc }}
          NEW_ALLOC: ${{ steps.new_eip.outputs.alloc }}
          NEW_SOURCE: ${{ steps.new_eip.outputs.source }}
          REGION: ${{ steps.edge.outputs.region }}
        run: |
          set -euo pipefail
          echo "::warning::pollution probe failed on ${NEW_ALLOC}; reverting stack to ${OLD_ALLOC}"
          aws cloudformation deploy \
            --stack-name "$STACK_NAME" \
            --template-file deploy/aws/cloudformation/stage0-edge-ec2.yaml \
            --role-arn "$CFN_ROLE" \
            --capabilities CAPABILITY_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides EipAllocationId="$OLD_ALLOC"
          bash deploy/aws/stage0/verify-ssm-online.sh "${{ steps.instance.outputs.id }}" "$REGION"
          if [ "$NEW_SOURCE" = "auto" ]; then
            # The candidate was allocated inside this run; release it. Operator-
            # supplied allocations are left alone so they can be inspected.
            #
            # The `|| true` here is intentional: revert correctness is "data
            # plane is back on OLD_ALLOC and SSM is Online", both already
            # asserted above. If release-address transiently fails (AWS
            # throttling, residual association lag, etc.) we'd rather log a
            # leaked candidate EIP than abort the revert path and leave the
            # operator with an unclear failure state. The job still exits 1
            # below, so the leak — if any — surfaces in the next ops
            # diagnostic cycle, not silently.
            aws ec2 release-address --region "$REGION" --allocation-id "$NEW_ALLOC" || \
              echo "::warning::release-address failed for candidate ${NEW_ALLOC} during revert; check region ${REGION} for orphan EIPs"
          fi
          echo "::error::rotate_egress_ip aborted; data plane restored to ${OLD_ALLOC}. Inspect the verify-egress-clean step output and re-dispatch with a different candidate (or different region)."
          exit 1

      - name: Data-plane health on new IP (rotate_egress_ip)
        if: inputs.operation == 'rotate_egress_ip'
        env:
          DOMAIN: ${{ steps.edge.outputs.domain }}
          NEW_IP: ${{ steps.new_eip.outputs.ip }}
        run: |
          set -euo pipefail
          # DNS still points at OLD_IP until the operator updates Porkbun. Force-
          # resolve to the new IP so we test Caddy + app end-to-end on the new
          # allocation immediately, not after DNS propagation.
          ok=false
          for i in 1 2 3; do
            code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 \
              --resolve "${DOMAIN}:443:${NEW_IP}" \
              "https://${DOMAIN}/health" || echo 000)
            echo "try ${i}: HTTP ${code} (https://${DOMAIN}/health via ${NEW_IP})"
            if [ "$code" = "200" ]; then ok=true; break; fi
            sleep 6
          done
          if [ "$ok" != "true" ]; then
            echo "::error::data-plane health check failed on new IP ${NEW_IP} (Caddy + app not responding 200 within 3 tries). Consider revert via re-dispatch with candidate_allocation_id=${{ steps.current_eip.outputs.alloc }}."
            exit 1
          fi

      - name: Emit rotation handoff summary (rotate_egress_ip)
        if: inputs.operation == 'rotate_egress_ip'
        env:
          EDGE_ID: ${{ steps.edge.outputs.edge_id }}
          REGION: ${{ steps.edge.outputs.region }}
          DOMAIN: ${{ steps.edge.outputs.domain }}
          OLD_ALLOC: ${{ steps.current_eip.outputs.alloc }}
          OLD_IP: ${{ steps.current_eip.outputs.ip }}
          NEW_ALLOC: ${{ steps.new_eip.outputs.alloc }}
          NEW_IP: ${{ steps.new_eip.outputs.ip }}
          REASON: ${{ inputs.rotation_reason }}
        run: |
          set -euo pipefail
          today=$(date -u +%Y-%m-%d)
          {
            echo "## EIP rotation complete (operation=rotate_egress_ip)"
            echo
            echo "- edge: \`${EDGE_ID}\` (\`${REGION}\`)"
            echo "- old: \`${OLD_IP}\` (\`${OLD_ALLOC}\`)"
            echo "- new: \`${NEW_IP}\` (\`${NEW_ALLOC}\`)"
            echo "- reason: ${REASON}"
            echo
            echo "### Operator follow-up — two manual steps remain (intentional)"
            echo
            echo "**1. Update DNS at Porkbun** (or your DNS provider): set the A record for \`${DOMAIN}\` from \`${OLD_IP}\` to \`${NEW_IP}\`. The data plane already serves on the new IP — this step just makes resolver lookups agree."
            echo
            echo "**2. Append the retired IP to \`deploy/aws/stage0/edge-polluted-ips.json\`** so future rotations refuse to re-allocate it. Snippet to paste under \`.polluted\`:"
            echo
            echo "\`\`\`json"
            echo "{"
            echo "  \"ip\": \"${OLD_IP}\","
            echo "  \"region\": \"${REGION}\","
            echo "  \"previous_edge\": \"${EDGE_ID}\","
            echo "  \"retired_on\": \"${today}\","
            echo "  \"released_on\": null,"
            echo "  \"notes\": \"${REASON}; retired via deploy-edge-stage0 operation=rotate_egress_ip; release-address scheduled after DNS propagation\""
            echo "}"
            echo "\`\`\`"
            echo
            echo "Once DNS has propagated (~1 hour) you may also release the retired EIP:"
            echo
            echo "\`\`\`bash"
            echo "aws ec2 release-address --region ${REGION} --allocation-id ${OLD_ALLOC}"
            echo "\`\`\`"
            echo
            echo "After the release, update \`released_on\` in the JSON entry to the release date and commit."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Snapshot EBS root volume before decommission
        if: inputs.operation == 'decommission'
        id: decommission_snapshot
        env:
          STACK_NAME: ${{ steps.edge.outputs.stack }}
          EDGE_ID: ${{ steps.edge.outputs.edge_id }}
          REGION: ${{ steps.edge.outputs.region }}
        run: |
          set -euo pipefail
          # Resolve InstanceId from stack outputs (the stack still exists at this point).
          INSTANCE_ID="$(aws cloudformation describe-stacks --region "$REGION" --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`InstanceId`].OutputValue' --output text)"
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            # No InstanceId in stack outputs is genuinely "already torn down" —
            # delete-stack will be a no-op too. This is the only path where we
            # legitimately skip snapshot (nothing to snapshot).
            echo "::warning::stack $STACK_NAME has no InstanceId output (already torn down?); skipping snapshot"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Resolve the actual root device name from the instance (NOT hard-coded
          # /dev/xvda — AL2023 on t4g uses xvda today, but Nitro / future AMIs
          # may use nvme0n1 etc.). Fail-fast if we cannot identify a root EBS,
          # because the snapshot is a contract of decommission and an empty
          # snapshot path would silently destroy the rollback window.
          ROOT_DEV="$(aws ec2 describe-instances --region "$REGION" --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].RootDeviceName' --output text)"
          if [ -z "$ROOT_DEV" ] || [ "$ROOT_DEV" = "None" ]; then
            echo "::error::cannot resolve RootDeviceName for $INSTANCE_ID — refusing to decommission without an EBS snapshot"
            exit 1
          fi
          ROOT_VOL="$(aws ec2 describe-instances --region "$REGION" --instance-ids "$INSTANCE_ID" \
            --query "Reservations[0].Instances[0].BlockDeviceMappings[?DeviceName=='${ROOT_DEV}'].Ebs.VolumeId" \
            --output text)"
          if [ -z "$ROOT_VOL" ] || [ "$ROOT_VOL" = "None" ]; then
            echo "::error::instance $INSTANCE_ID has no EBS volume on RootDeviceName=$ROOT_DEV — refusing to decommission without an EBS snapshot"
            exit 1
          fi
          TS="$(date -u +%Y%m%dT%H%M%SZ)"
          SNAP="$(aws ec2 create-snapshot --region "$REGION" --volume-id "$ROOT_VOL" \
            --description "pre-decommission snapshot of $STACK_NAME root volume ($ROOT_DEV)" \
            --tag-specifications "ResourceType=snapshot,Tags=[{Key=Project,Value=tokenkey},{Key=EdgeId,Value=$EDGE_ID},{Key=Purpose,Value=pre-decommission-rollback},{Key=Stack,Value=$STACK_NAME},{Key=RootDevice,Value=$ROOT_DEV},{Key=Timestamp,Value=$TS},{Key=RetentionDays,Value=30}]" \
            --query 'SnapshotId' --output text)"
          echo "snapshot_id=$SNAP" >> "$GITHUB_OUTPUT"
          echo "volume_id=$ROOT_VOL" >> "$GITHUB_OUTPUT"
          echo "root_device=$ROOT_DEV" >> "$GITHUB_OUTPUT"
          echo "skipped=false" >> "$GITHUB_OUTPUT"
          # Wait up to 10 minutes for snapshot to reach 'pending' or 'completed' — we don't need full completion
          # to proceed with stack delete (snapshot is independent of the source volume); we just confirm AWS
          # accepted the request and the snapshot exists.
          for i in 1 2 3 4 5 6; do
            STATE="$(aws ec2 describe-snapshots --region "$REGION" --snapshot-ids "$SNAP" \
              --query 'Snapshots[0].State' --output text 2>/dev/null || echo pending)"
            case "$STATE" in pending|completed) break ;; esac
            sleep 10
          done
          echo "snapshot $SNAP created (state=$STATE) for volume $ROOT_VOL on $ROOT_DEV"

      - name: Read EIP allocation before decommission
        if: inputs.operation == 'decommission'
        id: decommission_eip
        env:
          STACK_NAME: ${{ steps.edge.outputs.stack }}
          REGION: ${{ steps.edge.outputs.region }}
        run: |
          set -euo pipefail
          # describe-stacks may return non-zero for an already-deleted stack
          # on retry; the empty alloc_id branch below covers it.
          ALLOC="$(aws cloudformation describe-stacks --region "$REGION" --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`EipAllocationId`].OutputValue' --output text 2>/dev/null || true)"  # preflight-allow: swallow
          if [ -z "$ALLOC" ] || [ "$ALLOC" = "None" ]; then
            echo "::warning::stack $STACK_NAME has no EipAllocationId output"
            echo "alloc_id=" >> "$GITHUB_OUTPUT"
          else
            echo "alloc_id=$ALLOC" >> "$GITHUB_OUTPUT"
            echo "EIP allocation pinned for downstream: $ALLOC"
          fi

      - name: Delete CloudFormation stack
        if: inputs.operation == 'decommission'
        env:
          STACK_NAME: ${{ steps.edge.outputs.stack }}
          REGION: ${{ steps.edge.outputs.region }}
        run: |
          set -euo pipefail
          echo "deleting CFN stack $STACK_NAME in $REGION"
          aws cloudformation delete-stack --region "$REGION" --stack-name "$STACK_NAME"
          aws cloudformation wait stack-delete-complete --region "$REGION" --stack-name "$STACK_NAME"
          echo "stack $STACK_NAME deleted"

      - name: Release EIP (optional)
        if: inputs.operation == 'decommission' && inputs.release_eip == true
        env:
          ALLOC: ${{ steps.decommission_eip.outputs.alloc_id }}
          REGION: ${{ steps.edge.outputs.region }}
        run: |
          set -euo pipefail
          if [ -z "${ALLOC:-}" ]; then
            echo "::warning::no EIP allocation captured; skipping release"
            exit 0
          fi
          # preflight-allow: swallow — already-released or already-associated-elsewhere
          # both surface as non-zero; we then check describe-addresses to confirm.
          if ! aws ec2 release-address --region "$REGION" --allocation-id "$ALLOC" 2>/tmp/release-err; then
            cat /tmp/release-err >&2 || true  # preflight-allow: swallow — best-effort stderr forwarding; file may be empty
            EXISTS="$(aws ec2 describe-addresses --region "$REGION" --allocation-ids "$ALLOC" --query 'Addresses' --output text 2>/dev/null || echo gone)"
            if [ -z "$EXISTS" ] || [ "$EXISTS" = "gone" ]; then
              echo "EIP $ALLOC already released (idempotent OK)"
            else
              echo "::error::release-address failed for $ALLOC"
              exit 1
            fi
          fi
          echo "EIP $ALLOC released"

      - name: External Edge health check
        if: inputs.operation == 'upgrade' || inputs.operation == 'rollback' || inputs.operation == 'smoke'
        env:
          API_URL: ${{ steps.instance.outputs.api_url }}
        run: bash ops/stage0/external_health.sh "$API_URL"

      - name: Edge smoke
        if: inputs.operation == 'smoke' || inputs.operation == 'upgrade' || inputs.operation == 'rollback'
        env:
          EDGE_ID: ${{ steps.edge.outputs.edge_id }}
          EDGE_API_URL: ${{ steps.instance.outputs.api_url }}
          EDGE_INSTANCE_ID: ${{ steps.instance.outputs.id }}
          EDGE_SSM_PREFIX: ${{ steps.edge.outputs.ssm_prefix }}
          MAIN_GATEWAY_BASE_URL: ${{ vars.EDGE_MAIN_GATEWAY_BASE_URL }}
          MAIN_GATEWAY_EDGE_SMOKE_API_KEY: ${{ secrets.MAIN_GATEWAY_EDGE_SMOKE_API_KEY }}
          POST_DEPLOY_SMOKE_CHAT_MODEL: ${{ vars.POST_DEPLOY_SMOKE_CHAT_MODEL || 'claude-sonnet-4-6' }}
        run: bash ops/stage0/edge_post_deploy_smoke.sh

      - name: Job summary
        if: always()
        env:
          EDGE_ID: ${{ steps.edge.outputs.edge_id }}
          REGION: ${{ steps.edge.outputs.region }}
          DOMAIN: ${{ steps.edge.outputs.domain }}
          STACK_NAME: ${{ steps.edge.outputs.stack }}
          PROFILE: ${{ steps.edge.outputs.profile }}
          BUDGET: ${{ steps.edge.outputs.monthly_budget_usd }}
          INSTANCE_TYPE: ${{ steps.edge.outputs.instance_type }}
          INSTANCE_ID: ${{ steps.instance.outputs.id }}
          API_URL: ${{ steps.instance.outputs.api_url }}
          CMD_ID: ${{ steps.ssm.outputs.command_id }}
          DECOMM_SNAPSHOT: ${{ steps.decommission_snapshot.outputs.snapshot_id }}
          DECOMM_VOLUME: ${{ steps.decommission_snapshot.outputs.volume_id }}
          DECOMM_EIP: ${{ steps.decommission_eip.outputs.alloc_id }}
          DECOMM_RELEASED: ${{ inputs.release_eip }}
        run: |
          {
            echo "## deploy-edge-stage0"
            echo "- edge_id: \`${EDGE_ID:-unknown}\`"
            echo "- operation: \`$INPUT_OPERATION\`"
            echo "- tag: \`${INPUT_TAG:-none}\`"
            echo "- region: \`${REGION:-unknown}\`"
            echo "- domain: \`${DOMAIN:-unknown}\`"
            echo "- stack: \`${STACK_NAME:-unknown}\`"
            echo "- profile: \`${PROFILE:-unknown}\`"
            echo "- monthly_budget_usd: \`${BUDGET:-unknown}\`"
            echo "- instance_type: \`${INSTANCE_TYPE:-unknown}\`"
            echo "- instance: \`${INSTANCE_ID:-none}\`"
            echo "- api: ${API_URL:-none}"
            echo "- ssm command id: \`${CMD_ID:-none}\`"
            if [ "$INPUT_OPERATION" = "decommission" ]; then
              echo
              echo "### Decommission audit"
              echo "- pre-decommission EBS snapshot: \`${DECOMM_SNAPSHOT:-skipped}\`"
              echo "- source volume: \`${DECOMM_VOLUME:-unknown}\`"
              echo "- preserved EIP allocation: \`${DECOMM_EIP:-unknown}\`"
              echo "- EIP released: \`${DECOMM_RELEASED:-false}\`"
              echo
              echo "**Rollback within 30 days:** the EBS snapshot is tagged with RetentionDays=30."
              echo "Restore by re-provisioning the stack (operation=provision) and replacing the new root EBS with a"
              echo "fresh volume created from this snapshot. If the EIP was preserved, the original public IP returns."
            fi
            echo
            echo "Rollback: dispatch operation=rollback with the previous tag. IP rotation: dispatch operation=rotate_egress_ip with rotation_reason set. Decommission permanently deletes the stack — gated by deployable=false in matrix + i_understand_destroys_data=true."
          } >> "$GITHUB_STEP_SUMMARY"
