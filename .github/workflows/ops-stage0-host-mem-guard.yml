name: Stage0 Host Mem-Guard Refresh

# One-shot ops workflow that pushes the host memory-pressure defenses into a
# running Stage0 prod EC2 via SSM, WITHOUT rebuilding the instance:
#   (1) /swapfile release valve + vm.swappiness/vfs_cache_pressure sysctl
#   (2) root/data disk metrics plus memory/disk Feishu alerts in
#       tokenkey-disk-metrics.sh
# Both already live in deploy/aws/stage0/stage0-ec2-bootstrap.sh (#811); this
# brings an instance provisioned before #811 in sync without a CFN/user-data
# rebuild (which would replace the instance). The payloads are extracted from
# that bootstrap at run time — single source of truth, no second copy to drift.
# A future stack rebuild remains the source of truth.
#
# Prod-only: swap + the tokenkey-disk-metrics timer are EC2/prod constructs;
# edges are Lightsail relays with a separate bootstrap and no such timer.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target: prod (edges are Lightsail-only and not covered by this EC2 SSM refresh)"
        required: true
        type: choice
        options:
          - prod

permissions:
  contents: read
  id-token: write

concurrency:
  group: ops-stage0-host-mem-guard-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  prod:
    if: inputs.target == 'prod'
    runs-on: ubuntu-latest
    environment: prod
    env:
      OIDC_ROLE_ARN: ${{ vars.AWS_OIDC_ROLE_ARN }}
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      STACK_NAME: ${{ vars.PROD_STACK_NAME || 'tokenkey-prod-stage0' }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Validate OIDC role
        run: |
          set -euo pipefail
          if [ -z "${OIDC_ROLE_ARN:-}" ]; then
            echo "::error::AWS_OIDC_ROLE_ARN repo variable not set"
            exit 1
          fi
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Resolve prod instance id
        id: instance
        env:
          STACK_NAME: ${{ env.STACK_NAME }}
        run: |
          set -euo pipefail
          ID=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`InstanceId`].OutputValue' --output text)
          if [ -z "$ID" ] || [ "$ID" = "None" ]; then
            echo "::error::could not resolve InstanceId from stack $STACK_NAME"
            exit 1
          fi
          echo "id=$ID" >> "$GITHUB_OUTPUT"
      - name: Sync host mem-guard via SSM
        id: ssm
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.id }}
          STAGE0_SSM_OUTPUT_DIR: .
        run: bash ops/stage0/sync-host-mem-guard-via-ssm.sh "$INSTANCE_ID" "ops-host-mem-guard target=prod"
      - name: Job summary
        if: always()
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.id }}
          STACK_NAME: ${{ env.STACK_NAME }}
          CMD_ID: ${{ steps.ssm.outputs.command_id }}
        run: |
          {
            echo "## ops host mem-guard refresh"
            echo "- environment: \`prod\`"
            echo "- stack: \`$STACK_NAME\`"
            echo "- instance: \`$INSTANCE_ID\`"
            echo "- ssm command id: \`${CMD_ID:-none}\`"
            echo "- pushed: /swapfile release valve + sysctl + root/data disk metrics + pressure alerts"
            echo "- template-sync-from: \`${GITHUB_SHA}\` (deploy/aws/stage0/stage0-ec2-bootstrap.sh)"
          } >> "$GITHUB_STEP_SUMMARY"
