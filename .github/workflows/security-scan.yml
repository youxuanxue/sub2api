name: Security Scan

# Weekly-only deep security scan. Push/PR security gates live in backend-ci.yml
# (backend-security / frontend-security) — duplicate job names here would collide
# with branch-protection required checks.
on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-scan-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      # TK: backend imports github.com/QuantumNous/new-api via the ../../new-api
      # replace directive (CLAUDE.md §4). govulncheck loads all packages, so the
      # sibling clone must be present or package loading fails. Same composite
      # action used by every Go job in backend-ci.yml.
      - uses: ./.github/actions/cache-and-checkout-new-api
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: |
          expected=$(awk '/^go /{print $2; exit}' backend/go.mod)
          go version | grep -Fq "go${expected}"
      - name: Run govulncheck
        working-directory: backend
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  security-scan-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Run pnpm audit
        working-directory: frontend
        run: |
          pnpm audit --prod --audit-level=high --json > audit.json || true
      - name: Check audit exceptions
        run: |
          python tools/check_pnpm_audit_exceptions.py \
            --audit frontend/audit.json \
            --exceptions .github/audit-exceptions.yml
