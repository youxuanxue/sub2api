name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, reopened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    # Upstream merge PRs (`merge/upstream-*`) aggregate hundreds of third-party
    # commits from Wei-Shaw/sub2api; CLA Assistant cannot mechanically verify
    # every upstream author. Those PRs are gated by `upstream-merge-pr-shape.yml`
    # instead; skip CLA here to avoid a permanently red check.
    if: |
      github.event_name == 'issue_comment' ||
      (github.event_name == 'pull_request_target' &&
       github.event.action != 'closed' &&
       !startsWith(github.head_ref, 'merge/upstream-'))
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: |
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "cla.json"
          path-to-document: "https://github.com/Wei-Shaw/sub2api/blob/main/CLA.md"
          branch: "cla-signatures"
          # MAINTAINER ENTRIES (`yyy` + `youxuanxue`) — keep both during the
          # transition. The action's extractUserFromCommit returns
          # `commit.author.user.login || commit.author.name`, so a maintainer
          # commit shows up under different identifiers depending on whether
          # GitHub can resolve the author email:
          #
          #   - `yyy`: placeholder NAME used by the maintainer's local git
          #     config (commits as `yyy <yyy@no-replay.com>`). The email is
          #     not linked to any GitHub account, so the action falls back to
          #     commit.author.name = "yyy". Required for every hand-written
          #     local commit.
          #
          #   - `youxuanxue`: GitHub LOGIN of the maintainer's account. Used
          #     for commits whose author email DOES resolve to GitHub —
          #     specifically the merge commits GitHub itself creates when the
          #     maintainer clicks "Update branch" in the PR UI (author email
          #     = `forsurexue@gmail.com`, which resolves to this login). Also
          #     covers any future commit made through GitHub web UI (file
          #     editor / suggestion accept). Without this entry every PR that
          #     ever pulls main back into its feature branch fails CLA on the
          #     "Update branch" merge commit, even though every other commit
          #     is allowlisted.
          #
          # Long-term cleanup: once the maintainer switches the local git
          # `user.email` to `forsurexue@gmail.com` (so even hand-written
          # commits resolve to login=youxuanxue) and the last `yyy`-authored
          # commit has merged, drop `yyy` from the allowlist.
          #
          # `cursoragent` is the GitHub LOGIN of the Cursor Background Agent
          # service account (https://github.com/cursoragent). The action's
          # extractUserFromCommit prefers commit.author.user.login when the
          # GitHub backend can resolve the commit author email to a real
          # account. cursoragent <cursoragent@cursor.com> resolves to the
          # github.com/cursoragent user, so the allowlist must match that
          # login (case-sensitive), NOT the git author display name
          # ("Cursor Agent" with a space) which is only the fallback when no
          # GitHub user is linked. Like `bot*` patterns, this is a non-human
          # contributor whose commits ultimately get squashed under the
          # maintainer's authorship at PR merge time, but during the open-PR
          # phase the CLA bot must accept it as already-signed to avoid
          # blocking every cloud-agent PR.
          #
          # `claude` is the GitHub LOGIN that Anthropic's Claude Code on the
          # Web / Claude Agent SDK resolves to when it commits as
          # "Claude <noreply@anthropic.com>". Contrary to the `yyy` case
          # above, GitHub *does* successfully resolve the
          # `noreply@anthropic.com` author email to a real account
          # (github.com/claude, user id 81847), so extractUserFromCommit
          # returns commit.author.user.login = "claude" — NOT the git author
          # display name "Claude". Same case-sensitivity pitfall as
          # `cursoragent`: the allowlist must match the LOWERCASE login, not
          # the capitalized display name; a previous attempt to allowlist
          # "Claude" had no effect because the matcher never reached the
          # name fallback. Like `cursoragent`, this is a non-human
          # contributor whose commits are squashed under the maintainer's
          # authorship at merge time; the CLA bot must accept it as
          # already-signed to avoid blocking every Claude-authored PR.
          allowlist: "dependabot[bot],renovate[bot],bot*,yyy,youxuanxue,cursoragent,claude"
          lock-pullrequest-aftermerge: false
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, we need $you to sign our [Contributor License Agreement (CLA)](https://github.com/Wei-Shaw/sub2api/blob/main/CLA.md).

            **To sign**, please reply with the following comment:

            > I have read the CLA Document and I hereby sign the CLA

            You only need to sign once — it will be valid for all your future contributions to this project.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-prcomment: "All contributors have signed the CLA. ✅"

  cla-lock:
    if: github.event_name == 'pull_request_target' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: "Lock merged PR"
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "cla.json"
          path-to-document: "https://github.com/Wei-Shaw/sub2api/blob/main/CLA.md"
          branch: "cla-signatures"
          allowlist: "dependabot[bot],renovate[bot],bot*,yyy,youxuanxue,cursoragent,claude"
          lock-pullrequest-aftermerge: true
