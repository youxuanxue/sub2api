name: Upstream Drift Monitor

# Mechanical enforcement of CLAUDE.md §5.y "Forward-looking history & merge discipline".
#
# Runs every Monday 09:00 UTC (≈ 17:00 Beijing) and on manual dispatch.
# Compares origin/main against upstream/main; opens or updates a single
# tracking issue labelled `upstream-drift` whenever upstream is ahead.
# Auto-closes the issue once the next merge PR lands and brings the fork
# back in sync.

on:
  schedule:
    # Mondays 09:00 UTC. Cron is UTC.
    - cron: '0 9 * * MON'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute drift via shared script
        id: drift
        run: |
          # Reuse the same script developers run locally — single source of truth.
          set +e
          OUTPUT=$(bash scripts/check-upstream-drift.sh --json)
          RC=$?
          set -e
          echo "Script output: $OUTPUT"
          echo "Script exit:   $RC"

          BEHIND=$(echo "$OUTPUT" | jq -r '.behind')
          AHEAD=$(echo "$OUTPUT" | jq -r '.ahead')
          UPSTREAM_HEAD=$(echo "$OUTPUT" | jq -r '.upstream_head')
          ORIGIN_HEAD=$(echo "$OUTPUT" | jq -r '.origin_head')

          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "ahead=$AHEAD" >> "$GITHUB_OUTPUT"
          echo "upstream_head=$UPSTREAM_HEAD" >> "$GITHUB_OUTPUT"
          echo "origin_head=$ORIGIN_HEAD" >> "$GITHUB_OUTPUT"

          if [ "$BEHIND" -gt 0 ]; then
            COMMITS=$(git log --oneline origin/main..upstream/main | head -30)
            {
              echo 'commits<<EOF'
              echo "$COMMITS"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"

            FILES=$(git diff --name-only origin/main..upstream/main | head -30)
            {
              echo 'files<<EOF'
              echo "$FILES"
              echo 'EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update upstream-drift tracking issue
        if: steps.drift.outputs.behind != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const behind = parseInt('${{ steps.drift.outputs.behind }}', 10);
            const ahead  = parseInt('${{ steps.drift.outputs.ahead }}', 10);
            const upstreamHead = '${{ steps.drift.outputs.upstream_head }}';
            const originHead   = '${{ steps.drift.outputs.origin_head }}';
            const commits = `${{ steps.drift.outputs.commits }}`;
            const files   = `${{ steps.drift.outputs.files }}`;
            const todayUTC = new Date().toISOString().slice(0, 10);
            const branch = `merge/upstream-${todayUTC}`;

            const title = `Upstream drift: ${behind} commits behind upstream/main`;
            const body = [
              `> Auto-generated by \`.github/workflows/upstream-drift-monitor.yml\`. ` +
                `Closes when next merge PR lands.`,
              ``,
              `## Status`,
              ``,
              `| | SHA | Count |`,
              `|---|---|---|`,
              `| upstream/main | \`${upstreamHead}\` | TK behind by **${behind}** |`,
              `| origin/main   | \`${originHead}\`   | TK ahead by ${ahead} |`,
              ``,
              `## New upstream commits`,
              ``,
              '```',
              commits || '(none)',
              '```',
              ``,
              `## Files touched upstream`,
              ``,
              '```',
              files || '(none)',
              '```',
              ``,
              `## Required next steps (per CLAUDE.md §5.y)`,
              ``,
              '```bash',
              `bash scripts/prepare-upstream-merge.sh    # fetch + dry-run + branch prep`,
              `git merge --no-ff upstream/main           # run on the prepared branch`,
              `make test                                 # backend + frontend gates`,
              `git push -u origin HEAD`,
              `gh pr create --base main --title 'chore: merge upstream/main (${behind} commits) into TK fork'`,
              '```',
              ``,
              `**PR body MUST include the §5.y audit cadence**:`,
              ``,
              '```bash',
              `git log --oneline upstream/main..HEAD | wc -l                     # TK ahead count`,
              `git diff --stat upstream/main..HEAD -- backend/ | head -5         # top changed files`,
              '```',
              ``,
              `**Reviewer MUST pick GitHub "Create a merge commit"** (not "Squash and merge"). ` +
                `The PR shape check workflow (\`upstream-merge-pr-shape.yml\`) will fail the PR ` +
                `if it lacks a \`--no-ff\` merge commit pulling in \`upstream/main\`.`,
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'upstream-drift',
              state: 'open',
            });

            if (issues.length > 0) {
              const existing = issues[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                title,
                body,
              });
              console.log(`Updated existing issue #${existing.number}: ${title}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['upstream-drift'],
              });
              console.log(`Opened new issue #${created.number}: ${title}`);
            }

      - name: Auto-close stale tracking issues if synced
        if: steps.drift.outputs.behind == '0'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'upstream-drift',
              state: 'open',
            });
            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `TK fork is now in sync with \`upstream/main\` ` +
                      `(${{ steps.drift.outputs.upstream_head }}). Closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
              console.log(`Closed synced issue #${issue.number}`);
            }
