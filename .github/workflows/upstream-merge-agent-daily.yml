name: Daily Upstream Merge Agent

# Dedicated upstream merge automation.
# - upstream-drift-monitor.yml only opens/updates a tracking issue.
# - agent-draft-pr is for small report-driven draft remediations and is not used
#   here because upstream merge PRs need a real --no-ff merge commit, broader
#   validation, and possible conflict resolution.

on:
  schedule:
    # 04:00 Asia/Shanghai. GitHub cron is UTC.
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      resume_run_id:
        description: "Optional prior run ID to resume from its checkpoint artifact"
        required: false
        type: string
      auto_retry_count:
        description: "Internal auto-retry counter for recoverable-failure resume loop"
        required: false
        default: "0"
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: daily-upstream-merge-agent
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Check required secrets
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          UPSTREAM_MERGE_GH_TOKEN: ${{ secrets.UPSTREAM_MERGE_GH_TOKEN }}
        run: |
          missing=0
          if [ -z "${ANTHROPIC_AUTH_TOKEN:-}" ]; then
            echo "::error::Missing required secret ANTHROPIC_AUTH_TOKEN for Claude Code CLI."
            missing=1
          fi
          if [ -z "${UPSTREAM_MERGE_GH_TOKEN:-}" ]; then
            echo "::error::Missing required secret UPSTREAM_MERGE_GH_TOKEN. Use a PAT or GitHub App token so pushed PR branches trigger normal PR checks."
            missing=1
          fi
          exit "$missing"

      - name: Configure authenticated origin
        env:
          UPSTREAM_MERGE_GH_TOKEN: ${{ secrets.UPSTREAM_MERGE_GH_TOKEN }}
        run: git remote set-url origin "https://x-access-token:${UPSTREAM_MERGE_GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - uses: ./.github/actions/cache-and-checkout-new-api

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Install Claude Code CLI
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
        run: bash scripts/setup-claude-code.sh

      - name: Configure git identity
        run: |
          git config user.name "tk-upstream-agent[bot]"
          git config user.email "upstream-agent@tokenkey.dev"

      - name: Initialize state checkpoint
        id: state_init
        env:
          RESUME_RUN_ID: ${{ github.event.inputs.resume_run_id }}
        run: |
          set -euo pipefail
          if [ -n "${RESUME_RUN_ID:-}" ]; then
            echo "resume_run_id=$RESUME_RUN_ID" >> "$GITHUB_OUTPUT"
          else
            echo "resume_run_id=" >> "$GITHUB_OUTPUT"
          fi

          cat > /tmp/upstream-merge-state.json <<EOF
          {
            "schema_version": 1,
            "workflow": "upstream-merge-agent-daily",
            "run_id": "${GITHUB_RUN_ID}",
            "run_attempt": "${GITHUB_RUN_ATTEMPT}",
            "resume_run_id": "${RESUME_RUN_ID:-}",
            "state": "INIT",
            "state_code": 0,
            "status": "in_progress",
            "reason_code": "",
            "target_branch": "",
            "existing_pr": {
              "exists": false,
              "number": "",
              "url": ""
            },
            "agent": {
              "attempt1_exit_code": "",
              "attempt2_exit_code": ""
            },
            "contract": {
              "after_attempt1_ok": "",
              "after_attempt1_reason": "",
              "final_ok": "",
              "final_reason": ""
            },
            "updated_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

      - name: Pin state helper into immutable path
        run: |
          set -euo pipefail
          STATE_HELPER_DIR="/tmp/upstream-merge-scripts"
          rm -rf "$STATE_HELPER_DIR"
          mkdir -p "$STATE_HELPER_DIR"
          cp scripts/upstream-merge-state.sh "$STATE_HELPER_DIR/upstream-merge-state.sh"
          cp -R scripts/lib "$STATE_HELPER_DIR/lib"
          chmod +x "$STATE_HELPER_DIR/upstream-merge-state.sh"
          echo "STATE_HELPER=$STATE_HELPER_DIR/upstream-merge-state.sh" >> "$GITHUB_ENV"

      - name: Restore checkpoint from prior run (optional)
        if: ${{ github.event.inputs.resume_run_id != '' }}
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_MERGE_GH_TOKEN }}
          RESUME_RUN_ID: ${{ github.event.inputs.resume_run_id }}
        run: |
          set -euo pipefail
          if bash "$STATE_HELPER" restore-state "$RESUME_RUN_ID"; then
            echo "Restored checkpoint from run $RESUME_RUN_ID"
            # Freeze a copy of the prior run's checkpoint so the auto-retry
            # progress gate can compare the previous run's preflight error
            # count against this run's. Without this snapshot, the live state
            # file gets clobbered as this run progresses.
            cp /tmp/upstream-merge-state.json /tmp/upstream-merge-prior-state.json
          else
            echo "::warning::No checkpoint artifact found for run $RESUME_RUN_ID; continuing from fresh INIT state"
          fi

      - name: Drift check snapshot
        id: drift_check
        run: |
          set -euo pipefail
          drift_json="$(bash "$STATE_HELPER" drift-check-json)"
          echo "$drift_json" > /tmp/upstream-merge-drift.json
          bash "$STATE_HELPER" apply-drift-checkpoint "$drift_json"
          echo "status=$(jq -r '.status' /tmp/upstream-merge-drift.json)" >> "$GITHUB_OUTPUT"
          echo "behind=$(jq -r '.behind // 0' /tmp/upstream-merge-drift.json)" >> "$GITHUB_OUTPUT"
          echo "ahead=$(jq -r '.ahead // 0' /tmp/upstream-merge-drift.json)" >> "$GITHUB_OUTPUT"

      - name: Find existing upstream merge PR
        id: upstream_pr
        if: steps.drift_check.outputs.status == 'need_merge'
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_MERGE_GH_TOKEN }}
        run: |
          EXISTING="$(gh pr list \
            --state open \
            --base main \
            --json number,headRefName,url \
            --jq '[.[] | select(.headRefName | startswith("merge/upstream-"))][0] // empty')"
          if [ -n "$EXISTING" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "number=$(jq -r '.number' <<<"$EXISTING")" >> "$GITHUB_OUTPUT"
            echo "branch=$(jq -r '.headRefName' <<<"$EXISTING")" >> "$GITHUB_OUTPUT"
            echo "url=$(jq -r '.url' <<<"$EXISTING")" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "branch=merge/upstream-$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Mark no-drift as completed
        if: steps.drift_check.outputs.status == 'no_drift'
        run: |
          set -euo pipefail
          echo "No upstream drift; skipping merge-agent execution."

      - name: Build upstream merge prompt
        if: steps.drift_check.outputs.status == 'need_merge'
        env:
          EXISTING_PR: ${{ steps.upstream_pr.outputs.exists }}
          PR_NUMBER: ${{ steps.upstream_pr.outputs.number }}
          PR_URL: ${{ steps.upstream_pr.outputs.url }}
          BRANCH: ${{ steps.upstream_pr.outputs.branch }}
        run: |
          cat > /tmp/upstream-merge-agent-prompt.txt <<EOF
          You are running the TokenKey upstream merge skill in headless CI. Follow this skill SOP exactly:

          EOF
          cat .cursor/skills/tokenkey-upstream-merge/SKILL.md >> /tmp/upstream-merge-agent-prompt.txt
          cat >> /tmp/upstream-merge-agent-prompt.txt <<EOF

          ## Daily automation task

          Run the TokenKey upstream merge workflow unattended for the daily 04:00 Asia/Shanghai automation.

          Required behavior:
          - Target branch: $BRANCH.
          - If an open upstream merge PR already exists, update that PR branch instead of creating a new PR. Existing PR: ${PR_URL:-none} (#${PR_NUMBER:-none}).
          - If no open upstream merge PR exists, create branch $BRANCH from current origin/main and open a PR to main.
          - Fetch origin and upstream first.
          - If origin/main already contains upstream/main and there is no open upstream merge PR to update, make no code changes and do not open a PR.
          - The PR must contain a git merge --no-ff upstream/main merge commit when upstream is behind/ahead as required by the project PR-shape workflow.
          - Preserve upstream features by default; do not silent-delete upstream-owned files/routes/methods.
          - Keep TokenKey-only fixes behind companion/facade/component boundaries where possible.
          - Run appropriate focused checks and ./scripts/preflight.sh when changes are produced.
          - Write the final PR body to /tmp/upstream-merge-pr-body.md, including the literal upstream/main..HEAD audit cadence and validation run.
          - Push the branch and create or update the GitHub PR using gh.
          - If conflicts cannot be resolved safely, push the conflicted/update branch only if it is in a clean, committed state; otherwise leave no partial commit and open/update a PR comment explaining the blocker.
          - This is headless CI. Do not ask for user confirmation, approval, or preference; choose the safe default and continue autonomously.
          - Default policy for merge choices: preserve TokenKey-facing defaults (for example site_name=TokenKey and existing TK backend-mode defaults) unless doing so would break hard constraints or contract gates.
          - Return only when output contract is satisfied or a concrete blocker has been recorded via PR/issue evidence.

          GitHub auth is available through GH_TOKEN. Do not merge the PR.
          EOF

      - name: Update checkpoint after branch discovery
        if: steps.drift_check.outputs.status == 'need_merge'
        env:
          EXISTS: ${{ steps.upstream_pr.outputs.exists }}
          PR_NUMBER: ${{ steps.upstream_pr.outputs.number }}
          PR_URL: ${{ steps.upstream_pr.outputs.url }}
          BRANCH: ${{ steps.upstream_pr.outputs.branch }}
        run: |
          set -euo pipefail
          bash "$STATE_HELPER" prepare-branch-checkpoint "$EXISTS" "${PR_NUMBER:-}" "${PR_URL:-}" "$BRANCH"

      - name: Run Claude upstream merge agent (attempt 1)
        if: steps.drift_check.outputs.status == 'need_merge'
        id: agent_attempt_1
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: https://api.tokenkey.dev
          GH_TOKEN: ${{ secrets.UPSTREAM_MERGE_GH_TOKEN }}
          CLAUDE_CODE_DISABLE_ADAPTIVE_THINKING: "1"
          MAX_THINKING_TOKENS: "31999"
          CLAUDE_CODE_AUTOCOMPACT_PCT_OVERRIDE: "60"
          CLAUDE_CODE_ATTRIBUTION_HEADER: "0"
          ANTHROPIC_MODEL: "claude-sonnet-4-6"
        run: |
          # claude CLI has no --output flag — pipe stdout instead. tee keeps
          # CI logs live (helpful for long agent runs); pipefail propagates
          # claude's exit code through the pipeline so the step actually
          # fails when the agent fails.
          # --allowedTools is required in headless: without it `claude -p`
          # defaults to interactive `default` permission mode and rejects
          # every tool call with "This command requires approval", so the
          # agent runs the SOP read-only and never produces a PR
          # (run 25415454229 / job 74548660906, 2026-05-06). Whitelist the
          # work toolkit explicitly per global CLAUDE.md §5 ("严格遵守
          # --allowedTools 限制"); WebFetch/WebSearch/Skill stay denied.
          # scripts/redact-agent-stream.py scrubs secrets from the stream
          # before tee writes the artifact: Actions log masking does NOT
          # apply to bytes that hit disk via tee, so without this filter
          # the public artifact can leak ANTHROPIC_AUTH_TOKEN / GH_TOKEN
          # if the agent ever echoes them (e.g. an accidental `printenv`).
          # Model+budget retuning (run 25417602884, 2026-05-06): the agent
          # under opus[1m] burned its $8 cap in 16 min and hit
          # `Exceeded USD budget` mid-SOP without producing a PR. The
          # cache-creation fee for a single fresh `claude -p` is ~$0.75
          # at opus[1m] (40k-token system prompt × ~$18.75/M write rate),
          # so $8 left only ~$7 for actual work. Sonnet 4.6 is roughly
          # 5× cheaper, and $20 gives the SOP enough headroom to fetch
          # upstream, run preflight, resolve conflicts, push, and open a
          # PR even on a busy upstream day.
          # --output-format stream-json + --verbose makes the agent
          # transcript (every tool_use, tool_result, thinking block, and
          # the final result with total_cost_usd / errors / permission
          # denials) land in the artifact as JSONL. Without it, `claude
          # -p` only writes the final reply text — on `Exceeded USD
          # budget` failures the artifact contains a single line and
          # debugging is impossible. The redactor still scrubs token
          # patterns inside JSON strings line-by-line.
          # --exclude-dynamic-system-prompt-sections hoists per-machine
          # bits (cwd, env info, memory paths, git status) out of the
          # system prompt into the first user message, keeping the
          # system prompt prefix stable across runs. Within the 1h
          # ephemeral cache TTL this lets re-dispatches and chained
          # workflow_run agents hit the prompt cache instead of paying
          # the ~$0.15 / 40k-token cache-creation fee. Daily cron runs
          # are 24h apart so cache is already cold for them, but the
          # flag is harmless on miss.
          set -o pipefail
          set +e
          claude -p "$(cat /tmp/upstream-merge-agent-prompt.txt)" \
            --model "claude-sonnet-4-6" \
            --max-budget-usd "20.00" \
            --output-format stream-json --verbose \
            --exclude-dynamic-system-prompt-sections \
            --allowedTools "Bash Read Write Edit Grep Glob" \
            2>&1 \
            | python3 scripts/redact-agent-stream.py \
            | tee /tmp/upstream-merge-agent-output-attempt1.txt
          exit_code=${PIPESTATUS[0]}
          set -e
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          cp /tmp/upstream-merge-agent-output-attempt1.txt /tmp/upstream-merge-agent-output.txt

      - name: Update checkpoint after attempt 1
        if: always() && steps.drift_check.outputs.status == 'need_merge'
        env:
          EXIT_CODE: ${{ steps.agent_attempt_1.outputs.exit_code }}
        run: |
          set -euo pipefail
          bash "$STATE_HELPER" update-agent-attempt 1 "${EXIT_CODE:-}"

      - name: Validate merge output contract (after attempt 1)
        id: contract_after_attempt_1
        if: steps.drift_check.outputs.status == 'need_merge'
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_MERGE_GH_TOKEN }}
          TARGET_BRANCH: ${{ steps.upstream_pr.outputs.branch }}
          HAD_EXISTING_PR: ${{ steps.upstream_pr.outputs.exists }}
        run: |
          set -euo pipefail
          eval_json=""
          set +e
          eval_json="$(bash "$STATE_HELPER" contract-eval-json "$TARGET_BRANCH" "$HAD_EXISTING_PR")"
          eval_rc=$?
          set -e

          if [ "$eval_rc" -ne 0 ] || [ -z "$eval_json" ]; then
            jq -n '{contract_ok:"false", reason:"contract eval failed after attempt1", reason_code:"CONTRACT_EVAL_ERROR", matching_pr_count:0, any_open_upstream_pr_count:0}' > /tmp/upstream-merge-contract-attempt1.json
          else
            echo "$eval_json" > /tmp/upstream-merge-contract-attempt1.json
          fi

          echo "contract_ok=$(jq -r '.contract_ok // "false"' /tmp/upstream-merge-contract-attempt1.json)" >> "$GITHUB_OUTPUT"
          echo "reason=$(jq -r '.reason // "contract eval failed after attempt1"' /tmp/upstream-merge-contract-attempt1.json)" >> "$GITHUB_OUTPUT"
          {
            echo "contract_ok=$(jq -r '.contract_ok // "false"' /tmp/upstream-merge-contract-attempt1.json)"
            echo "reason=$(jq -r '.reason // "contract eval failed after attempt1"' /tmp/upstream-merge-contract-attempt1.json)"
            echo "any_open_upstream_pr_count=$(jq -r '.any_open_upstream_pr_count // 0' /tmp/upstream-merge-contract-attempt1.json)"
            echo "matching_pr_count=$(jq -r '.matching_pr_count // 0' /tmp/upstream-merge-contract-attempt1.json)"
            echo "attempt1_exit_code=${{ steps.agent_attempt_1.outputs.exit_code }}"
          } > /tmp/upstream-merge-contract-attempt1.txt

      - name: Update checkpoint after contract attempt 1
        if: always() && steps.drift_check.outputs.status == 'need_merge'
        run: |
          set -euo pipefail
          if [ ! -s /tmp/upstream-merge-contract-attempt1.json ]; then
            jq -n '{contract_ok:"false", reason:"missing attempt1 contract artifact", reason_code:"MISSING_CONTRACT_ARTIFACT", matching_pr_count:0, any_open_upstream_pr_count:0}' > /tmp/upstream-merge-contract-attempt1.json
          fi
          bash "$STATE_HELPER" update-contract-checkpoint after_attempt1 "$(cat /tmp/upstream-merge-contract-attempt1.json)"

      - name: Build retry prompt for unresolved merge
        if: always() && steps.drift_check.outputs.status == 'need_merge' && (steps.contract_after_attempt_1.outcome != 'success' || steps.contract_after_attempt_1.outputs.contract_ok != 'true')
        env:
          TARGET_BRANCH: ${{ steps.upstream_pr.outputs.branch }}
          CONTRACT_REASON: ${{ steps.contract_after_attempt_1.outputs.reason }}
        run: |
          cat > /tmp/upstream-merge-agent-retry-prompt.txt <<EOF
          Attempt 1 did not satisfy the upstream merge output contract.

          Contract failure reason: $CONTRACT_REASON
          Target branch: $TARGET_BRANCH

          Continue from the current repository state and finish the job.

          Required behavior:
          - Continue resolving merge conflicts safely until the branch is in a clean committed state.
          - Prefer preserving upstream functionality by default; use TokenKey companion/facade boundaries for overrides.
          - Ensure there is an open PR to main from the target branch (create if missing, update if present).
          - If no code changes are needed because origin/main already contains upstream/main, verify and report that explicitly.
          - Run focused checks and ./scripts/preflight.sh when changes are produced.
          - Update /tmp/upstream-merge-pr-body.md with validation and audit cadence including literal upstream/main..HEAD.
          - Do not leave partial conflicted index/worktree at finish.
          - This is headless CI. Do not ask for user confirmation, approval, or preference; choose the safe default and continue autonomously.
          - Default policy for merge choices: preserve TokenKey-facing defaults (for example site_name=TokenKey and existing TK backend-mode defaults) unless doing so would break hard constraints or contract gates.

          Return only after one of these outcomes is true:
          1) open upstream merge PR exists for target branch; or
          2) origin/main already contains upstream/main and no upstream merge PR is needed.
          EOF

      - name: Run Claude upstream merge agent (attempt 2)
        if: always() && steps.drift_check.outputs.status == 'need_merge' && (steps.contract_after_attempt_1.outcome != 'success' || steps.contract_after_attempt_1.outputs.contract_ok != 'true')
        id: agent_attempt_2
        env:
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_BASE_URL: https://api.tokenkey.dev
          GH_TOKEN: ${{ secrets.UPSTREAM_MERGE_GH_TOKEN }}
          CLAUDE_CODE_DISABLE_ADAPTIVE_THINKING: "1"
          MAX_THINKING_TOKENS: "31999"
          CLAUDE_CODE_AUTOCOMPACT_PCT_OVERRIDE: "60"
          CLAUDE_CODE_ATTRIBUTION_HEADER: "0"
          ANTHROPIC_MODEL: "claude-sonnet-4-6"
        run: |
          set -o pipefail
          set +e
          claude -p "$(cat /tmp/upstream-merge-agent-retry-prompt.txt)" \
            --model "claude-sonnet-4-6" \
            --max-budget-usd "20.00" \
            --output-format stream-json --verbose \
            --exclude-dynamic-system-prompt-sections \
            --allowedTools "Bash Read Write Edit Grep Glob" \
            2>&1 \
            | python3 scripts/redact-agent-stream.py \
            | tee /tmp/upstream-merge-agent-output-attempt2.txt
          exit_code=${PIPESTATUS[0]}
          set -e
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          cat /tmp/upstream-merge-agent-output-attempt2.txt >> /tmp/upstream-merge-agent-output.txt

      - name: Verify preflight on target branch (final)
        id: preflight_final
        # Skill §4 requires preflight green before the PR is considered done.
        # We run it here against the agent's pushed branch (not local HEAD) so
        # contract-eval reflects what review/CI will actually see.
        if: always() && steps.drift_check.outputs.status == 'need_merge'
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_MERGE_GH_TOKEN }}
          TARGET_BRANCH: ${{ steps.upstream_pr.outputs.branch }}
        run: |
          set -euo pipefail
          set +e
          # Fetch the agent-pushed branch. If this fails the agent never got
          # far enough to push, and the contract gate will surface that
          # separately as missing-PR; we just record skip here.
          if ! git fetch origin "$TARGET_BRANCH" 2>/tmp/upstream-merge-preflight-fetch.log; then
            echo "preflight_ok=skip" >> "$GITHUB_OUTPUT"
            echo "error_count=-1" >> "$GITHUB_OUTPUT"
            echo "skip_reason=remote_branch_missing" >> "$GITHUB_OUTPUT"
            bash "$STATE_HELPER" update-preflight-checkpoint skip -1 remote_branch_missing || true
            exit 0
          fi

          # Mirror what review/CI will execute against. Detached HEAD avoids
          # tripping dev-rules branch naming checks with an internal helper
          # branch name; `HEAD` is explicitly accepted by preflight.
          if ! git checkout --detach FETCH_HEAD 2>/tmp/upstream-merge-preflight-checkout.log; then
            # If we can't switch to the agent's branch, do NOT silently run
            # preflight against whatever HEAD happens to be — that would
            # report main's preflight result as the merge branch's.
            echo "preflight_ok=skip" >> "$GITHUB_OUTPUT"
            echo "error_count=-1" >> "$GITHUB_OUTPUT"
            echo "skip_reason=checkout_failed" >> "$GITHUB_OUTPUT"
            bash "$STATE_HELPER" update-preflight-checkpoint skip -1 checkout_failed || true
            echo "::warning::preflight skipped: git checkout of $TARGET_BRANCH failed"
            cat /tmp/upstream-merge-preflight-checkout.log >&2 || true
            exit 0
          fi
          # Submodule pointer may have moved across the merge; re-init so
          # dev-rules/templates/preflight.sh exists at the right SHA. If this
          # fails preflight will likely flag drift below — that surfaces in
          # the preflight tail block, no need to fail the step here.
          git submodule update --init --recursive 2>/dev/null || true

          bash scripts/preflight.sh > /tmp/upstream-merge-preflight.log 2>&1
          rc=$?
          set -e

          if [ "$rc" -eq 0 ]; then
            echo "preflight_ok=true" >> "$GITHUB_OUTPUT"
            echo "error_count=0" >> "$GITHUB_OUTPUT"
            bash "$STATE_HELPER" update-preflight-checkpoint true 0 ok || true
          else
            # Format from scripts/preflight.sh tail line:
            #   === preflight (with sub2api checks): FAIL (N check(s) failed) ===
            count="$(grep -oE '[0-9]+ check\(s\) failed' /tmp/upstream-merge-preflight.log | head -1 | grep -oE '^[0-9]+' || echo 1)"
            echo "preflight_ok=false" >> "$GITHUB_OUTPUT"
            echo "error_count=$count" >> "$GITHUB_OUTPUT"
            bash "$STATE_HELPER" update-preflight-checkpoint false "$count" "preflight failed with $count check(s)" || true
            # Surface a compact failure block in the workflow log so reviewers
            # don't have to download the artifact for the common case.
            echo "::group::preflight tail (last 80 lines)"
            tail -n 80 /tmp/upstream-merge-preflight.log || true
            echo "::endgroup::"
          fi

      - name: Audit PR body for upstream cadence (final)
        id: pr_body_audit_final
        # Skill §5 mandates the PR body contains literal `upstream/main..HEAD`.
        # The shape workflow enforces it at PR-merge time, but we also gate it
        # in the agent contract so the daily run flips to red on its own
        # instead of declaring success and letting branch protection catch it.
        if: always() && steps.drift_check.outputs.status == 'need_merge'
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_MERGE_GH_TOKEN }}
          TARGET_BRANCH: ${{ steps.upstream_pr.outputs.branch }}
          KNOWN_PR_NUMBER: ${{ steps.upstream_pr.outputs.number }}
        run: |
          set -euo pipefail
          pr_number="${KNOWN_PR_NUMBER:-}"
          if [ -z "$pr_number" ]; then
            pr_number="$(gh pr list --state open --base main --head "$TARGET_BRANCH" --json number --jq '.[0].number // empty' || true)"
          fi

          if [ -z "$pr_number" ]; then
            echo "pr_body_audit_ok=skip" >> "$GITHUB_OUTPUT"
            echo "skip_reason=no_pr" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          body="$(gh pr view "$pr_number" --json body --jq '.body' || echo '')"
          if printf '%s' "$body" | grep -qF 'upstream/main..HEAD'; then
            echo "pr_body_audit_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "pr_body_audit_ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning::PR #$pr_number body is missing literal 'upstream/main..HEAD' audit cadence (skill §5)"
          fi

      - name: Validate merge output contract (final)
        id: contract_final
        if: always()
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_MERGE_GH_TOKEN }}
          TARGET_BRANCH: ${{ steps.upstream_pr.outputs.branch }}
          HAD_EXISTING_PR: ${{ steps.upstream_pr.outputs.exists }}
          DRIFT_STATUS: ${{ steps.drift_check.outputs.status }}
          PREFLIGHT_OK: ${{ steps.preflight_final.outputs.preflight_ok || 'skip' }}
          PR_BODY_AUDIT_OK: ${{ steps.pr_body_audit_final.outputs.pr_body_audit_ok || 'skip' }}
        run: |
          set -euo pipefail
          if [ "$DRIFT_STATUS" = "no_drift" ]; then
            jq -n '{contract_ok:"true", reason:"no-drift path: origin/main already contains upstream/main and no upstream merge PR is open", reason_code:"NO_DRIFT", preflight_ok:"skip", pr_body_audit_ok:"skip", matching_pr_count:0, any_open_upstream_pr_count:0}' > /tmp/upstream-merge-contract-final.json
          else
            set +e
            bash "$STATE_HELPER" contract-eval-json "$TARGET_BRANCH" "$HAD_EXISTING_PR" "$PREFLIGHT_OK" "$PR_BODY_AUDIT_OK" > /tmp/upstream-merge-contract-final.json
            eval_rc=$?
            set -e
            if [ "$eval_rc" -ne 0 ] || [ ! -s /tmp/upstream-merge-contract-final.json ]; then
              jq -n '{contract_ok:"false", reason:"contract eval failed at final gate", reason_code:"CONTRACT_EVAL_ERROR", preflight_ok:"skip", pr_body_audit_ok:"skip", matching_pr_count:0, any_open_upstream_pr_count:0}' > /tmp/upstream-merge-contract-final.json
            fi
          fi

          echo "contract_ok=$(jq -r '.contract_ok // "false"' /tmp/upstream-merge-contract-final.json)" >> "$GITHUB_OUTPUT"
          echo "reason=$(jq -r '.reason // "contract eval failed at final gate"' /tmp/upstream-merge-contract-final.json)" >> "$GITHUB_OUTPUT"
          echo "eval_reason_code=$(jq -r '.reason_code // ""' /tmp/upstream-merge-contract-final.json)" >> "$GITHUB_OUTPUT"
          echo "preflight_ok=$(jq -r '.preflight_ok // "skip"' /tmp/upstream-merge-contract-final.json)" >> "$GITHUB_OUTPUT"
          echo "pr_body_audit_ok=$(jq -r '.pr_body_audit_ok // "skip"' /tmp/upstream-merge-contract-final.json)" >> "$GITHUB_OUTPUT"

          {
            echo "contract_ok=$(jq -r '.contract_ok // "false"' /tmp/upstream-merge-contract-final.json)"
            echo "reason=$(jq -r '.reason // "contract eval failed at final gate"' /tmp/upstream-merge-contract-final.json)"
            echo "reason_code=$(jq -r '.reason_code // ""' /tmp/upstream-merge-contract-final.json)"
            echo "preflight_ok=$(jq -r '.preflight_ok // "skip"' /tmp/upstream-merge-contract-final.json)"
            echo "pr_body_audit_ok=$(jq -r '.pr_body_audit_ok // "skip"' /tmp/upstream-merge-contract-final.json)"
            echo "any_open_upstream_pr_count=$(jq -r '.any_open_upstream_pr_count // 0' /tmp/upstream-merge-contract-final.json)"
            echo "matching_pr_count=$(jq -r '.matching_pr_count // 0' /tmp/upstream-merge-contract-final.json)"
            echo "attempt1_exit_code=${{ steps.agent_attempt_1.outputs.exit_code }}"
            echo "attempt2_exit_code=${{ steps.agent_attempt_2.outputs.exit_code || 'not-run' }}"
          } > /tmp/upstream-merge-contract-final.txt

      - name: Classify final reason code
        id: reason_code
        if: always()
        env:
          DRIFT_STATUS: ${{ steps.drift_check.outputs.status }}
          CONTRACT_OK: ${{ steps.contract_final.outputs.contract_ok }}
        run: |
          set -euo pipefail
          if [ ! -s /tmp/upstream-merge-contract-final.json ]; then
            jq -n '{contract_ok:"false", reason:"missing final contract artifact", reason_code:"MISSING_CONTRACT_ARTIFACT", matching_pr_count:0, any_open_upstream_pr_count:0}' > /tmp/upstream-merge-contract-final.json
          fi

          eval_reason_code="$(jq -r '.reason_code // ""' /tmp/upstream-merge-contract-final.json)"
          reason_code="$eval_reason_code"

          # Structured codes from contract_eval_pure are authoritative — they
          # correspond to actionable failures (preflight red, PR body missing
          # audit cadence). Only fall through to grep heuristics when the
          # contract eval itself signaled CONTRACT_FAIL or returned empty,
          # since those are the cases where the agent's stdout contains the
          # most specific clue (permission scope, merge conflicts, budget).
          structured_codes_re='^(PREFLIGHT_FAIL|PR_BODY_INCOMPLETE|NO_DRIFT)$'

          if [ "$DRIFT_STATUS" = "infra_error" ]; then
            reason_code="DRIFT_CHECK_INFRA"
          elif [ "$CONTRACT_OK" = "true" ]; then
            if [ -z "$reason_code" ]; then
              reason_code="SUCCESS"
            fi
          elif [[ "$eval_reason_code" =~ $structured_codes_re ]]; then
            reason_code="$eval_reason_code"
          else
            if grep -q "Resource not accessible by personal access token (createPullRequest)" /tmp/upstream-merge-agent-output.txt 2>/dev/null; then
              reason_code="AUTH_TOKEN_SCOPE"
            elif grep -q "CONFLICT (content)" /tmp/upstream-merge-agent-output.txt 2>/dev/null; then
              reason_code="MERGE_CONFLICT_UNRESOLVED"
            elif grep -q "File has not been read yet. Read it first before writing to it." /tmp/upstream-merge-agent-output.txt 2>/dev/null; then
              reason_code="TOOL_GUARD"
            elif grep -q "Exceeded USD budget" /tmp/upstream-merge-agent-output.txt 2>/dev/null; then
              reason_code="AGENT_BUDGET_EXCEEDED"
            elif grep -q "contract_unmet" /tmp/upstream-merge-contract-final.json 2>/dev/null; then
              reason_code="CONTRACT_FAIL"
            elif [ -z "$reason_code" ]; then
              reason_code="UNKNOWN_FAILURE"
            fi
          fi

          echo "reason_code=$reason_code" >> "$GITHUB_OUTPUT"
          bash "$STATE_HELPER" set-reason-code "$reason_code"

          {
            echo "reason_code=$reason_code"
          } >> /tmp/upstream-merge-contract-final.txt

      - name: Write job summary
        if: always()
        env:
          DRIFT_STATUS: ${{ steps.drift_check.outputs.status }}
          CONTRACT_OK: ${{ steps.contract_final.outputs.contract_ok }}
          CONTRACT_REASON: ${{ steps.contract_final.outputs.reason }}
          REASON_CODE: ${{ steps.reason_code.outputs.reason_code }}
          TARGET_BRANCH: ${{ steps.upstream_pr.outputs.branch }}
          ATTEMPT1_EXIT_CODE: ${{ steps.agent_attempt_1.outputs.exit_code || 'not-run' }}
          ATTEMPT2_EXIT_CODE: ${{ steps.agent_attempt_2.outputs.exit_code || 'not-run' }}
          PREFLIGHT_OK: ${{ steps.preflight_final.outputs.preflight_ok || 'skip' }}
          PREFLIGHT_ERROR_COUNT: ${{ steps.preflight_final.outputs.error_count || '-1' }}
          PR_BODY_AUDIT_OK: ${{ steps.pr_body_audit_final.outputs.pr_body_audit_ok || 'skip' }}
        run: |
          set -euo pipefail
          {
            echo "## Upstream Merge Agent Result"
            echo ""
            echo "- run_id: $GITHUB_RUN_ID"
            echo "- drift_status: ${DRIFT_STATUS:-unknown}"
            echo "- contract_ok: ${CONTRACT_OK:-unknown}"
            echo "- reason_code: ${REASON_CODE:-unknown}"
            echo "- reason: ${CONTRACT_REASON:-n/a}"
            echo "- target_branch: ${TARGET_BRANCH:-n/a}"
            echo "- attempt1_exit_code: ${ATTEMPT1_EXIT_CODE}"
            echo "- attempt2_exit_code: ${ATTEMPT2_EXIT_CODE}"
            echo "- preflight_ok: ${PREFLIGHT_OK}"
            echo "- preflight_error_count: ${PREFLIGHT_ERROR_COUNT}"
            echo "- pr_body_audit_ok: ${PR_BODY_AUDIT_OK}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Update checkpoint after final contract
        if: always()
        env:
          ATTEMPT2_EXIT_CODE: ${{ steps.agent_attempt_2.outputs.exit_code || 'not-run' }}
        run: |
          set -euo pipefail
          if [ ! -s /tmp/upstream-merge-contract-final.json ]; then
            jq -n '{contract_ok:"false", reason:"missing final contract artifact before checkpoint write", reason_code:"MISSING_CONTRACT_ARTIFACT", matching_pr_count:0, any_open_upstream_pr_count:0}' > /tmp/upstream-merge-contract-final.json
          fi
          bash "$STATE_HELPER" update-agent-attempt 2 "${ATTEMPT2_EXIT_CODE:-}"
          bash "$STATE_HELPER" update-contract-checkpoint final "$(cat /tmp/upstream-merge-contract-final.json)"

      - name: Auto-dispatch retry for recoverable failures
        id: auto_retry_conflict
        # Trigger set covers every reason_code where another agent run can
        # plausibly fix things on its own:
        #  - MERGE_CONFLICT_UNRESOLVED: agent left CONFLICT markers
        #  - PREFLIGHT_FAIL:            interface/type drift, missing stubs
        #  - PR_BODY_INCOMPLETE:        missing audit cadence in PR body
        #  - CONTRACT_FAIL:             generic miss; one more attempt allowed
        # AUTH_TOKEN_SCOPE / TOOL_GUARD / AGENT_BUDGET_EXCEEDED are intentionally
        # excluded — they need human-side fixes (token scope, prompt, budget).
        if: >-
          always()
          && github.ref_name == 'main'
          && steps.contract_final.outputs.contract_ok != 'true'
          && contains(fromJSON('["MERGE_CONFLICT_UNRESOLVED","PREFLIGHT_FAIL","PR_BODY_INCOMPLETE","CONTRACT_FAIL"]'), steps.reason_code.outputs.reason_code)
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_MERGE_GH_TOKEN }}
          AUTO_RETRY_COUNT: ${{ github.event.inputs.auto_retry_count || '0' }}
          REASON_CODE: ${{ steps.reason_code.outputs.reason_code }}
        run: |
          set -euo pipefail
          current="${AUTO_RETRY_COUNT:-0}"
          if ! [[ "$current" =~ ^[0-9]+$ ]]; then
            current=0
          fi

          max_retry=3
          if [ "$current" -ge "$max_retry" ]; then
            echo "auto_retry_triggered=false" >> "$GITHUB_OUTPUT"
            echo "auto_retry_next_count=$current" >> "$GITHUB_OUTPUT"
            echo "auto_retry_decline_reason=cap_reached" >> "$GITHUB_OUTPUT"
            echo "Auto-retry cap reached ($current/$max_retry); no further auto-dispatch."
            exit 0
          fi

          # Progress gate: for PREFLIGHT_FAIL chains, refuse to dispatch a new
          # run if the previous run had >= as many preflight errors. This keeps
          # the chain from burning $20/run × 3 in a stable failure state — if
          # the agent isn't making progress it never will.
          # The prior run's snapshot exists only when this run was itself a
          # resume of an earlier auto-dispatched run; on the first failure of
          # a fresh chain there is no prior snapshot and the gate is skipped.
          if [ "$REASON_CODE" = "PREFLIGHT_FAIL" ] && [ -f /tmp/upstream-merge-prior-state.json ]; then
            prior_count="$(jq -r '.preflight.error_count // -1' /tmp/upstream-merge-prior-state.json 2>/dev/null || echo -1)"
            current_count="$(jq -r '.preflight.error_count // -1' /tmp/upstream-merge-state.json 2>/dev/null || echo -1)"
            if [ "$prior_count" -gt 0 ] && [ "$current_count" -ge "$prior_count" ]; then
              echo "::warning::Auto-retry declined: preflight error count not decreasing ($prior_count → $current_count)"
              echo "auto_retry_triggered=false" >> "$GITHUB_OUTPUT"
              echo "auto_retry_next_count=$current" >> "$GITHUB_OUTPUT"
              echo "auto_retry_decline_reason=no_progress" >> "$GITHUB_OUTPUT"
              echo "auto_retry_prior_count=$prior_count" >> "$GITHUB_OUTPUT"
              echo "auto_retry_current_count=$current_count" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          next=$((current + 1))
          gh workflow run upstream-merge-agent-daily.yml --ref main \
            -f resume_run_id="$GITHUB_RUN_ID" \
            -f auto_retry_count="$next"

          echo "auto_retry_triggered=true" >> "$GITHUB_OUTPUT"
          echo "auto_retry_next_count=$next" >> "$GITHUB_OUTPUT"

      - name: Open or update upstream-merge-agent tracking issue
        if: always() && steps.contract_final.outputs.contract_ok != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const reasonCode = '${{ steps.reason_code.outputs.reason_code }}' || 'UNKNOWN_FAILURE';
            const reason = '${{ steps.contract_final.outputs.reason }}' || 'contract_unmet';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Upstream merge agent blocked: ${reasonCode}`;
            const body = [
              `> Auto-generated by \`.github/workflows/upstream-merge-agent-daily.yml\`.`,
              '',
              '## Result',
              '',
              `- reason_code: \`${reasonCode}\``,
              `- reason: ${reason}`,
              `- run: ${runUrl}`,
              `- run_id: ${context.runId}`,
              `- run_attempt: ${context.runAttempt}`,
              `- drift_status: ${{ steps.drift_check.outputs.status }}`,
              `- target_branch: ${{ steps.upstream_pr.outputs.branch || 'n/a' }}`,
              `- attempt1_exit_code: ${{ steps.agent_attempt_1.outputs.exit_code || 'not-run' }}`,
              `- attempt2_exit_code: ${{ steps.agent_attempt_2.outputs.exit_code || 'not-run' }}`,
              `- preflight_ok: ${{ steps.preflight_final.outputs.preflight_ok || 'skip' }}`,
              `- preflight_error_count: ${{ steps.preflight_final.outputs.error_count || '-1' }}`,
              `- pr_body_audit_ok: ${{ steps.pr_body_audit_final.outputs.pr_body_audit_ok || 'skip' }}`,
              '',
              '## Recovery',
              '',
              '- Fix blocker indicated by reason_code.',
              '- Re-run this workflow via workflow_dispatch (optionally with resume_run_id).',
              '- auto_retry_triggered: ${{ steps.auto_retry_conflict.outputs.auto_retry_triggered || 'false' }}',
              '- auto_retry_next_count: ${{ steps.auto_retry_conflict.outputs.auto_retry_next_count || 'n/a' }}',
              '- auto_retry_decline_reason: ${{ steps.auto_retry_conflict.outputs.auto_retry_decline_reason || 'n/a' }}',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'upstream-merge-agent',
              state: 'open',
            });

            if (issues.length > 0) {
              const issue = issues[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                title,
                body,
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Updated by run ${runUrl} (reason_code: \`${reasonCode}\`).`,
              });
              core.info(`Updated existing tracking issue #${issue.number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['upstream-merge-agent'],
              });
              core.info(`Opened new tracking issue #${created.number}`);
            }

      - name: Close upstream-merge-agent tracking issue on success
        if: always() && steps.contract_final.outputs.contract_ok == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'upstream-merge-agent',
              state: 'open',
            });
            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Upstream merge agent recovered successfully: ${runUrl}. Closing this tracker.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
              core.info(`Closed tracking issue #${issue.number}`);
            }

      - name: Enforce output contract
        if: always()
        run: |
          set -euo pipefail
          if [ "${{ steps.contract_final.outputs.contract_ok }}" != "true" ]; then
            echo "::error::Upstream merge output contract failed: ${{ steps.contract_final.outputs.reason }}"
            exit 1
          fi

      - name: Upload agent output
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: upstream-merge-agent-output
          path: |
            /tmp/upstream-merge-agent-output.txt
            /tmp/upstream-merge-pr-body.md
            /tmp/upstream-merge-state.json
            /tmp/upstream-merge-preflight.log
            /tmp/upstream-merge-contract-final.json
            /tmp/upstream-merge-contract-final.txt
          if-no-files-found: ignore

      - name: Upload state checkpoint artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: upstream-merge-state-${{ github.run_id }}
          path: /tmp/upstream-merge-state.json
          if-no-files-found: error
