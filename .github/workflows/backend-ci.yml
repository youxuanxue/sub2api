name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'backend/cmd/server/VERSION'
  pull_request:
  workflow_dispatch:
    inputs:
      suite:
        description: Which CI suite to run
        required: false
        default: all
        type: choice
        options:
          - all
          - ci
          - security
          - weekly-smoke
  schedule:
    - cron: '0 3 * * 1'
    - cron: '17 9 * * TUE'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  preflight:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && (inputs.suite == 'all' || inputs.suite == 'ci'))
    # Mechanical gate for process / quality rules from dev-rules submodule.
    # See CLAUDE.md § 10 and dev-rules/rules/dev-rules-convention.mdc.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
      # Preflight runs `go test` for QA evidence dataset validation; backend/go.mod
      # replaces new-api with ../../new-api — same sibling checkout as test/lint jobs.
      - uses: ./.github/actions/cache-and-checkout-new-api
      - name: Run preflight
        run: |
          if [ -x scripts/preflight.sh ]; then
            ./scripts/preflight.sh
          else
            ./dev-rules/templates/preflight.sh
          fi

  test-unit:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && (inputs.suite == 'all' || inputs.suite == 'ci'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/cache-and-checkout-new-api
      # cache:false + ./.github/actions/go-rolling-cache — setup-go's built-in
      # cache is immutable and was shared across the three Go jobs despite their
      # differing build tags, so the test-result cache never persisted (every run
      # cold-compiled + re-ran all packages). See that composite for the full why.
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: false
      - uses: ./.github/actions/go-rolling-cache
        with:
          prefix: unit
      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.4'
      - name: Unit tests
        working-directory: backend
        run: make test-unit

  test-integration:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && (inputs.suite == 'all' || inputs.suite == 'ci'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/cache-and-checkout-new-api
      # cache:false + ./.github/actions/go-rolling-cache — see test-unit above.
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: false
      - uses: ./.github/actions/go-rolling-cache
        with:
          prefix: integration
      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.4'
      - name: Integration tests
        working-directory: backend
        run: make test-integration

  frontend:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && (inputs.suite == 'all' || inputs.suite == 'ci'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Frontend typecheck and critical vitest
        run: make test-frontend

  golangci-lint:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && (inputs.suite == 'all' || inputs.suite == 'ci'))
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/cache-and-checkout-new-api
      # cache:false + ./.github/actions/go-rolling-cache — see test-unit above.
      # golangci-lint-action manages its own analysis cache (~/.cache/golangci-lint)
      # on top of the GOCACHE this rolls; the two are independent.
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: false
      - uses: ./.github/actions/go-rolling-cache
        with:
          prefix: lint
      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.4'
      # PR: only-new-issues (GitHub API diff). Push/workflow_dispatch: full ./... lint on backend.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
          args: --concurrency=4 --timeout=30m
          working-directory: backend
          only-new-issues: ${{ github.event_name == 'pull_request' }}

  backend-security:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'schedule' && github.event.schedule == '0 3 * * 1') || (github.event_name == 'workflow_dispatch' && (inputs.suite == 'all' || inputs.suite == 'security'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/cache-and-checkout-new-api
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.4'
      - name: Run gosec lint
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
          args: --enable-only gosec --concurrency=4 --timeout=30m
          working-directory: backend
      - name: Note gosec scope (push/PR runs)
        # Honesty signal: on push/PR this job runs ONLY govulncheck — gosec static
        # analysis is gated to schedule/dispatch above. Without this note a green
        # `backend-security` check on a PR reads as "gosec passed" when it never
        # ran. Zero-cost; surfaces the gap in the log + step summary.
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        run: |
          echo "::notice title=gosec scope::gosec static analysis runs weekly (Mon 03:00 UTC) and on manual dispatch — NOT on push/PR. This run executed govulncheck only."
          echo "ℹ️ \`backend-security\` on push/PR runs **govulncheck only**. gosec static analysis runs weekly (Mon 03:00 UTC) + manual dispatch (\`suite: security\`)." >> "$GITHUB_STEP_SUMMARY"
      - name: Run govulncheck
        working-directory: backend
        run: |
          # Pin govulncheck (was @latest). An unpinned @latest is non-reproducible
          # and a supply-chain surface — a bad upstream release would silently
          # break or poison this gate. Contrast golangci-lint (pinned v2.9) and
          # new-api (pinned by SHA). Bump deliberately.
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          govulncheck ./...

  frontend-security:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || (github.event_name == 'schedule' && github.event.schedule == '0 3 * * 1') || (github.event_name == 'workflow_dispatch' && (inputs.suite == 'all' || inputs.suite == 'security'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Run pnpm audit
        working-directory: frontend
        run: |
          # `pnpm audit` exits non-zero when advisories are found — that is
          # EXPECTED here; the exception checker (next step) decides pass/fail.
          # But a registry/network failure ALSO exits non-zero with empty/garbage
          # output, which the checker would then pass VACUOUSLY (empty audit =
          # "no vulns"). So: run, ignore the advisory exit, then assert the output
          # is real audit JSON (parses + has a recognized top-level key) before
          # trusting it. Fail loudly if the audit did not actually run.
          pnpm audit --prod --audit-level=high --json > audit.json || true
          python3 - <<'PY'
          import json, sys
          try:
              with open("audit.json") as fh:
                  data = json.load(fh)
          except Exception as exc:
              sys.stderr.write(f"::error title=pnpm audit::audit.json is not valid JSON ({exc}); pnpm audit failed to run (registry/network?). Failing instead of passing vacuously.\n")
              sys.exit(1)
          if not (isinstance(data, dict) and any(k in data for k in ("advisories", "vulnerabilities", "metadata"))):
              sys.stderr.write("::error title=pnpm audit::audit.json parsed but lacks advisories/vulnerabilities/metadata; not a real audit result. Failing instead of passing vacuously.\n")
              sys.exit(1)
          PY
      - name: Check audit exceptions
        run: |
          python tools/check_pnpm_audit_exceptions.py \
            --audit frontend/audit.json \
            --exceptions .github/audit-exceptions.yml

  new-api-bump-smoke:
    if: (github.event_name == 'schedule' && github.event.schedule == '17 9 * * TUE') || (github.event_name == 'workflow_dispatch' && (inputs.suite == 'all' || inputs.suite == 'weekly-smoke'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
      - uses: ./.github/actions/cache-and-checkout-new-api
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.4'
      - name: Run pinned new-api smoke via bump helper
        run: |
          CURRENT_PIN="$(tr -d '[:space:]' < .new-api-ref)"
          bash scripts/upstream/bump-new-api.sh "$CURRENT_PIN"

  # Warm the cross-arch (amd64+arm64) Go build cache that release.yml consumes.
  #
  # WHY THIS JOB EXISTS: release.yml is triggered by `tag push`, so it runs on
  # `refs/tags/vX.Y.Z`. GitHub Actions scopes cache restore to the current ref
  # plus the DEFAULT BRANCH only — a cache saved on one tag ref is invisible to
  # the next tag's run. The "rolling" cache release.yml saved on its own tag ref
  # was therefore NEVER restored across releases (verified: every release logged
  # `Cache not found for input keys: Linux-go-release-...`), so every release
  # cold-compiled the full arm64 package set (~4m, ~79% of the GoReleaser step).
  #
  # Saving the same-keyed cache HERE — on `main`, the default branch — makes it
  # readable from every tag-triggered release run. release.yml now restores it
  # (restore-only) and only recompiles changed packages + relinks.
  #
  # Runs only on push to main (where the save lands on the default-branch ref);
  # PR runs are pointless because their cache is PR-ref-scoped and release can't
  # read it.
  warm-release-cache:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/cache-and-checkout-new-api
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          # The rolling cache below owns GOCACHE + GOMODCACHE; setup-go's
          # go.sum-keyed cache is immutable and would never refresh the arm64
          # cross-compile objects (same reasoning as release.yml).
          cache: false
      # Rolling cache: a run_id-unique SAVE key always re-saves at post-job; the
      # restore-keys seed from the previous main warm cache so the build is
      # incremental, not cold. Key prefix is IDENTICAL to release.yml's
      # restore-keys so release restores exactly this entry. Go's cache is
      # content-addressed, so a stale entry is unused, never wrong.
      - name: Rolling Go build cache (amd64 + arm64 cross-compile)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-release-${{ hashFiles('backend/go.sum') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-go-release-${{ hashFiles('backend/go.sum') }}-
            ${{ runner.os }}-go-release-
      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.4'
      # Compile cmd/server for BOTH release arches to populate the cache.
      # Flags mirror .goreleaser.yaml (CGO_ENABLED=0, linux) — but WITHOUT
      # `-tags=embed`, so no frontend dist/ is required (embed_off.go satisfies
      # `//go:build !embed`). The embed-gated files are a handful of tiny
      # packages that recompile during release; deps + stdlib + all relay/
      # service/handler objects — the ~79% bulk — are cached identically.
      - name: Warm cross-arch Go build cache
        working-directory: backend
        env:
          CGO_ENABLED: '0'
          GOOS: linux
        run: |
          for arch in amd64 arm64; do
            echo "::group::go build linux/${arch}"
            GOARCH="${arch}" go build -o /dev/null ./cmd/server
            echo "::endgroup::"
          done

  compile-smoke:
    if: (github.event_name == 'schedule' && github.event.schedule == '17 9 * * TUE') || (github.event_name == 'workflow_dispatch' && (inputs.suite == 'all' || inputs.suite == 'weekly-smoke'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
      - uses: ./.github/actions/cache-and-checkout-new-api
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.4'
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend
      - name: Run preflight
        run: ./scripts/preflight.sh
      - name: Build backend and frontend
        run: make build
