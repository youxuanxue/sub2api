name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Pinned commit of QuantumNous/new-api required by
      # `replace github.com/QuantumNous/new-api => ../../new-api` in backend/go.mod.
      # Bump alongside any new-api upgrade (and update local sibling clone).
      NEW_API_REF: 0664bb3f65f05ba1734276264e92e2512b7cacd4
    steps:
      - uses: actions/checkout@v6
      - name: Checkout new-api sibling (cross-repo dep via go.mod replace)
        run: |
          set -euxo pipefail
          target="${GITHUB_WORKSPACE}/../new-api"
          git clone --filter=blob:none https://github.com/QuantumNous/new-api.git "$target"
          git -C "$target" checkout "$NEW_API_REF"
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.2'
      - name: Unit tests
        working-directory: backend
        run: make test-unit
      - name: Integration tests
        working-directory: backend
        run: make test-integration

  golangci-lint:
    runs-on: ubuntu-latest
    env:
      NEW_API_REF: 0664bb3f65f05ba1734276264e92e2512b7cacd4
    steps:
      - uses: actions/checkout@v6
      - name: Checkout new-api sibling (cross-repo dep via go.mod replace)
        run: |
          set -euxo pipefail
          target="${GITHUB_WORKSPACE}/../new-api"
          git clone --filter=blob:none https://github.com/QuantumNous/new-api.git "$target"
          git -C "$target" checkout "$NEW_API_REF"
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.2'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
          args: --timeout=30m
          working-directory: backend