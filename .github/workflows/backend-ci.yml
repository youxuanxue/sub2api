name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Checkout new-api sibling (cross-repo dep via go.mod replace)
        run: |
          # Pin = single source of truth in .new-api-ref (bumped via
          # scripts/sync-new-api.sh --bump <sha>).
          set -euxo pipefail
          NEW_API_REF="$(tr -d '[:space:]' < .new-api-ref)"
          [ -n "${NEW_API_REF}" ] || { echo "ERROR: .new-api-ref is empty" >&2; exit 1; }
          target="${GITHUB_WORKSPACE}/../new-api"
          git clone --filter=blob:none https://github.com/QuantumNous/new-api.git "$target"
          git -C "$target" fetch --filter=blob:none origin "${NEW_API_REF}" || true
          git -C "$target" checkout "${NEW_API_REF}"
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.2'
      - name: Unit tests
        working-directory: backend
        run: make test-unit
      - name: Integration tests
        working-directory: backend
        run: make test-integration

  golangci-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Checkout new-api sibling (cross-repo dep via go.mod replace)
        run: |
          set -euxo pipefail
          NEW_API_REF="$(tr -d '[:space:]' < .new-api-ref)"
          [ -n "${NEW_API_REF}" ] || { echo "ERROR: .new-api-ref is empty" >&2; exit 1; }
          target="${GITHUB_WORKSPACE}/../new-api"
          git clone --filter=blob:none https://github.com/QuantumNous/new-api.git "$target"
          git -C "$target" fetch --filter=blob:none origin "${NEW_API_REF}" || true
          git -C "$target" checkout "${NEW_API_REF}"
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.2'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
          args: --timeout=30m
          working-directory: backend