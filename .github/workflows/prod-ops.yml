name: Prod Ops

# Canonical production diagnostics entry point. Both operations use the same
# GHA → AWS STS (OIDC) → SSM Run-Command → prod EC2 path.

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      operation:
        description: Which prod operation to run
        required: true
        default: error_clustering
        type: choice
        options:
          - error_clustering
          - log_dump
      since_hours:
        description: Error clustering lookback window in hours
        required: false
        default: "24"
      since:
        description: Log dump lookback window passed to docker logs --since (e.g. 30m, 2h, 1d)
        required: false
        default: "10m"
      container:
        description: Log dump container
        required: false
        default: tokenkey
        type: choice
        options:
          - tokenkey
          - tokenkey-postgres
          - tokenkey-caddy
          - tokenkey-redis
      grep_pattern:
        description: Optional log dump ERE pattern. Empty = no filter.
        required: false
        default: ""
      tail_lines:
        description: Log dump cap on returned lines (positive integer, max 10000)
        required: false
        default: "1000"

jobs:
  error-clustering:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.operation == 'error_clustering')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      OIDC_ROLE_ARN: ${{ vars.AWS_OIDC_ROLE_ARN }}
      STACK_NAME: ${{ vars.PROD_STACK_NAME || 'tokenkey-prod-stage0' }}
    concurrency:
      group: prod-ops-error-clustering
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Precheck OIDC role
        id: precheck
        run: |
          if [ -z "${OIDC_ROLE_ARN:-}" ]; then
            echo "AWS_OIDC_ROLE_ARN repo variable not set; skipping clustering run"
            cat > report.json <<'EOF'
          {"summary":"skip: AWS_OIDC_ROLE_ARN missing","clusters":[],"persistent_clusters":[]}
          EOF
            cat > report.md <<'EOF'
          # Error Clustering

          skipped: AWS_OIDC_ROLE_ARN repo variable is not configured
          EOF
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials via OIDC
        if: steps.precheck.outputs.skip == 'false'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve prod instance ID
        if: steps.precheck.outputs.skip == 'false'
        id: instance
        run: |
          ID=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`InstanceId`].OutputValue' --output text)
          if [ -z "$ID" ] || [ "$ID" = "None" ]; then
            echo "could not resolve InstanceId from stack $STACK_NAME" >&2
            exit 1
          fi
          echo "id=$ID" >> "$GITHUB_OUTPUT"

      - name: Run clustering on prod EC2 via SSM
        if: steps.precheck.outputs.skip == 'false'
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.id }}
          SINCE_HOURS: ${{ inputs.since_hours || '24' }}
        run: |
          set -euo pipefail
          if ! printf '%s' "$SINCE_HOURS" | grep -Eq '^[0-9]+$'; then
            echo "::error::since_hours must be a positive integer, got: $SINCE_HOURS"
            exit 1
          fi
          python3 - <<'PY' > ssm-params.json
          import json
          import os

          since_hours = os.environ["SINCE_HOURS"]
          commands = [
              "set -euo pipefail",
              "[ -x /usr/local/bin/error_clustering ] || { echo binary_missing >&2; exit 3; }",
              "echo binary_sha256=$(sha256sum /usr/local/bin/error_clustering | awk '{print $1}')",
              "PGPASS=$(sudo grep '^POSTGRES_PASSWORD=' /var/lib/tokenkey/.env | cut -d= -f2-)",
              "[ -n \"$PGPASS\" ] || { echo no_pg_password >&2; exit 2; }",
              "OUT=/tmp/clustering",
              "sudo rm -rf \"$OUT\" && sudo mkdir -p \"$OUT\" && sudo chmod 0777 \"$OUT\"",
              "NET=$(sudo docker inspect tokenkey-postgres --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}')",
              "sudo docker run --rm --network \"$NET\" -v /usr/local/bin/error_clustering:/binary:ro -v \"$OUT\":/out -e PG_DSN=\"postgres://tokenkey:$PGPASS@tokenkey-postgres:5432/tokenkey?sslmode=disable\" alpine:3.21 /binary --since-hours " + since_hours + " --output /out/report.json --markdown /out/report.md",
              "echo ===BEGIN_REPORT_JSON===",
              "base64 -w0 \"$OUT/report.json\" 2>/dev/null || base64 \"$OUT/report.json\" | tr -d '\\n'",
              "echo",
              "echo ===END_REPORT_JSON===",
              "echo ===BEGIN_REPORT_MD===",
              "base64 -w0 \"$OUT/report.md\" 2>/dev/null || base64 \"$OUT/report.md\" | tr -d '\\n'",
              "echo",
              "echo ===END_REPORT_MD===",
          ]
          print(json.dumps({"commands": commands}))
          PY

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "error-clustering daily run ${SINCE_HOURS}h" \
            --parameters file://ssm-params.json \
            --query 'Command.CommandId' --output text)
          echo "ssm command-id=$CMD_ID"

          DEADLINE=$(( $(date +%s) + 240 ))
          while true; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo InProgress)
            case "$STATUS" in Success|Failed|TimedOut|Cancelled) break ;; esac
            [ $(date +%s) -lt $DEADLINE ] || { echo "ssm timeout" >&2; STATUS=TimedOut; break; }
            sleep 6
          done

          aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text > stdout.txt
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardErrorContent' --output text > stderr.txt

          if [ "$STATUS" != "Success" ]; then
            echo "::error::ssm command status=$STATUS"
            echo '--- stderr ---'; cat stderr.txt
            echo '--- stdout ---'; cat stdout.txt
            exit 1
          fi

          awk '/^===BEGIN_REPORT_JSON===$/{f=1;next} /^===END_REPORT_JSON===$/{f=0} f' stdout.txt | tr -d '\n' | base64 -d > report.json
          awk '/^===BEGIN_REPORT_MD===$/{f=1;next} /^===END_REPORT_MD===$/{f=0} f' stdout.txt | tr -d '\n' | base64 -d > report.md

          if ! jq empty report.json 2>/dev/null; then
            echo "::error::report.json is not valid JSON"
            cat stdout.txt
            exit 1
          fi
          jq -r '.summary' report.json
          BIN_SHA=$(grep -m1 '^binary_sha256=' stdout.txt | cut -d= -f2- || true)
          if [ -n "${BIN_SHA:-}" ]; then
            echo "ec2 binary sha256: $BIN_SHA"
            {
              echo "## error_clustering binary"
              echo "- ec2 sha256: \`$BIN_SHA\`"
              echo "- to refresh: \`bash scripts/deploy-error-clustering-binary.sh\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: error-clustering-${{ github.run_id }}
          path: |
            report.json
            report.md

      - name: Decide downstream action
        id: decide
        run: |
          NEED="$(jq '.persistent_clusters | length' report.json 2>/dev/null || echo 0)"
          echo "need_action=$([ "${NEED:-0}" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Open or update issue (Stage 2A)
        if: steps.decide.outputs.need_action == 'true' && vars.STAGE_2A_ISSUE_ONLY == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SIG="$(jq -r '.persistent_clusters[0].signature // .clusters[0].signature // "no-sig"' report.json)"
          SIG_SHORT="$(printf '%s' "$SIG" | shasum -a 256 | cut -c1-12)"
          LABEL="cluster-sig:$SIG_SHORT"
          gh label create "$LABEL" --color BFD4F2 --description "cluster signature for cooldown" 2>/dev/null || true
          EXISTING="$(gh issue list --label "$LABEL" --state open --json number --limit 1 | jq -r '.[0].number // empty')"
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body-file report.md
          else
            gh issue create \
              --title "[cluster] $(jq -r '.summary // "persistent cluster detected"' report.json)" \
              --body-file report.md \
              --label "cluster-detected,needs-triage,automated,$LABEL"
          fi

      - name: Trigger draft PR (Stage 2B)
        if: steps.decide.outputs.need_action == 'true' && vars.STAGE_2A_ISSUE_ONLY != 'true'
        uses: ./.github/actions/agent-draft-pr
        with:
          report_path: report.md
          report_json: report.json
          workflow: error-clustering
          claude_auth_token: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}

      - name: Notify Feishu
        if: always()
        env:
          FEISHU_OPS_WEBHOOK: ${{ secrets.FEISHU_OPS_WEBHOOK }}
        run: |
          [ -n "${FEISHU_OPS_WEBHOOK:-}" ] || exit 0
          MSG="$(jq -r '.summary // "error clustering finished"' report.json 2>/dev/null)"
          curl -sS -X POST "$FEISHU_OPS_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg t "[error-clustering] $MSG" '{msg_type:"text",content:{text:$t}}')" || true

  log-dump:
    if: github.event_name == 'workflow_dispatch' && inputs.operation == 'log_dump'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      OIDC_ROLE_ARN: ${{ vars.AWS_OIDC_ROLE_ARN }}
      STACK_NAME: ${{ vars.PROD_STACK_NAME || 'tokenkey-prod-stage0' }}
      INPUT_SINCE: ${{ inputs.since }}
      INPUT_CONTAINER: ${{ inputs.container }}
      INPUT_GREP: ${{ inputs.grep_pattern }}
      INPUT_TAIL: ${{ inputs.tail_lines }}
    concurrency:
      group: prod-ops-log-dump
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          set -euo pipefail
          if ! printf '%s' "$INPUT_SINCE" | grep -Eq '^[0-9]+[smhd]$'; then
            echo "::error::since must match ^[0-9]+[smhd]$ (e.g. 30m, 2h, 1d), got: $INPUT_SINCE"
            exit 1
          fi
          case "$INPUT_CONTAINER" in
            tokenkey|tokenkey-postgres|tokenkey-caddy|tokenkey-redis) ;;
            *) echo "::error::container must be one of tokenkey|tokenkey-postgres|tokenkey-caddy|tokenkey-redis, got: $INPUT_CONTAINER"; exit 1 ;;
          esac
          if ! printf '%s' "$INPUT_TAIL" | grep -Eq '^[1-9][0-9]*$'; then
            echo "::error::tail_lines must be a positive integer, got: $INPUT_TAIL"
            exit 1
          fi
          if [ "$INPUT_TAIL" -gt 10000 ]; then
            echo "::error::tail_lines capped at 10000 to keep artifact size sane, got: $INPUT_TAIL"
            exit 1
          fi
          if [ ${#INPUT_GREP} -gt 512 ]; then
            echo "::error::grep_pattern too long (>512 chars)"
            exit 1
          fi

      - name: Precheck OIDC role
        run: |
          if [ -z "${OIDC_ROLE_ARN:-}" ]; then
            echo "::error::AWS_OIDC_ROLE_ARN repo variable not set; configure per deploy/aws/README.md § 'CI 通过 OIDC 调度 SSM'"
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve prod instance ID
        id: instance
        run: |
          ID=$(aws cloudformation describe-stacks --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs[?OutputKey==`InstanceId`].OutputValue' --output text)
          if [ -z "$ID" ] || [ "$ID" = "None" ]; then
            echo "::error::could not resolve InstanceId from stack $STACK_NAME"
            exit 1
          fi
          echo "id=$ID" >> "$GITHUB_OUTPUT"

      - name: Run docker logs on prod EC2 via SSM
        env:
          INSTANCE_ID: ${{ steps.instance.outputs.id }}
        run: |
          set -euo pipefail
          GREP_B64=$(printf '%s' "$INPUT_GREP" | base64 -w0 2>/dev/null \
            || printf '%s' "$INPUT_GREP" | base64 | tr -d '\n')
          export GREP_B64

          python3 - <<'PY' > ssm-params.json
          import json
          import os
          import shlex

          container = os.environ["INPUT_CONTAINER"]
          since = os.environ["INPUT_SINCE"]
          tail = os.environ["INPUT_TAIL"]
          grep_b64 = os.environ["GREP_B64"]
          commands = [
              "set -euo pipefail",
              "OUT=/tmp/prod-log-dump",
              "sudo rm -rf \"$OUT\" && sudo mkdir -p \"$OUT\" && sudo chmod 0777 \"$OUT\"",
              "trap 'sudo rm -rf /tmp/prod-log-dump' EXIT",
              "printf %s " + shlex.quote(grep_b64) + " | base64 -d > \"$OUT/pattern\"",
              "sudo docker logs " + shlex.quote(container) + " --since " + shlex.quote(since) + " --timestamps > \"$OUT/raw\" 2>&1 || true",
              "if [ -s \"$OUT/pattern\" ]; then grep -E --no-messages -f \"$OUT/pattern\" \"$OUT/raw\" | tail -n " + tail + " > \"$OUT/logs.txt\" || true; else tail -n " + tail + " \"$OUT/raw\" > \"$OUT/logs.txt\"; fi",
              "echo ===BEGIN_LOGS===",
              "gzip -c \"$OUT/logs.txt\" | (base64 -w0 2>/dev/null || base64 | tr -d '\\n')",
              "echo",
              "echo ===END_LOGS===",
          ]
          print(json.dumps({"commands": commands}))
          PY

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "prod-log-dump $INPUT_CONTAINER since=$INPUT_SINCE" \
            --parameters file://ssm-params.json \
            --query 'Command.CommandId' --output text)
          echo "ssm command-id=$CMD_ID"

          DEADLINE=$(( $(date +%s) + 180 ))
          while true; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo InProgress)
            case "$STATUS" in Success|Failed|TimedOut|Cancelled) break ;; esac
            [ $(date +%s) -lt $DEADLINE ] || { echo "::error::ssm timeout"; STATUS=TimedOut; break; }
            sleep 4
          done

          aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text > stdout.txt
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardErrorContent' --output text > stderr.txt

          if [ "$STATUS" != "Success" ]; then
            echo "::error::ssm command status=$STATUS"
            echo '--- stderr ---'; cat stderr.txt
            echo '--- stdout ---'; cat stdout.txt
            exit 1
          fi

          if ! grep -q '^===END_LOGS===$' stdout.txt; then
            BYTES=$(wc -c < stdout.txt)
            echo "::error::SSM stdout truncated at ${BYTES}B (24KB cap). Tighten GREP_PATTERN, lower TAIL_LINES, or shorten SINCE."
            exit 1
          fi

          awk '/^===BEGIN_LOGS===$/{f=1;next} /^===END_LOGS===$/{f=0} f' stdout.txt | tr -d '\n' | base64 -d | gunzip > logs.txt
          if [ ! -s logs.txt ]; then
            printf '(no log entries for container=%s since=%s grep=%q)\n' "$INPUT_CONTAINER" "$INPUT_SINCE" "$INPUT_GREP" > logs.txt
          fi

          BYTES=$(wc -c < logs.txt)
          LINES=$(wc -l < logs.txt)
          {
            echo "## prod-log-dump"
            echo "- container: \`$INPUT_CONTAINER\`"
            echo "- since:     \`$INPUT_SINCE\`"
            echo "- grep:      \`${INPUT_GREP:-(none)}\`"
            echo "- tail:      \`$INPUT_TAIL\`"
            echo "- result:    \`$LINES lines, $BYTES bytes\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "captured $LINES lines / $BYTES bytes"

      - uses: actions/upload-artifact@v4
        with:
          name: prod-logs-${{ github.run_id }}
          path: logs.txt
