name: Upstream Merge PR Shape

# Mechanical enforcement of CLAUDE.md §5.y for any PR whose head branch
# matches `merge/upstream-*`. Validates twelve things:
#
#   1. The PR contains at least one merge commit whose second parent is
#      reachable from upstream/main. This is what `git merge --no-ff
#      upstream/main` produces; squash merges and ff-merges fail this check.
#   2. The PR body includes the required §5.y audit cadence reference
#      (the literal string `upstream/main..HEAD`, which appears in both
#      mandated commands).
#   3. No first-parent commit introduced by the PR carries `[skip ci]` /
#      `[ci skip]` literally, which would silently disable the release
#      pipeline if that PR's landing commit is later tagged. Imported upstream
#      history is allowed to keep upstream's own release-sync messages.
#   4. Every load-bearing surface of the fifth platform `newapi` listed
#      in `scripts/sentinels/newapi.json` is still present after the
#      merge. This catches the recurring failure mode that motivated
#      docs/approved/newapi-as-fifth-platform.md: an upstream merge
#      silently drops a TK companion file or a `case PlatformNewAPI`
#      branch and the regression is only noticed weeks later.
#   5. Every outward TokenKey brand surface listed in
#      `scripts/sentinels/brand.json` is still intact after the merge,
#      so upstream churn cannot silently revert default title / README /
#      fifth-platform display labels back into split branding.
#   5b. Every load-bearing TokenKey-only frontend surface listed in
#      `scripts/sentinels/frontend-tk.json` is still intact after the
#      merge — small UI divergences (sidebar geometry, fluid admin-accounts
#      table mode, sticky-edge-hints opt-out) compile cleanly even if
#      silently reverted, so a literal-content guard is the only catch.
#   5c. Every load-bearing TokenKey-only gateway/service hook listed in
#      `scripts/sentinels/gateway-tk.json` is still intact after the merge;
#      these are small upstream-hotspot injections that otherwise compile
#      cleanly when silently reverted (incl. prod-to-sibling Claude sticky
#      session header + ParsedRequest Gin fallback, and bridge metadata).
#   6. The QA evidence redaction contract stays aligned: if logredact's
#      default sensitive-key set changes, `scripts/sentinels/redaction.json`
#      and every outward `redaction_version` literal must move in the same
#      commit, so exported evidence remains interpretable across versions.
#   7. The gateway evidence hook contract stays aligned: main gateway scopes
#      must keep `trajectory_id` + `qaCapture` wiring, and the QA middleware
#      must still terminate in `CaptureFromContext`.
#   8. The stream terminal-event contract stays aligned: stable OpenAI /
#      Anthropic terminal helpers, `[DONE]` emission, and focused terminal
#      assertions must remain intact so Evidence Spine capture keeps reliable
#      completion markers.
#   9. The Engine Spine facade contract stays aligned: key dispatch paths must
#      keep routing bridge eligibility through the shared engine facade so
#      provider selection truth does not drift back into hotspot service files.
#  10. The exported QA evidence dataset contract stays aligned: the standalone
#      validator plus its focused regression tests must keep H1/H2/H3/D1 and
#      structural acceptance gates executable after the merge.
#  11. The pricing-availability tap contract stays intact: TK call sites registered
#      in `scripts/sentinels/pricing-availability.json` must survive the merge so
#      passive availability does not silently go dark (preflight parity).
#  12. The sentinel-registry update gate stays satisfied on the PR diff: changing
#      sentinel-covered hotspots without updating the paired `scripts/sentinels/*.json`
#      fails (mechanical 「覆写防护」vs human review memory — preflight parity).
#  13. The buffered Content-Type leak antipattern (upstream Wei-Shaw/sub2api#1311)
#      stays absent: any new `responseheaders.WriteFilteredHeaders` call followed
#      by `c.JSON` or `c.Data(_, "application/json...", _)` without an explicit
#      `c.Writer.Header().Set("Content-Type", ...)` override fails the merge
#      (preflight parity, mechanical forward-drift guard).
#
# A green check here is a hard prerequisite for merging. Branch protection
# on `main` should require this workflow status for `merge/upstream-*` PRs.

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    if: startsWith(github.head_ref, 'merge/upstream-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
          submodules: recursive

      # Checks 4–9 and 11 run Python sentinel scripts; check 10 runs `go test`
      # in backend/; check 12 runs the registry update gate on the PR merge
      # range. `backend/go.mod` replaces new-api with ../../new-api — same
      # sibling checkout as CI `test` / `preflight` jobs.
      - uses: ./.github/actions/cache-and-checkout-new-api

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Add upstream remote and fetch
        run: |
          if ! git remote get-url upstream >/dev/null 2>&1; then
            git remote add upstream https://github.com/Wei-Shaw/sub2api.git
          fi
          git fetch upstream main --quiet

      - name: Check 1 — PR contains a --no-ff merge of upstream/main
        run: |
          BASE='${{ github.event.pull_request.base.sha }}'
          HEAD='${{ github.event.pull_request.head.sha }}'

          MERGE_COMMITS=$(git log --merges --format='%H' "$BASE".."$HEAD")
          if [ -z "$MERGE_COMMITS" ]; then
            echo "::error::PR head branch matches 'merge/upstream-*' but contains zero merge commits."
            echo "::error::Per CLAUDE.md §5.y, upstream merges MUST use 'git merge --no-ff upstream/main'."
            echo "::error::Squash merges and ff merges are forbidden because they sever the upstream"
            echo "::error::commit chain that 'git log upstream/main..HEAD' depends on."
            exit 1
          fi

          FOUND=0
          for sha in $MERGE_COMMITS; do
            P2=$(git log -1 --format='%P' "$sha" | awk '{print $2}')
            if [ -n "$P2" ] && git merge-base --is-ancestor "$P2" upstream/main 2>/dev/null; then
              echo "OK: merge commit $sha pulls in upstream/main (second parent: $P2)"
              FOUND=1
              break
            fi
          done

          if [ "$FOUND" -ne 1 ]; then
            echo "::error::None of the merge commits in this PR has a second parent"
            echo "::error::reachable from upstream/main."
            echo "::error::Inspected merge commits:"
            for sha in $MERGE_COMMITS; do
              echo "::error::  $sha (parents: $(git log -1 --format='%P' "$sha"))"
            done
            echo "::error::Per §5.y, the PR must contain 'git merge --no-ff upstream/main'."
            exit 1
          fi

      - name: Check 2 — PR body contains §5.y audit cadence
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$PR_BODY" ]; then
            echo "::error::PR body is empty. Per §5.y it must include the audit cadence."
            exit 1
          fi

          # Both mandated commands embed the literal string `upstream/main..HEAD`:
          #   git log --oneline upstream/main..HEAD | wc -l
          #   git diff --stat upstream/main..HEAD -- backend/
          if ! echo "$PR_BODY" | grep -q 'upstream/main\.\.HEAD'; then
            echo "::error::PR body must include the §5.y audit cadence:"
            echo "::error::  - git log --oneline upstream/main..HEAD | wc -l"
            echo "::error::  - git diff --stat upstream/main..HEAD -- backend/ | head -5"
            echo "::error::Neither command was referenced (looking for 'upstream/main..HEAD' substring)."
            exit 1
          fi
          echo "OK: PR body references §5.y audit cadence."

      - name: Check 3 — No '[skip ci]' / '[ci skip]' in PR first-parent commits
        run: |
          BASE='${{ github.event.pull_request.base.sha }}'
          HEAD='${{ github.event.pull_request.head.sha }}'

          # GitHub's [skip ci] detector matches the literal substring anywhere in
          # the message of the commit being tagged, ignoring context. For an
          # upstream merge PR, the release risk is the PR's first-parent landing
          # chain: local gate-fix commits plus the upstream merge commit. Imported
          # upstream history may legitimately contain upstream release-sync
          # messages, and rewriting those commits would violate §5.y.
          # Single matcher shared with main-ancestry-guard.yml Check 3 and
          # scripts/preflight.sh — scripts/checks/skip-ci-marker.py — so the two
          # guards can no longer drift on grep engine or scan scope. This PR's
          # title/body are already covered by main-ancestry-guard (base==main),
          # so here we scan only the first-parent commit chain. --first-parent
          # (inside the script) preserves imported upstream release-sync messages.
          python3 ./scripts/checks/skip-ci-marker.py --commits-range "$BASE..$HEAD"

      - name: Check 4 — newapi sentinels still intact after merge
        run: |
          # Single source of truth: scripts/sentinels/newapi.json. Same script
          # that scripts/preflight.sh runs locally as the "newapi sentinel
          # registry" check, so a green local preflight implies a green Check
          # 4 here. Failure means the upstream merge silently dropped a
          # load-bearing fifth-platform surface — fix the merge to restore
          # the file/symbol, do NOT delete the sentinel entry to make the
          # check pass.
          if [ ! -f ./scripts/sentinels/check-newapi.py ]; then
            echo "::error::scripts/sentinels/check-newapi.py missing."
            echo "::error::Per CLAUDE.md §5.x, this guard cannot be silently disabled."
            exit 1
          fi
          if ! python3 ./scripts/sentinels/check-newapi.py; then
            echo "::error::Upstream merge regressed at least one newapi sentinel."
            echo "::error::Per CLAUDE.md §5.x, restore the dropped file/symbol in this"
            echo "::error::merge PR. Do NOT 'fix' by deleting the sentinel entry."
            exit 1
          fi

      - name: Check 4b — kiro sentinels still intact after merge
        run: |
          # Single source of truth: scripts/sentinels/kiro.json. Same script that
          # scripts/preflight.sh runs locally as the "kiro sentinel registry"
          # check, so a green local preflight implies a green check here. Failure
          # means the upstream merge silently dropped a load-bearing sixth-platform
          # surface (vendored protocol layer, PlatformKiro, KiroGatewayService
          # injection, IsKiro, KiroTokenRefresher, or the ToS gate) — fix the merge
          # to restore the file/symbol, do NOT delete the sentinel entry.
          if [ ! -f ./scripts/sentinels/check-kiro.py ]; then
            echo "::error::scripts/sentinels/check-kiro.py missing."
            echo "::error::Per CLAUDE.md §5.x, this guard cannot be silently disabled."
            exit 1
          fi
          if ! python3 ./scripts/sentinels/check-kiro.py; then
            echo "::error::Upstream merge regressed at least one kiro sentinel."
            echo "::error::Per CLAUDE.md §5.x, restore the dropped file/symbol in this"
            echo "::error::merge PR. Do NOT 'fix' by deleting the sentinel entry."
            exit 1
          fi

      - name: Check 4d — grok sentinels still intact after merge
        run: |
          # Single source of truth: scripts/sentinels/grok.json. Same script that
          # scripts/preflight.sh runs locally as the "grok sentinel registry"
          # check, so a green local preflight implies a green check here. Failure
          # means the upstream merge silently dropped a load-bearing seventh-platform
          # surface — the thin grok injection branches into upstream-shaped files
          # are the highest risk: the OAuth refresh (pkg/xai + GrokTokenRefresher),
          # the two forward seams (grok forwards like the apikey branch, NOT the
          # ChatGPT/Codex branch), the Heavy-403 honesty guard, the OpenAICompat
          # pool membership, and the model.AllPlatforms entry. Fix the merge to
          # restore the file/symbol, do NOT delete the sentinel entry.
          if [ ! -f ./scripts/sentinels/check-grok.py ]; then
            echo "::error::scripts/sentinels/check-grok.py missing."
            echo "::error::Per CLAUDE.md §5.x, this guard cannot be silently disabled."
            exit 1
          fi
          if ! python3 ./scripts/sentinels/check-grok.py; then
            echo "::error::Upstream merge regressed at least one grok sentinel."
            echo "::error::Per CLAUDE.md §5.x, restore the dropped file/symbol in this"
            echo "::error::merge PR. Do NOT 'fix' by deleting the sentinel entry."
            exit 1
          fi

      - name: Check 4c — antigravity fingerprint sentinels still intact after merge
        run: |
          # Single source of truth: scripts/sentinels/antigravity.json. Same script
          # that scripts/preflight.sh runs locally as the "antigravity fingerprint
          # sentinel registry" check, so a green local preflight implies a green
          # check here. Failure means the upstream merge silently reverted a
          # TokenKey fingerprint divergence — the `/hub/` subclient segment in
          # oauth.go BuildUserAgent, or re-added the gl-node X-Goog-Api-Client
          # header on client.go privacy calls. oauth.go/client.go are
          # upstream-shaped, so this clobber lands with a trivial test-passing
          # diff — fix the merge to keep the TK values, do NOT delete the entry.
          if [ ! -f ./scripts/sentinels/check-antigravity.py ]; then
            echo "::error::scripts/sentinels/check-antigravity.py missing."
            echo "::error::Per CLAUDE.md §5.x, this guard cannot be silently disabled."
            exit 1
          fi
          if ! python3 ./scripts/sentinels/check-antigravity.py; then
            echo "::error::Upstream merge regressed at least one antigravity fingerprint sentinel."
            echo "::error::Restore the TK fingerprint values (/hub/ UA segment, gl-node removal)"
            echo "::error::in this merge PR. Do NOT 'fix' by deleting the sentinel entry."
            exit 1
          fi

      - name: Check 5 — brand sentinels still intact after merge
        run: |
          # Single source of truth: scripts/sentinels/brand.json. This stays
          # intentionally separate from the newapi semantic guard: compat
          # identities like `sub2api` / `newapi` are still valid in internal
          # route / image / repo identities; this check only protects outward
          # TokenKey brand surfaces from drifting apart again.
          if [ ! -f ./scripts/sentinels/check-brand.py ]; then
            echo "::error::scripts/sentinels/check-brand.py missing."
            echo "::error::Per the TokenKey OPC baseline, this guard cannot be silently disabled."
            exit 1
          fi
          if ! python3 ./scripts/sentinels/check-brand.py; then
            echo "::error::Upstream merge regressed at least one outward brand sentinel."
            echo "::error::Restore the dropped / reverted brand surface in this merge PR."
            echo "::error::Do NOT 'fix' by deleting the brand sentinel entry."
            exit 1
          fi

      - name: Check 5b — frontend TK sentinels still intact after merge
        run: |
          # Single source of truth: scripts/sentinels/frontend-tk.json. Same
          # script that scripts/preflight.sh runs locally, so a green local
          # preflight implies a green check here. Guards small TK frontend
          # divergences (sidebar geometry, fluid table mode, sticky-edge-hints
          # opt-out) that would otherwise compile cleanly even if reverted —
          # the regression only surfaces visually.
          if [ ! -f ./scripts/sentinels/check-frontend-tk.py ]; then
            echo "::error::scripts/sentinels/check-frontend-tk.py missing."
            echo "::error::Per CLAUDE.md §5 minimum-invasion guidance, this guard cannot be silently disabled."
            exit 1
          fi
          if ! python3 ./scripts/sentinels/check-frontend-tk.py; then
            echo "::error::Upstream merge regressed at least one frontend TK sentinel."
            echo "::error::Restore the dropped / reverted TK frontend surface in this merge PR."
            echo "::error::Do NOT 'fix' by deleting the sentinel entry."
            exit 1
          fi

      - name: Check 5c — gateway TK sentinels still intact after merge
        run: |
          # Single source of truth: scripts/sentinels/gateway-tk.json. Same
          # script that scripts/preflight.sh runs locally, so a green local
          # preflight implies a green check here. Guards small TK gateway/service
          # hooks in upstream-shaped hotspot files that compile cleanly even if
          # reverted, with regressions only surfacing in production behavior.
          if [ ! -f ./scripts/sentinels/check-gateway-tk.py ]; then
            echo "::error::scripts/sentinels/check-gateway-tk.py missing."
            echo "::error::Per CLAUDE.md §5 minimum-invasion guidance, this guard cannot be silently disabled."
            exit 1
          fi
          if ! python3 ./scripts/sentinels/check-gateway-tk.py; then
            echo "::error::Upstream merge regressed at least one gateway TK sentinel."
            echo "::error::Restore the dropped / reverted TK gateway hook in this merge PR."
            echo "::error::Do NOT 'fix' by deleting the sentinel entry."
            exit 1
          fi

      - name: Check 6 — redaction version contract stays aligned after merge
        run: |
          # Single source of truth: scripts/sentinels/redaction.json. Same script
          # that scripts/preflight.sh runs locally as the "redaction version
          # contract" check, so a green local preflight implies a green Check 6
          # here. Failure means the merge changed logredact's default sensitive
          # keys or version literals without moving the outward QA contract in
          # lockstep.
          if [ ! -f ./scripts/sentinels/check-redaction-version.py ]; then
            echo "::error::scripts/sentinels/check-redaction-version.py missing."
            echo "::error::Per the Evidence Spine contract, this guard cannot be silently disabled."
            exit 1
          fi
          if ! python3 ./scripts/sentinels/check-redaction-version.py; then
            echo "::error::Upstream merge regressed the QA evidence redaction contract."
            echo "::error::Update scripts/sentinels/redaction.json and bump the outward"
            echo "::error::redaction_version literals in the same commit; do NOT delete the guard."
            exit 1
          fi

      - name: Check 7 — trajectory hook contract stays aligned after merge
        run: |
          # Single source of truth: scripts/sentinels/trajectory.json. Same script
          # that scripts/preflight.sh runs locally as the "trajectory hook
          # registry" check, so a green local preflight implies a green Check 7
          # here. Failure means the merge dropped gateway trajectory/qa capture
          # wiring or the QA middleware stopped terminating in CaptureFromContext.
          if [ ! -f ./scripts/sentinels/check-trajectory-hooks.py ]; then
            echo "::error::scripts/sentinels/check-trajectory-hooks.py missing."
            echo "::error::Per the Evidence Spine contract, this guard cannot be silently disabled."
            exit 1
          fi
          if ! python3 ./scripts/sentinels/check-trajectory-hooks.py; then
            echo "::error::Upstream merge regressed the gateway trajectory / QA capture contract."
            echo "::error::Restore trajectory_id + qaCapture route wiring and keep the"
            echo "::error::QA middleware terminating in Service.CaptureFromContext."
            exit 1
          fi

      - name: Check 8 — terminal event contract stays aligned after merge
        run: |
          # Single source of truth: scripts/sentinels/terminal.json. Same script
          # that scripts/preflight.sh runs locally as the "terminal event
          # registry" check, so a green local preflight implies a green Check 8
          # here. Failure means the merge regressed stable terminal helpers,
          # `[DONE]` emission, or the focused terminal assertions that protect
          # Evidence Spine completion semantics.
          if [ ! -f ./scripts/sentinels/check-terminal-events.py ]; then
            echo "::error::scripts/sentinels/check-terminal-events.py missing."
            echo "::error::Per the Evidence Spine contract, this guard cannot be silently disabled."
            exit 1
          fi
          if ! python3 ./scripts/sentinels/check-terminal-events.py; then
            echo "::error::Upstream merge regressed the stream terminal-event contract."
            echo "::error::Restore stable terminal helpers, keep [DONE] emission, and preserve"
            echo "::error::the focused terminal assertions instead of deleting the guard."
            exit 1
          fi

      - name: Check 9 — engine facade contract stays aligned after merge
        run: |
          # Single source of truth: scripts/sentinels/engine-facade.json. Same
          # script that scripts/preflight.sh runs locally as the "engine facade
          # registry" check, so a green local preflight implies a green Check 9
          # here. Failure means bridge/provider selection truth drifted back
          # into hotspot gateway service files instead of staying behind the
          # shared Engine facade.
          if [ ! -f ./scripts/sentinels/check-engine-facade.py ]; then
            echo "::error::scripts/sentinels/check-engine-facade.py missing."
            echo "::error::Per the Engine Spine contract, this guard cannot be silently disabled."
            exit 1
          fi
          if ! python3 ./scripts/sentinels/check-engine-facade.py; then
            echo "::error::Upstream merge regressed the Engine facade contract."
            echo "::error::Restore shared engine.BuildDispatchPlan gating instead of"
            echo "::error::reintroducing local provider branching in gateway services."
            exit 1
          fi

      - name: Check 10 — QA evidence dataset validator stays executable after merge
        run: |
          # Single source of truth: scripts/checks/qa-evidence-dataset.py plus the focused
          # TestUS077_QAEvidenceDatasetCheck_* regressions. Same target that
          # scripts/preflight.sh runs locally, so a green local preflight implies
          # a green Check 10 here. Failure means the export artifact or standalone
          # validator drifted and the H1/H2/H3/D1 / structural contract is no
          # longer mechanically enforced.
          # `go test -run <regex>` exits 0 when the regex matches ZERO tests, so a
          # rename/move of TestUS077_QAEvidenceDatasetCheck_* would make this check
          # pass vacuously (the one fail-open check among 4-13). Assert ≥1 match
          # first via -list, then run the focused tests.
          # grep -c exits 1 on a zero count, and GHA bash runs set -e -o pipefail,
          # so the trailing fallback below lets the count reach MATCHED before the
          # explicit assertion can report a clean "matched ZERO tests" error.
          MATCHED=$(cd backend && go test -tags=unit ./internal/observability/qa -list 'TestUS077_QAEvidenceDatasetCheck_' 2>/dev/null | grep -c '^TestUS077_QAEvidenceDatasetCheck_' || true)  # preflight-allow: swallow
          if [ "${MATCHED:-0}" -lt 1 ]; then
            echo "::error::-run 'TestUS077_QAEvidenceDatasetCheck_' matched ZERO tests (renamed / moved / deleted?)."
            echo "::error::go test -run with no matches exits 0; this assertion stops that fail-open."
            exit 1
          fi
          (cd backend && go test -tags=unit ./internal/observability/qa -run 'TestUS077_QAEvidenceDatasetCheck_' -count=1)

      - name: Check 11 — pricing-availability sentinels still intact after merge
        run: |
          # Preflight parity: scripts/sentinels/pricing-availability.json. Without these
          # literal tap hooks, merges can compile cleanly while availability ingestion stops.
          if [ ! -f ./scripts/sentinels/check-pricing-availability.py ]; then
            echo "::error::scripts/sentinels/check-pricing-availability.py missing."
            exit 1
          fi
          if ! python3 ./scripts/sentinels/check-pricing-availability.py; then
            echo "::error::Upstream merge regressed at least one pricing-availability sentinel."
            echo "::error::Restore the tap / RecordOutcome literals in this merge PR; do NOT delete sentinel entries."
            exit 1
          fi

      - name: Check 12 — sentinel registry update gate (PR diff ↔ registries coupled)
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Preflight parity: scripts/sentinels/check-registry-update-gate.py — forces any
          # change to sentinel-covered or hotspot-listed sources to accompany a registry edit.
          # --pr-body lets the review marker live on the mutable PR description (edit + re-run,
          # no commit rewrite); same acceptance logic preflight runs in advisory mode locally.
          if [ ! -f ./scripts/sentinels/check-registry-update-gate.py ]; then
            echo "::error::scripts/sentinels/check-registry-update-gate.py missing."
            exit 1
          fi
          BASE_SHA='${{ github.event.pull_request.base.sha }}'
          HEAD_SHA='${{ github.event.pull_request.head.sha }}'
          if ! python3 ./scripts/sentinels/check-registry-update-gate.py --base "$BASE_SHA" --head "$HEAD_SHA" --pr-body "$PR_BODY"; then
            echo "::error::Sentinel registry update gate failed."
            echo "::error::Changing load-bearing hotspots requires updating scripts/sentinels/*.json in the same PR."
            exit 1
          fi

      - name: Check 13 — buffered Content-Type leak antipattern absent
        run: |
          # Preflight parity: scripts/checks/buffered-content-type-leak.py — generalized
          # forward-drift guard for upstream Wei-Shaw/sub2api#1311. Any merge that
          # introduces a new responseheaders.WriteFilteredHeaders(...) followed by
          # c.JSON / c.Data("application/json", ...) without an explicit
          # c.Writer.Header().Set("Content-Type", ...) override leaks the upstream SSE
          # Content-Type onto a JSON body. The gate scans backend/internal/service/*.go
          # and fails the merge PR before the antipattern reaches main.
          if [ ! -f ./scripts/checks/buffered-content-type-leak.py ]; then
            echo "::error::scripts/checks/buffered-content-type-leak.py missing."
            exit 1
          fi
          if ! python3 ./scripts/checks/buffered-content-type-leak.py; then
            echo "::error::Upstream merge re-introduced the buffered SSE->JSON Content-Type leak antipattern."
            echo "::error::Fix the flagged site(s) by adding c.Writer.Header().Set(\"Content-Type\", \"application/json\") before c.JSON / c.Data."
            exit 1
          fi

      - name: Check 14 — served-models manifest agrees with price/display/migration
        run: |
          # Preflight parity: scripts/checks/catalog-serving-drift.py — guards the
          # #812-class regression where a model is priced + advertised-as-intended in
          # backend/internal/service/tk_served_models.json but never wired onto the
          # serving account's credentials.model_mapping (=> empty pool 429/503). The
          # same script scripts/preflight.sh runs locally, so a green local preflight
          # implies a green check here. Selftest first (offline fixtures), then the
          # real run against the manifest + tk_pricing_overlay.json + the Go
          # servable-allowlist maps + tk_*.sql model_mapping migrations.
          if [ ! -f ./scripts/checks/catalog-serving-drift.py ]; then
            echo "::error::scripts/checks/catalog-serving-drift.py missing."
            exit 1
          fi
          if ! python3 ./scripts/checks/catalog-serving-drift.py --selftest; then
            echo "::error::catalog-serving-drift.py selftest failed (guard logic broke)."
            exit 1
          fi
          if ! python3 ./scripts/checks/catalog-serving-drift.py; then
            echo "::error::served-models manifest drift: a manifest entry disagrees with its price, display allowlist, or model_mapping migration."
            echo "::error::Land the missing tk_NNN_*_model_mapping migration (or add the 'served-via-admin-ui' notes opt-out), or remove the row — do NOT delete the guard."
            exit 1
          fi

      - name: Summary
        run: |
          echo "All fourteen §5.y / §5.x checks passed for merge/upstream-* PR."
          echo "Reviewer reminder: pick GitHub 'Create a merge commit' (not Squash)."
