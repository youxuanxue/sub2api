# Build + publish the TokenKey custom Caddy image (stock Caddy + caddy-ratelimit).
#
# WHY a dedicated workflow (not release.yml): the Caddy image changes on a totally
# different cadence than the app image — only when we bump the pinned Caddy version
# or the module set. Keeping it separate avoids rebuilding Caddy on every app release.
#
# Output: a MULTI-ARCH manifest at ghcr.io/<owner>/tokenkey-caddy:<tag>.
# arm64 is mandatory — prod / Edge Stage0 run on AWS Graviton (rule §9.1); an
# amd64-only image crashes there with `exec format error`.
#
# After the FIRST successful run, set the GHCR package visibility to PUBLIC
# (Settings → Packages → tokenkey-caddy → Change visibility). The prod host pulls
# anonymously; a private package would make `docker compose up -d caddy` fail.
#
# Manual-only by design (workflow_dispatch). The Dockerfile path is also a trigger
# so a PR that touches it re-validates the build (push to GHCR only on dispatch /
# main, see the `push` gate below).
name: Caddy Image

on:
  workflow_dispatch:
    inputs:
      caddy_image_tag:
        description: "Image tag to publish (e.g. 2.11.4-ratelimit). Keep it pinned + descriptive; do NOT use 'latest'."
        required: true
        default: "2.11.4-ratelimit"
  pull_request:
    paths:
      - "deploy/caddy/Dockerfile"
      - ".github/workflows/caddy-image.yml"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set lowercase owner for GHCR
        id: lc
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Resolve image ref
        id: ref
        run: |
          TAG="${{ github.event.inputs.caddy_image_tag }}"
          # On pull_request there is no input — use a throwaway tag; we build but do not push.
          [ -z "$TAG" ] && TAG="pr-validate"
          echo "image=ghcr.io/${{ steps.lc.outputs.owner }}/tokenkey-caddy:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # PR: build BOTH arches to prove the image compiles cross-arch, but do NOT push.
      # Dispatch: build + push the multi-arch manifest.
      - name: Build (and push on dispatch)
        uses: docker/build-push-action@v6
        with:
          context: ./deploy/caddy
          file: ./deploy/caddy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'workflow_dispatch' }}
          tags: ${{ steps.ref.outputs.image }}
          provenance: false

      - name: Summary
        run: |
          {
            echo "### Caddy image"
            echo ""
            echo "- ref: \`${{ steps.ref.outputs.image }}\`"
            echo "- pushed: \`${{ github.event_name == 'workflow_dispatch' }}\`"
            echo "- platforms: \`linux/amd64, linux/arm64\`"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo ""
              echo "> First publish? Set the GHCR package visibility to **public** so the prod host can anonymous-pull."
              echo "> Verify: \`docker buildx imagetools inspect ${{ steps.ref.outputs.image }}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
