name: Weekly Automation Smoke

on:
  schedule:
    - cron: '17 9 * * TUE'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  new-api-bump-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
      - uses: ./.github/actions/cache-and-checkout-new-api
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.2'
      - name: Run pinned new-api smoke via bump helper
        run: |
          CURRENT_PIN="$(tr -d '[:space:]' < .new-api-ref)"
          bash scripts/bump-new-api.sh "$CURRENT_PIN"

  compile-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
      - uses: ./.github/actions/cache-and-checkout-new-api
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.2'
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend
      - name: Run preflight
        run: ./scripts/preflight.sh
      - name: Build backend and frontend
        run: make build
