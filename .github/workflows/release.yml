name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0)'
        required: true
        type: string
      simple_release:
        # ⚠️ DANGER: 启用后只构建 linux/amd64 单架构镜像，并会**覆盖** :latest / :X.Y.Z 等
        # 共享 tag —— 任何 ARM 主机（AWS Graviton t4g/c7g/m7g 等）拉到这些 tag 都会
        # 立即崩溃在 "exec format error"。仅在确认所有消费者都是 amd64 时才开启。
        # 默认关闭；启用必须人工 dispatch 时显式打勾。
        description: '⚠️ amd64-only build. WILL break ARM (Graviton) consumers using :latest. Default false; enable only if you know every host is amd64.'
        required: false
        type: boolean
        default: false
      full_release:
        description: 'Build darwin/windows/linux archives in addition to multi-arch Docker (slower). Default false; tag pushes use linux-only .goreleaser.yaml.'
        required: false
        type: boolean
        default: false

# 环境变量：合并 workflow_dispatch 输入和 repository variable
# tag push 触发时读取 vars.SIMPLE_RELEASE / vars.FULL_RELEASE，workflow_dispatch 时使用输入参数
env:
  SIMPLE_RELEASE: ${{ github.event.inputs.simple_release == 'true' || vars.SIMPLE_RELEASE == 'true' }}
  FULL_RELEASE: ${{ github.event.inputs.full_release == 'true' || vars.FULL_RELEASE == 'true' }}

# Serialize the ENTIRE release pipeline. Two concurrent releases — e.g. a tag
# push plus the §9.2 recovery dispatch `gh workflow run release.yml -f tag=...`,
# or two tags landing close together — would otherwise race non-atomically on
# the shared :latest / :X / :X.Y / :X.Y.Z image tags (last-writer-wins, no
# signal on which build the manifest ends up pointing at) AND on the
# `[skip ci]` VERSION writeback that sync-version-file pushes directly to main.
# A single global group + cancel-in-progress:false queues releases instead of
# racing; releases are infrequent and are meant to be serial. See CLAUDE.md
# §9.1 (arch manifest) / §9.2 (VERSION writeback).
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  # Update VERSION file with tag version
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Update VERSION file
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=${{ github.event.inputs.tag }}
            VERSION=${VERSION#v}
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "$VERSION" > backend/cmd/server/VERSION
          echo "Updated VERSION file to: $VERSION"

      - name: Upload VERSION artifact
        uses: actions/upload-artifact@v7
        with:
          name: version-file
          path: backend/cmd/server/VERSION
          retention-days: 1

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # Major must match Dockerfile ARG NODE_IMAGE — the release image's
          # frontend builder. Gate: scripts/checks/node-version-align.py.
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build frontend
        run: pnpm run build
        working-directory: frontend

      - name: Verify frontend release assets
        run: |
          python3 scripts/checks/frontend-dist-freshness.py --check backend/internal/web/dist
          python3 scripts/checks/frontend-release-assets.py --dist backend/internal/web/dist

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: backend/internal/web/dist/
          retention-days: 1

  release:
    needs: [update-version, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: ./.github/actions/cache-and-checkout-new-api

      - name: Download VERSION artifact
        uses: actions/download-artifact@v8
        with:
          name: version-file
          path: backend/cmd/server/

      - name: Download frontend artifact
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: backend/internal/web/dist/

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          # Build/module cache is handled by the rolling cache step below, NOT
          # by setup-go's built-in cache. setup-go keys its cache on go.sum and
          # is IMMUTABLE: once the go.sum-keyed entry exists it is never
          # re-saved. Because that entry is first written by an amd64-only run,
          # the arm64 cross-compile objects stay perpetually cold and GoReleaser
          # recompiles the full arm64 package set every release (~3m40s
          # "building binaries", ~79% of the GoReleaser step). Disabling it here
          # lets the rolling cache below own GOCACHE + GOMODCACHE.
          cache: false

      # RESTORE-ONLY cross-arch (amd64+arm64) Go build cache.
      #
      # Release runs on a tag ref (`refs/tags/vX.Y.Z`). GitHub Actions scopes
      # cache restore to the current ref + the DEFAULT BRANCH only, so a cache
      # SAVED here (on the tag ref) is invisible to the next tag's release — the
      # old `actions/cache@v4` save was pure dead weight (every release logged
      # `Cache not found` and cold-compiled arm64 from scratch, ~4m). The warm
      # cache is now produced by the `warm-release-cache` job in backend-ci.yml
      # on push to `main` (the default branch), which IS readable from tag runs.
      #
      # `actions/cache/restore` (no post-job save) consumes that main-warmed
      # entry via the shared `Linux-go-release-` key prefix and stops generating
      # dead tag-scoped caches. Go's cache is content-addressed, so a slightly
      # stale entry (e.g. after a .new-api-ref bump) is simply unused, never
      # wrong — release recompiles only changed packages + relinks.
      - name: Restore cross-arch Go build cache (warmed on main)
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-release-${{ hashFiles('backend/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-release-${{ hashFiles('backend/go.sum') }}-
            ${{ runner.os }}-go-release-

      - name: Verify Go version
        run: |
          go version | grep -q 'go1.26.4'

      # Docker setup for GoReleaser
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get tag message
        id: tag_message
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME=${{ github.event.inputs.tag }}
          else
            TAG_NAME=${GITHUB_REF#refs/tags/}
          fi
          echo "Processing tag: $TAG_NAME"

          git fetch origin "refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}" --force

          # 获取完整的 tag message（跳过第一行标题）
          TAG_MESSAGE=$(git tag -l --format='%(contents:body)' "$TAG_NAME")

          # 调试输出
          echo "Tag message length: ${#TAG_MESSAGE}"
          echo "Tag message preview:"
          echo "$TAG_MESSAGE" | head -10

          # 使用 EOF 分隔符处理多行内容
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$TAG_MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Set lowercase owner for GHCR
        id: lowercase
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # 显式醒目地把 simple_release 模式打印到 Actions UI summary，避免后续维护者忽视
      - name: Warn on simple_release mode
        if: ${{ env.SIMPLE_RELEASE == 'true' }}
        run: |
          {
            echo "## ⚠️ simple_release=true 已启用"
            echo ""
            echo "本次只构建 **linux/amd64** 单架构镜像，并会覆盖 \`:latest\` / \`:X.Y.Z\` 等共享 tag。"
            echo "**任何 ARM (Graviton) 主机拉到这些 tag 都会立即崩溃在 \`exec format error\`**。"
            echo ""
            echo "如果误用，请立即重发 \`workflow_dispatch\` 并将 \`simple_release=false\` 重新发布该版本以恢复 multi-arch manifest。"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::warning::simple_release=true — amd64-only build, will overwrite shared tags and break ARM consumers"

      - name: Resolve GoReleaser config
        id: goreleaser_config
        run: |
          if [ "${{ env.SIMPLE_RELEASE }}" = "true" ] && [ "${{ env.FULL_RELEASE }}" = "true" ]; then
            echo "simple_release and full_release are mutually exclusive" >&2
            exit 1
          fi
          if [ "${{ env.SIMPLE_RELEASE }}" = "true" ]; then
            echo "args=release --clean --skip=validate --config=.goreleaser.simple.yaml" >> "$GITHUB_OUTPUT"
          elif [ "${{ env.FULL_RELEASE }}" = "true" ]; then
            echo "args=release --clean --skip=validate --config=.goreleaser.full.yaml" >> "$GITHUB_OUTPUT"
          else
            echo "args=release --clean --skip=validate" >> "$GITHUB_OUTPUT"
          fi

      # GoReleaser already retries per-blob on docker push, but exhausted its
      # internal backoff during the 2026-05-18 v1.7.37 release when GHCR was
      # flapping. Outer two-attempt retry so a single registry blip does not
      # require a manual `gh workflow run release.yml` recovery. Pattern:
      # attempt 1 with `continue-on-error`, sleep 60s, attempt 2 only if
      # attempt 1 failed. `--clean` is idempotent across attempts. The second
      # attempt is the one that fails the job if both fail, so a genuinely
      # down registry still surfaces a red release.
      - name: Run GoReleaser (attempt 1)
        id: goreleaser_attempt1
        continue-on-error: true
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: ${{ steps.goreleaser_config.outputs.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_MESSAGE: ${{ steps.tag_message.outputs.message }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_OWNER_LOWER: ${{ steps.lowercase.outputs.owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || 'skip' }}

      - name: Wait before retrying GoReleaser
        if: steps.goreleaser_attempt1.outcome == 'failure'
        run: |
          echo "::warning::GoReleaser attempt 1 failed (likely transient registry / GHCR issue). Sleeping 60s, then retrying once."
          sleep 60

      - name: Run GoReleaser (attempt 2)
        if: steps.goreleaser_attempt1.outcome == 'failure'
        uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: ${{ steps.goreleaser_config.outputs.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_MESSAGE: ${{ steps.tag_message.outputs.message }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_OWNER_LOWER: ${{ steps.lowercase.outputs.owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME || 'skip' }}

      # Update DockerHub description
      - name: Update DockerHub description
        if: ${{ env.SIMPLE_RELEASE != 'true' && env.DOCKERHUB_USERNAME != '' }}
        uses: peter-evans/dockerhub-description@v5
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/sub2api
          short-description: "TokenKey - AI API Gateway Platform"
          readme-filepath: ./deploy/DOCKER.md

      # Send Telegram notification
      - name: Send Telegram Notification
        if: ${{ env.SIMPLE_RELEASE != 'true' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        continue-on-error: true
        run: |
          # 检查必要的环境变量
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram credentials not configured, skipping notification"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME=${{ github.event.inputs.tag }}
          else
            TAG_NAME=${GITHUB_REF#refs/tags/}
          fi
          VERSION=${TAG_NAME#v}
          REPO="${{ github.repository }}"
          GHCR_IMAGE="ghcr.io/${REPO,,}"  # ${,,} converts to lowercase

          # 获取 tag message 内容并转义 Markdown 特殊字符
          TAG_MESSAGE='${{ steps.tag_message.outputs.message }}'
          TAG_MESSAGE=$(echo "$TAG_MESSAGE" | sed 's/\([_*`\[]\)/\\\1/g')

          # 限制消息长度（Telegram 消息限制 4096 字符，预留空间给头尾固定内容）
          if [ ${#TAG_MESSAGE} -gt 3500 ]; then
            TAG_MESSAGE="${TAG_MESSAGE:0:3500}..."
          fi

          # 构建消息内容
          MESSAGE="🚀 *TokenKey 新版本发布！*"$'\n'$'\n'
          MESSAGE+="📦 版本号: \`${VERSION}\`"$'\n'$'\n'

          # 添加更新内容
          if [ -n "$TAG_MESSAGE" ]; then
            MESSAGE+="${TAG_MESSAGE}"$'\n'$'\n'
          fi

          MESSAGE+="🐳 *Docker 部署:*"$'\n'
          MESSAGE+="\`\`\`bash"$'\n'
          # 根据是否配置 DockerHub 动态生成
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            DOCKER_IMAGE="${DOCKERHUB_USERNAME}/sub2api"
            MESSAGE+="# Docker Hub"$'\n'
            MESSAGE+="docker pull ${DOCKER_IMAGE}:${VERSION}"$'\n'
            MESSAGE+="# GitHub Container Registry"$'\n'
          fi
          MESSAGE+="docker pull ${GHCR_IMAGE}:${VERSION}"$'\n'
          MESSAGE+="\`\`\`"$'\n'$'\n'
          MESSAGE+="🔗 *相关链接:*"$'\n'
          MESSAGE+="• [GitHub Release](https://github.com/${REPO}/releases/tag/${TAG_NAME})"$'\n'
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            MESSAGE+="• [Docker Hub](https://hub.docker.com/r/${DOCKER_IMAGE})"$'\n'
          fi
          MESSAGE+="• [GitHub Packages](https://github.com/${REPO}/pkgs/container/sub2api)"$'\n'$'\n'
          MESSAGE+="#TokenKey #Release #${TAG_NAME//./_}"

          # 发送消息
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat_id "${TELEGRAM_CHAT_ID}" \
              --arg text "${MESSAGE}" \
              '{
                chat_id: $chat_id,
                text: $text,
                parse_mode: "Markdown",
                disable_web_page_preview: true
              }')"

  # NOTE: prod 部署不再由 release.yml 自动 queue（去掉了原 queue-prod-deploy job）。
  # release.yml 只负责 build multi-arch 镜像；部署改由 tokenkey-stage0-release-rollout
  # skill 在 build 成功后显式 dispatch deploy-stage0.yml（target=prod 直接 dispatch，
  # target=all 在 edge canary infra smoke 绿后再 dispatch prod），由 skill 持有 rollout
  # 意图与 canary-first 顺序。好处：① 不再有提前 queue 卡 waiting 的 prod run；
  # ② 消除「自动 queue + 手动 dispatch」两个并行 prod run 的故障；③ build 与 deploy
  # 职责分离。裸 tag-push 不再自动部署 prod —— 发版请走 skill（带 canary/smoke/followup）。

  sync-version-file:
    needs: [release]
    if: ${{ needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Sync VERSION file to released tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION=${{ github.event.inputs.tag }}
            VERSION=${VERSION#v}
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi

          CURRENT_VERSION=$(tr -d '\r\n' < backend/cmd/server/VERSION || true)
          if [ "$CURRENT_VERSION" = "$VERSION" ]; then
            echo "VERSION file already matches $VERSION"
            exit 0
          fi

          echo "$VERSION" > backend/cmd/server/VERSION

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/cmd/server/VERSION
          git commit -m "chore: sync VERSION to ${VERSION} [skip ci]"
          git push origin HEAD:${{ github.event.repository.default_branch }}
