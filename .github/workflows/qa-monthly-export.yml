name: QA Monthly Export

on:
  schedule:
    - cron: "0 4 1 * *"
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Export last month QA records
        env:
          PG_DSN: ${{ secrets.PROD_PG_READONLY_DSN }}
          QA_EXPORT_BUCKET: ${{ secrets.QA_ARCHIVE_BUCKET }}
        run: |
          [ -n "${PG_DSN:-}" ] || { echo "PG_DSN is empty, skip"; exit 0; }
          [ -n "${QA_EXPORT_BUCKET:-}" ] || { echo "QA_EXPORT_BUCKET is empty, skip"; exit 0; }
          HAS_QA_TABLE="$(psql "$PG_DSN" -tAc "SELECT to_regclass('public.qa_records') IS NOT NULL")"
          if [ "$HAS_QA_TABLE" != "t" ]; then
            echo "qa_records table does not exist yet, skip monthly export"
            exit 0
          fi

          MONTH="$(date -u -d 'last month' +%Y-%m 2>/dev/null || date -u -v-1m +%Y-%m)"
          SINCE="${MONTH}-01"
          UNTIL="$(date -u -d "${SINCE} +1 month" +%Y-%m-%d 2>/dev/null || date -u -j -f "%Y-%m-%d" "${SINCE}" -v+1m +%Y-%m-%d)"
          OUT="/tmp/qa_records_${MONTH}.csv.gz"

          psql "$PG_DSN" -v ON_ERROR_STOP=1 -c "\COPY (
            SELECT
              request_id,
              user_id,
              api_key_id,
              account_id,
              platform,
              requested_model,
              upstream_model,
              inbound_endpoint,
              upstream_endpoint,
              status_code,
              duration_ms,
              first_token_ms,
              stream,
              tool_calls_present,
              multimodal_present,
              input_tokens,
              output_tokens,
              cached_tokens,
              request_sha256,
              response_sha256,
              blob_uri,
              tags,
              created_at,
              retention_until
            FROM qa_records
            WHERE created_at >= '${SINCE}'::date
              AND created_at < '${UNTIL}'::date
            ORDER BY created_at ASC
          ) TO PROGRAM 'gzip > ${OUT}' WITH CSV HEADER"

          aws s3 cp "${OUT}" "s3://${QA_EXPORT_BUCKET}/qa-monthly/qa_records_${MONTH}.csv.gz"
      - name: Notify Feishu
        if: always()
        env:
          FEISHU_OPS_WEBHOOK: ${{ secrets.FEISHU_OPS_WEBHOOK }}
        run: |
          [ -n "${FEISHU_OPS_WEBHOOK:-}" ] || exit 0
          MONTH="$(date -u -d 'last month' +%Y-%m 2>/dev/null || date -u -v-1m +%Y-%m)"
          STATUS="${{ job.status }}"
          curl -sS -X POST "$FEISHU_OPS_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg m "$MONTH" --arg s "$STATUS" '{msg_type:"text",content:{text:("[qa-monthly-export] " + $m + ": " + $s)}}')" || true
